<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>B-ACCOUNT | Opportunity</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/system/config.js"></script>
    <script src="/system/system.js"></script>
    <script src="b-account.js"></script>
    <link rel="stylesheet" href="b-account.css">

    <style>
        body { padding-bottom: 120px; }

        /* --- Filter Zone --- */
        .flt-wrapper { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .flt-inner { max-width: 1300px; margin: 0 auto; }
        .flt-row { display: flex; align-items: center; gap: 12px; flex-wrap: nowrap; }
        .flt-search { position: relative; flex: 1; min-width: 120px; }
        .flt-search i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--c-text-muted); }
        .flt-search-input { background: var(--c-bg); border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 15px 8px 40px; font-size: 0.85rem; width: 100%; outline: none; }
        .flt-btn-adv { border: 1px solid #e2e8f0; background: #fff; border-radius: 10px; padding: 0 15px; height: 38px; font-size: 0.78rem; font-weight: 700; color: var(--c-slate); cursor: pointer; margin-left: auto; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .flt-btn-adv:hover { background: var(--c-bg); border-color: #cbd5e1; }
        .flt-btn-adv.active { background: var(--c-accent-light); border-color: var(--c-accent); color: #7a8500; }

        .flt-advanced-zone { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out, opacity 0.3s ease; opacity: 0; border-top: 1px dashed transparent; }
        .flt-advanced-zone.show { max-height: 200px; opacity: 1; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee; }
        .flt-advanced-row { display: flex; align-items: center; gap: 12px; flex-wrap: nowrap; }

        .status-seg { display: flex; border: 1.5px solid #e2e8f0; border-radius: 10px; overflow: hidden; flex-shrink: 0; height: 38px; }
        .seg-btn { border: none; border-right: 1.5px solid #e2e8f0; background: #fff; padding: 0 18px; font-size: 0.78rem; font-weight: 700; color: var(--c-slate); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; white-space: nowrap; flex: 1; min-width: 80px; }
        .seg-btn:last-child { border-right: none; }
        .seg-btn.active { background: var(--c-accent); color: #1e293b; }
        .seg-btn:not(.active):hover { background: var(--c-bg); }

        /* --- Empty State --- */
        .empty-state { text-align: center; padding: 80px 20px; color: #94a3b8; }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 16px; }
        .empty-state h3 { font-size: 1rem; font-weight: 700; color: #64748b; margin-bottom: 8px; }
        .empty-state p { font-size: 0.85rem; }
    </style>
</head>
<body>

<section id="filter-zone" class="flt-wrapper">
    <div class="flt-inner">
        <div class="flt-row">
            <div class="flt-search">
                <i class="bi bi-search"></i>
                <input type="text" class="flt-search-input" id="globalSearch" placeholder="Search...">
            </div>
            <button class="flt-btn-adv" id="toggleFilters"><i class="bi bi-sliders"></i> Advance</button>
        </div>

        <div class="flt-advanced-zone" id="advancedFilterZone">
            <div class="flt-advanced-row">
                <div class="status-seg">
                    <button id="seg-all" class="seg-btn active" onclick="setStatusFilter('all')"><i class="bi bi-grid-fill"></i> All</button>
                    <button id="seg-active" class="seg-btn" onclick="setStatusFilter('active')"><i class="bi bi-hourglass-split"></i> Active</button>
                    <button id="seg-closed" class="seg-btn" onclick="setStatusFilter('closed')"><i class="bi bi-check-circle"></i> Closed</button>
                </div>
                <div class="flt-select-box"><span class="flt-select-tag">Owner</span>
                    <select class="flt-select-input" id="filterOwner"><option value="">All Owner</option></select>
                </div>
                <button class="btn-reset" onclick="resetFilters()">RESET</button>
            </div>
        </div>
    </div>
</section>

<main class="flt-inner" style="padding: 24px 20px 120px;">
    <div id="listContainer" class="row">
        <div class="col-12 empty-state">
            <i class="bi bi-briefcase"></i>
            <h3>No opportunities yet</h3>
            <p>Opportunities will appear here once data is connected.</p>
        </div>
    </div>
</main>

<button class="fab-add" id="btn-add" title="New Opportunity" style="display:none;">
    <i class="bi bi-plus-lg"></i>
</button>

<script>
    function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
    function safeLink(url) { if (!url) return '#'; const u = url.trim(); return (u.startsWith('http://') || u.startsWith('https://')) ? u : '#'; }

    function setStatusFilter(type) {
        ['all', 'active', 'closed'].forEach(t => {
            document.getElementById(`seg-${t}`)?.classList.toggle('active', t === type);
        });
    }

    function resetFilters() {
        document.getElementById('globalSearch').value = '';
        document.getElementById('filterOwner').value = '';
        setStatusFilter('all');
    }

    document.getElementById('toggleFilters').addEventListener('click', function() {
        const zone = document.getElementById('advancedFilterZone');
        const isShow = zone.classList.toggle('show');
        this.classList.toggle('active', isShow);
    });

    async function initPage() {
        sessionStorage.removeItem('bx_perms_baccount');
        await initLayout(B_ACCOUNT_CONFIG);
        if (canBaccount('new')) document.getElementById('btn-add').style.display = 'flex';
    }

    initPage();
</script>
</body>
</html>
