<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>B-ACCOUNT | Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/system/config.js"></script>
    <script src="/system/system.js"></script>
    <script src="b-account.js"></script>
    <link rel="stylesheet" href="b-account.css">
    <style>
        body { padding-bottom: 120px; }

        .flt-wrapper { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .flt-inner { max-width: 1300px; margin: 0 auto; }
        .flt-row { display: flex; align-items: center; gap: 12px; flex-wrap: nowrap; }
        .flt-search { position: relative; flex: 1; min-width: 120px; }
        .flt-search i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--c-text-muted); }
        .flt-search-input { background: var(--c-bg); border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 15px 8px 40px; font-size: 0.85rem; width: 100%; outline: none; box-sizing: border-box; }

        .status-seg { display: flex; border: 1.5px solid #e2e8f0; border-radius: 10px; overflow: hidden; flex-shrink: 0; height: 38px; }
        .seg-btn { border: none; border-right: 1.5px solid #e2e8f0; background: #fff; padding: 0 18px; font-size: 0.78rem; font-weight: 700; color: var(--c-slate); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; white-space: nowrap; flex: 1; min-width: 80px; }
        .seg-btn:last-child { border-right: none; }
        .seg-btn.active { background: var(--c-accent); color: #1e293b; }
        .seg-btn:not(.active):hover { background: var(--c-bg); }

        .ac-card { background: #fff; border: 1px solid #eef2f7; border-radius: var(--radius-card); padding: 18px 24px; margin-bottom: 10px; display: flex; align-items: center; gap: 18px; transition: box-shadow 0.2s, transform 0.2s; box-shadow: 0 2px 8px -2px rgba(0,0,0,0.05); cursor: pointer; }
        .ac-card:hover { box-shadow: 0 8px 24px -4px rgba(0,0,0,0.09); transform: translateY(-1px); }

        .ac-id-badge { font-size: 0.68rem; font-weight: 800; color: var(--c-muted); letter-spacing: 1px; background: var(--c-bg); border: 1px solid var(--c-border); border-radius: 8px; padding: 4px 10px; flex-shrink: 0; }

        .ac-info { flex: 1; min-width: 0; }
        .ac-name { font-size: 0.97rem; font-weight: 700; color: var(--c-text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
        .ac-company { font-size: 0.8rem; color: var(--c-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .ac-meta { text-align: right; flex-shrink: 0; min-width: 90px; }
        .ac-status { display: inline-block; font-size: 0.68rem; font-weight: 800; padding: 3px 11px; border-radius: 20px; letter-spacing: 0.5px; margin-bottom: 5px; }
        .ac-status.active   { background: #d1fae5; color: #065f46; }
        .ac-status.inactive { background: #f1f5f9; color: #94a3b8; }
        .ac-by { font-size: 0.7rem; color: var(--c-muted); }

        .ac-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; opacity: 0; transition: 0.2s; }
        .ac-card:hover .ac-actions { opacity: 1; }
        .ac-btn { border: 1px solid var(--c-border); background: #fff; color: var(--c-slate); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; cursor: pointer; transition: 0.15s; }
        .ac-btn:hover { border-color: var(--c-accent); background: var(--c-accent-light); color: var(--c-dark); }
        .ac-btn.del:hover { border-color: #fca5a5; background: #fff5f5; color: #ef4444; }

        .empty-state { text-align: center; padding: 80px 20px; color: #94a3b8; }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 16px; }
        .empty-state h3 { font-size: 1rem; font-weight: 700; color: #64748b; margin-bottom: 8px; }
        .empty-state p { font-size: 0.85rem; margin: 0; }

        #scroll-trigger { height: 40px; }
    </style>
</head>
<body>

<section class="flt-wrapper">
    <div class="flt-inner">
        <div class="flt-row">
            <div class="flt-search">
                <i class="bi bi-search"></i>
                <input type="text" class="flt-search-input" id="globalSearch" placeholder="Search account or company...">
            </div>
            <div class="status-seg">
                <button id="seg-all"      class="seg-btn active" onclick="setStatusFilter('all')">     <i class="bi bi-grid-fill"></i> All</button>
                <button id="seg-active"   class="seg-btn"        onclick="setStatusFilter('active')">  <i class="bi bi-circle-fill"></i> Active</button>
                <button id="seg-inactive" class="seg-btn"        onclick="setStatusFilter('inactive')"><i class="bi bi-circle"></i> Inactive</button>
            </div>
        </div>
    </div>
</section>

<main class="flt-inner" style="padding: 24px 20px 120px;">
    <div id="listContainer"></div>
    <div id="scroll-trigger"></div>
</main>

<button class="fab-add" id="btn-add" title="New Account" style="display:none;">
    <i class="bi bi-plus-lg"></i>
</button>

<script>
    function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

    let page = 0;
    const PAGE_SIZE = 15;
    let fetching = false;
    let hasMore = true;

    function getFilters() {
        return {
            search: document.getElementById('globalSearch').value.trim(),
            status: ['all','active','inactive'].find(t => document.getElementById(`seg-${t}`)?.classList.contains('active')) || 'all'
        };
    }

    function setStatusFilter(type) {
        ['all','active','inactive'].forEach(t => {
            document.getElementById(`seg-${t}`)?.classList.toggle('active', t === type);
        });
        fetchData(true);
    }

    function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

    async function fetchData(reset = false) {
        if (fetching || (!reset && !hasMore)) return;
        if (reset) { page = 0; hasMore = true; document.getElementById('listContainer').innerHTML = ''; }
        fetching = true;

        const { search, status } = getFilters();

        let query = supabaseClient
            .from('b_account_list')
            .select('account_id, company_name, account_name, status, create_date, create_by')
            .order('account_id', { ascending: true })
            .range(page * PAGE_SIZE, (page + 1) * PAGE_SIZE - 1);

        if (search) query = query.or(`account_name.ilike.%${search}%,company_name.ilike.%${search}%`);
        if (status !== 'all') query = query.eq('status', status.charAt(0).toUpperCase() + status.slice(1));

        const { data, error } = await query;
        if (error || !data) { fetching = false; return; }

        hasMore = data.length === PAGE_SIZE;
        page++;

        const container = document.getElementById('listContainer');

        if (page === 1 && data.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="bi bi-person-vcard"></i><h3>No accounts found</h3><p>Try adjusting your search or filters.</p></div>`;
            fetching = false;
            return;
        }

        const canEdit = canBaccount('edit');
        const canDel  = canBaccount('delete');

        container.insertAdjacentHTML('beforeend', data.map(a => {
            const statusClass = (a.status || 'Active').toLowerCase() === 'active' ? 'active' : 'inactive';
            const dateStr = a.create_date ? a.create_date.substring(0, 10) : '';
            const actions = (canEdit || canDel) ? `<div class="ac-actions">
                ${canEdit ? `<button class="ac-btn" title="Edit" onclick="event.stopPropagation();editAccount('${esc(a.account_id)}')"><i class="bi bi-pencil"></i></button>` : ''}
                ${canDel  ? `<button class="ac-btn del" title="Delete" onclick="event.stopPropagation();deleteAccount('${esc(a.account_id)}')"><i class="bi bi-trash3"></i></button>` : ''}
            </div>` : '';
            return `<div class="ac-card" onclick="viewAccount('${esc(a.account_id)}')">
                <span class="ac-id-badge">${esc(a.account_id)}</span>
                <div class="ac-info">
                    <div class="ac-name">${esc(a.account_name)}</div>
                    <div class="ac-company">${esc(a.company_name)}</div>
                </div>
                <div class="ac-meta">
                    <div><span class="ac-status ${statusClass}">${esc(a.status || 'Active')}</span></div>
                    <div class="ac-by">${esc(a.create_by || '')}${dateStr ? ' · ' + dateStr : ''}</div>
                </div>
                ${actions}
            </div>`;
        }).join(''));

        fetching = false;
    }

    function viewAccount(id) {
        // TODO: detail modal
    }

    function editAccount(id) {
        // TODO: edit modal
    }

    async function deleteAccount(id) {
        const result = await Swal.fire({
            title: 'Delete Account?',
            text: `${id} will be permanently deleted.`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Delete',
            confirmButtonColor: '#ef4444',
            cancelButtonText: 'Cancel'
        });
        if (!result.isConfirmed) return;
        const { error } = await supabaseClient.from('b_account_list').delete().eq('account_id', id);
        if (error) { notify('error', 'Delete failed'); return; }
        notify('success', 'Deleted');
        fetchData(true);
    }

    const observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) fetchData();
    }, { rootMargin: '200px' });

    document.getElementById('globalSearch').addEventListener('input', debounce(() => fetchData(true), 350));

    async function initPage() {
        sessionStorage.removeItem('bx_perms_baccount');
        await initLayout(B_ACCOUNT_CONFIG);
        if (canBaccount('new')) document.getElementById('btn-add').style.display = 'flex';
    }

    initPage().then(() => {
        fetchData(true).then(() => observer.observe(document.getElementById('scroll-trigger')));
    });
</script>
</body>
</html>
