<style>
    :root {
        --sys-brand: #bdc432;
        --sys-white: #ffffff;
        --sys-dark: #111111;
        --header-height: 60px;
    }

    .sys-header-wrapper {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: var(--header-height);
        background: #fff;
        z-index: 1000;
        display: flex;
        align-items: stretch;
        padding: 0 28px;
        justify-content: space-between;
        font-family: 'Outfit', 'Sarabun', sans-serif;
        border-bottom: 3.5px solid var(--sys-brand);
        box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    /* ─── Brand zone ─── */
    .sys-brand-zone {
        display: flex;
        align-items: center;
        gap: 0;
        text-decoration: none !important;
        pointer-events: none;
        user-select: none;
    }

    .sys-logo-img {
        height: 26px;
        width: auto;
    }

    .sys-divider {
        width: 1.5px;
        height: 18px;
        background: #ddd;
        margin: 0 16px;
    }

    .sys-project-name {
        font-weight: 700;
        font-size: 0.9rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #222;
    }

    /* ─── Center menu ─── */
    #sys-nav-inject {
        display: flex;
        align-items: stretch;
        height: 100%;
        gap: 0;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
    }

    .sys-menu-link {
        color: #888 !important;
        text-decoration: none !important;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0 20px;
        height: 100%;
        display: flex;
        align-items: center;
        transition: color 0.15s, border-bottom 0.15s;
        border-bottom: 3.5px solid transparent;
        margin-bottom: -3.5px;
        box-sizing: border-box;
        cursor: pointer;
    }

    .sys-menu-link:hover {
        color: #333 !important;
        border-bottom: 3.5px solid #ddd;
    }

    .sys-menu-link.active {
        color: #111 !important;
        border-bottom: 3.5px solid var(--sys-brand);
        font-weight: 800;
    }

    /* ─── Right zone ─── */
    .sys-user-zone {
        display: flex;
        align-items: center;
    }

    .btn-logout {
        background: none;
        border: none;
        color: #aaa;
        font-size: 1.2rem;
        cursor: pointer;
        padding: 6px 8px;
        border-radius: 8px;
        transition: color 0.15s, background 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
    }

    .btn-logout:hover {
        color: #e74c3c;
        background: #fff0ee;
    }
</style>

<div class="sys-header-wrapper">

    <div class="sys-brand-zone">
        <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" class="sys-logo-img" alt="Logo">
        <div class="sys-divider"></div>
        <span class="sys-project-name" id="project-title">---</span>
    </div>

    <div id="sys-nav-inject"></div>

    <div class="sys-user-zone">
        <button class="btn-logout" onclick="handleLogout()" title="Logout">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>

</div>
