<style>
    :root {
        --sys-main: #bdc432; 
        --sys-dark: #111111;
        --sys-grey: #adb5bd; 
        --sys-white: #ffffff;
        --header-height: 110px; /* เพิ่มขึ้นนิดนึงตามความกว้างเมนู */
    }

    .sys-header-wrapper {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: var(--header-height);
        background: var(--sys-white);
        border-bottom: 1.5px solid #eeeeee;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        font-family: 'Outfit', 'Sarabun', sans-serif;
    }

    .sys-top-bar {
        flex: 1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
    }

    .sys-brand-zone {
        display: flex;
        align-items: center;
        text-decoration: none !important;
        color: var(--sys-dark);
    }

    .sys-logo-img { height: 35px; width: auto; }
    .sys-divider { width: 1.5px; height: 25px; background: #ddd; margin: 0 15px; }
    .sys-project-name { font-weight: 800; font-size: 1.25rem; text-transform: uppercase; }

    .sys-user-zone { display: flex; align-items: center; gap: 15px; }
    #user-display { font-size: 0.85rem; font-weight: 600; color: #888; }
    .btn-user-profile { background: none; border: none; color: var(--sys-grey); font-size: 1.8rem; cursor: pointer; }

    /* --- แถบล่าง: เมนูแนวนอน (ปรับตามสั่ง) --- */
    #sys-menu-bar {
        height: 40px;           /* 🚩 ปรับความสูงเป็น 40px */
        background: var(--sys-main);
        display: flex;
        flex-direction: row;
        align-items: center;
        padding: 0 30px;
        gap: 2px;               /* ชิดกันนิดนึงเพื่อให้เห็นแถบ Active ต่อเนื่อง */
    }

    .sys-menu-link {
        color: var(--sys-dark) !important;
        text-decoration: none !important;
        font-size: 0.85rem;      /* 🚩 ชื่อเมนูใหญ่ขึ้น */
        font-weight: 700;        /* 🚩 ตัวหนาขึ้น */
        text-transform: uppercase;
        padding: 0 20px;         /* เพิ่มระยะคลิกซ้ายขวา */
        height: 100%;            /* ให้สูงเต็มแถว 40px */
        display: flex;
        align-items: center;
        transition: 0.2s;
        opacity: 0.6;            /* เมนูที่ไม่เลือกจะจางลง */
        border-bottom: 3px solid transparent; /* เตรียมพื้นที่ไว้ให้ขีดตอน Active */
    }

    .sys-menu-link:hover {
        opacity: 1;
        background: rgba(0,0,0,0.05);
    }

    /* 🚩 วิธีทำให้ดูออกว่าอยู่เมนูไหน (Active State) */
    .sys-menu-link.active {
        opacity: 1 !important;
        background: rgba(0,0,0,0.1);          /* พื้นหลังเข้มขึ้น */
        border-bottom: 3px solid var(--sys-dark); /* 🚩 ขีดเส้นใต้หนาๆ สีดำ */
        color: #000 !important;
    }

    .dropdown-menu { border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 12px; }
</style>

<div class="sys-header-wrapper">
    <div class="sys-top-bar">
        <a href="/index.html" class="sys-brand-zone">
            <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" class="sys-logo-img" alt="Logo">
            <div class="sys-divider"></div>
            <span class="sys-project-name" id="project-title">B-QUEST</span>
        </a>

        <div class="sys-user-zone">
            <span id="user-display">Loading...</span>
            <div class="dropdown">
                <button class="btn-user-profile" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/profiles.html"><i class="bi bi-person-gear"></i> Profiles</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-danger" href="javascript:void(0)" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Log Out</a></li>
                </ul>
            </div>
        </div>
    </div>

    <nav id="sys-menu-bar">
        </nav>
</div>
