<style>
    :root {
        --sys-brand: #bdc432; 
        --sys-dark: #111111;
        --sys-white: #ffffff;
    }

    /* แถบเมนูสี Brand (40px) */
    #sys-menu-bar {
        height: 40px;
        background: var(--sys-brand) !important;
        display: flex !important;
        padding: 0 30px;
        /* ป้องกันเส้นใต้มุดหาย */
        overflow: visible !important; 
    }

    #sys-nav-inject {
        display: flex;
        height: 40px; /* ล็อคความสูงให้เท่ากับ Bar */
    }

    .sys-menu-link {
        color: #ffffff !important; 
        text-decoration: none !important;
        font-size: 0.85rem;
        font-weight: 800;
        text-transform: uppercase;
        padding: 0 25px;
        
        /* 🚩 ส่วนสำคัญ: บังคับให้เส้นใต้อยู่ข้างในความสูง 40px */
        height: 40px !important;
        display: flex;
        align-items: center; /* ให้ตัวหนังสืออยู่กึ่งกลางแนวตั้ง */
        box-sizing: border-box !important; 
        
        transition: 0.2s;
        opacity: 0.5; /* เมนูทั่วไปให้จางลง */
        border-bottom: 4px solid transparent; /* จองที่ไว้แต่เป็นสีใส */
    }

    /* 🚩 เมื่อเมาส์ชี้ */
    .sys-menu-link:hover {
        opacity: 0.8;
    }

    /* 🚩 เมนูที่กำลังใช้งานอยู่ (Active): ต้องมีเส้นใต้ขาวโผล่มาแน่นอน */
    .sys-menu-link.active {
        opacity: 1 !important; 
        color: #ffffff !important;
        /* เส้นใต้สีขาว หนา 4px วางไว้ขอบล่างสุดของ 40px */
        border-bottom: 4px solid #ffffff !important; 
    }
</style>

<div class="sys-header-wrapper">
    <div class="sys-top-bar">
        <a href="/index.html" class="sys-brand-zone">
            <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" class="sys-logo-img" alt="Logo">
            <div class="sys-divider"></div>
            <span class="sys-project-name" id="project-title">---</span>
        </a>

        <div class="sys-user-zone">
            <span id="user-display">Loading...</span>
            <div class="dropdown">
                <button class="btn-user-profile" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/profiles.html"><i class="bi bi-person-gear"></i> Profiles</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item text-danger" href="javascript:void(0)" onclick="handleLogout()">
                            Log Out
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <nav id="sys-menu-bar">
        <div id="sys-nav-inject">
            </div>
    </nav>
</div>
