<style>
    :root {
        --sys-brand: #bdc432; /* สีเขียวเลมอน */
        --sys-white: #ffffff;
        --sys-dark: #111111;
        --header-height: 105px;
    }

    /* โครงสร้างหลัก 105px Fixed */
    .sys-header-wrapper {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: var(--header-height);
        background: #ffffff;
        border-bottom: 1px solid #eee;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        font-family: 'Outfit', 'Sarabun', sans-serif;
    }

    /* ส่วนบน 65px */
    .sys-top-bar {
        height: 65px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
    }

    /* แถบเมนูสีเขียว 40px */
    #sys-menu-bar {
        height: 40px;
        background: var(--sys-brand) !important;
        display: flex;
        padding: 0 30px;
    }

    #sys-nav-inject {
        display: flex;
        height: 100%;
    }

    /* 🚩 เมนูปกติ: ขาวเต็ม 100% */
    .sys-menu-link {
        height: 100%;
        display: flex;
        align-items: center;
        padding: 0 25px;
        text-decoration: none !important;
        font-weight: 800;
        font-size: 0.85rem;
        text-transform: uppercase;
        transition: all 0.2s ease;
        
        color: #ffffff !important; /* ขาวชัดเจน */
        opacity: 1 !important;      /* ไม่จาง */
        border-bottom: 4px solid transparent; /* จองที่เส้นใต้ */
        box-sizing: border-box !important;
    }

    /* 🚩 เมื่อเมาส์ชี้ (Hover): เปลี่ยนเป็นสีดำเข้ม */
    .sys-menu-link:hover {
        color: var(--sys-dark) !important;
        background: rgba(0,0,0,0.05); /* เพิ่มมิตินิดหน่อยตอนชี้ */
    }

    /* 🚩 เมื่อเป็นหน้าปัจจุบัน (Active): มีขีดใต้สีขาว */
    .sys-menu-link.active {
        border-bottom: 4px solid #ffffff !important;
        color: #ffffff !important;
    }

    /* โลโก้และ User Profile */
    .sys-brand-zone { display: flex; align-items: center; text-decoration: none; color: var(--sys-dark); }
    .sys-logo-img { height: 32px; }
    .sys-divider { width: 1px; height: 20px; background: #ddd; margin: 0 15px; }
    .sys-project-name { font-weight: 800; font-size: 1.2rem; text-transform: uppercase; }
    .btn-user-profile { background: none; border: none; color: #adb5bd; font-size: 1.8rem; cursor: pointer; }
</style>

<div class="sys-header-wrapper">
    <div class="sys-top-bar">
        <a href="/" class="sys-brand-zone">
            <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" class="sys-logo-img">
            <div class="sys-divider"></div>
            <span class="sys-project-name" id="project-title">---</span>
        </a>
        <div class="sys-user-zone">
            <span id="user-display" style="font-size:0.8rem; color:#888;">User...</span>
            <div class="dropdown">
                <button class="btn-user-profile" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i></button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item text-danger" href="javascript:void(0)" onclick="handleLogout()">Log Out</a></li>
                </ul>
            </div>
        </div>
    </div>
    <nav id="sys-menu-bar">
        <div id="sys-nav-inject"></div>
    </nav>
</div>
