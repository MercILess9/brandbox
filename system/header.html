<style>
    :root {
        --sys-brand: #bdc432;
        --sys-white: #ffffff;
        --sys-dark: #111111;
        --sys-hover: rgba(255,255,255,0.65);
        --header-height: 60px;
    }

    .sys-header-wrapper {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: var(--header-height);
        background: var(--sys-brand);
        z-index: 1000;
        display: flex;
        align-items: center;
        padding: 0 28px;
        justify-content: space-between;
        font-family: 'Outfit', 'Sarabun', sans-serif;
        box-shadow: 0 2px 12px rgba(0,0,0,0.13);
    }

    /* ─── Brand zone ─── */
    .sys-brand-zone {
        display: flex;
        align-items: center;
        gap: 0;
        text-decoration: none !important;
        pointer-events: none;
        user-select: none;
    }

    .sys-logo-img {
        height: 28px;
        width: auto;
        filter: brightness(0) invert(1);
        opacity: 0.92;
    }

    .sys-divider {
        width: 1.5px;
        height: 18px;
        background: rgba(255,255,255,0.4);
        margin: 0 16px;
    }

    .sys-project-name {
        font-weight: 700;
        font-size: 0.95rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #fff;
        opacity: 0.95;
    }

    /* ─── Center menu ─── */
    #sys-nav-inject {
        display: flex;
        align-items: center;
        height: 100%;
        gap: 2px;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
    }

    .sys-menu-link {
        color: rgba(255,255,255,0.82) !important;
        text-decoration: none !important;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        padding: 0 18px;
        height: 100%;
        display: flex;
        align-items: center;
        transition: color 0.18s, background 0.18s;
        border-bottom: 3px solid transparent;
        box-sizing: border-box;
        border-radius: 0;
    }

    .sys-menu-link:hover {
        color: #fff !important;
        background: rgba(255,255,255,0.12);
    }

    .sys-menu-link.active {
        color: #fff !important;
        border-bottom: 3px solid rgba(255,255,255,0.9);
        background: rgba(255,255,255,0.08);
    }

    /* ─── Right zone ─── */
    .sys-user-zone {
        display: flex;
        align-items: center;
    }

    .btn-logout {
        background: none;
        border: none;
        color: rgba(255,255,255,0.75);
        font-size: 1.25rem;
        cursor: pointer;
        padding: 6px 8px;
        border-radius: 8px;
        transition: color 0.18s, background 0.18s;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
    }

    .btn-logout:hover {
        color: #fff;
        background: rgba(255,255,255,0.15);
    }
</style>

<div class="sys-header-wrapper">

    <div class="sys-brand-zone">
        <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" class="sys-logo-img" alt="Logo">
        <div class="sys-divider"></div>
        <span class="sys-project-name" id="project-title">---</span>
    </div>

    <div id="sys-nav-inject"></div>

    <div class="sys-user-zone">
        <button class="btn-logout" onclick="handleLogout()" title="Logout">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>

</div>
