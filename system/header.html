<style>
    :root {
        --sys-main: #bdc432; /* สีเขียว Lime ของพี่ */
        --sys-dark: #111111;
        --sys-white: #ffffff;
        --header-height: 105px;
    }

    .sys-header-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--header-height);
        background: var(--sys-white);
        border-bottom: 1.5px solid #eeeeee;
        z-index: 1000;
        display: flex;
        flex-direction: column;
    }

    /* แถบบน: Logo & User */
    .sys-top-bar {
        flex: 1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 40px;
    }

    .sys-logo-link {
        display: flex;
        align-items: center;
        text-decoration: none !important;
        transition: 0.3s;
    }
    .sys-logo-link:hover { opacity: 0.8; }
    
    .sys-logo-img {
        height: 45px;
        width: auto;
        margin-right: 15px;
    }

    .sys-project-name {
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        font-size: 1.4rem;
        color: var(--sys-dark);
        letter-spacing: -0.5px;
        text-transform: uppercase;
    }

    /* ฝั่งขวา: User & Menu */
    .sys-user-zone {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    #user-display {
        font-size: 0.9rem;
        font-weight: 600;
        color: #666;
    }

    .sys-profile-dropdown .btn-user {
        background: none;
        border: none;
        padding: 0;
        color: var(--sys-dark);
        font-size: 1.8rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        transition: 0.2s;
    }
    .sys-profile-dropdown .btn-user:hover { color: var(--sys-main); }

    /* ปรับแต่ง Dropdown ของ Bootstrap ให้เข้ากับสไตล์เรา */
    .sys-profile-dropdown .dropdown-menu {
        border: none;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        border-radius: 12px;
        padding: 8px;
        margin-top: 10px !important;
        min-width: 180px;
    }

    .sys-profile-dropdown .dropdown-item {
        border-radius: 8px;
        padding: 10px 15px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--sys-dark);
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .sys-profile-dropdown .dropdown-item:hover {
        background-color: #f8fbef;
        color: var(--sys-main);
    }
    .sys-profile-dropdown .text-danger:hover {
        background-color: #fff5f5;
        color: #dc3545;
    }

    /* แถบล่าง: เมนูสีเขียว */
    #sys-menu-bar {
        height: 35px;
        background: var(--sys-main);
        display: flex;
        align-items: center;
        padding: 0 40px;
        gap: 25px;
    }

    .sys-menu-link {
        color: var(--sys-dark);
        text-decoration: none !important;
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.7;
        transition: 0.2s;
    }
    .sys-menu-link:hover, .sys-menu-link.active {
        opacity: 1;
    }
</style>

<div class="sys-header-wrapper">
    <div class="sys-top-bar">
        <a href="/index.html" class="sys-logo-link">
            <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" class="sys-logo-img" alt="Logo">
            <span class="sys-project-name" id="project-title">SYSTEM</span>
        </a>

        <div class="sys-user-zone">
            <span id="user-display">Loading...</span>

            <div class="dropdown sys-profile-dropdown">
                <button class="btn-user" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item" href="/profiles.html">
                            <i class="bi bi-person-gear"></i> Profiles
                        </a>
                    </li>
                    <li><hr class="dropdown-divider opacity-50"></li>
                    <li>
                        <a class="dropdown-item text-danger" href="javascript:void(0)" onclick="logout()">
                            <i class="bi bi-box-arrow-right"></i> Log Out
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <nav id="sys-menu-bar">
        </nav>
</div>
