<style>
    :root {
        --sys-brand: #bdc432; 
        --sys-white: #ffffff;
        --sys-dark: #111111;
        --header-height: 105px;
    }

    /* รีเซ็ตพื้นฐานป้องกันเละ */
    .sys-header-wrapper, .sys-header-wrapper * { box-sizing: border-box; }

    .sys-header-wrapper {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: var(--header-height);
        background: #fff;
        border-bottom: 1px solid #eee;
        z-index: 1000;
        display: flex;
        flex-direction: column;
    }

    /* ส่วน Logo */
    .sys-top-bar {
        height: 65px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
    }

    .sys-brand-zone { display: flex; align-items: center; text-decoration: none; color: var(--sys-dark); }
    .sys-logo-img { height: 32px; }
    .sys-divider { width: 1px; height: 20px; background: #ddd; margin: 0 15px; }
    .sys-project-name { font-weight: 800; font-size: 1.2rem; text-transform: uppercase; }

    /* 🚩 ส่วนเมนู 40px (ตัวหนังสือขาวทั้งหมด) */
    #sys-menu-bar {
        height: 40px;
        background: var(--sys-brand) !important;
        display: flex;
        padding: 0 20px;
    }

    #sys-nav-inject { display: flex; height: 100%; }

    .sys-menu-link {
        height: 100%;
        display: flex;
        align-items: center;
        padding: 0 20px;
        text-decoration: none !important;
        font-weight: 700;
        font-size: 0.85rem;
        text-transform: uppercase;
        
        /* บังคับตัวหนังสือขาว */
        color: rgba(255, 255, 255, 0.6) !important; 
        border-bottom: 4px solid transparent;
        transition: 0.2s;
    }

    /* 🚩 เมื่อ Active: ขาวชัดเจน + ขีดใต้ขาว */
    .sys-menu-link.active {
        color: #ffffff !important;
        opacity: 1 !important;
        border-bottom: 4px solid #ffffff !important;
    }

    .sys-menu-link:hover { color: #fff !important; opacity: 1; }

    /* Dropdown User */
    .btn-user-profile { background: none; border: none; color: #adb5bd; font-size: 1.6rem; cursor: pointer; }
</style>

<div class="sys-header-wrapper">
    <div class="sys-top-bar">
        <a href="/" class="sys-brand-zone">
            <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" class="sys-logo-img">
            <div class="sys-divider"></div>
            <span class="sys-project-name" id="project-title">---</span>
        </a>
        <div class="sys-user-zone">
            <span id="user-display" style="font-size:0.8rem; color:#888;">User...</span>
            <div class="dropdown">
                <button class="btn-user-profile" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i></button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="javascript:void(0)" onclick="handleLogout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </div>
    <nav id="sys-menu-bar">
        <div id="sys-nav-inject"></div>
    </nav>
</div>
