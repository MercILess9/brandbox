<style>
    :root {
        --sys-brand: #bdc432; /* สีเขียวเลมอน Brand ของพี่ */
        --sys-dark: #111111;
        --sys-grey: #adb5bd; /* สีเทาสำหรับไอคอนคน */
        --sys-white: #ffffff;
        --header-height: 105px; 
    }

    /* ตัวหุ้ม Header ทั้งหมด */
    .sys-header-wrapper {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: var(--header-height);
        background: var(--sys-white);
        border-bottom: 1.5px solid #eeeeee;
        /* 🚩 แก้ปัญหาหัวขาด: ปรับ z-index ให้ต่ำกว่า Modal (Bootstrap Modal คือ 1050) */
        z-index: 1000 !important; 
        display: flex;
        flex-direction: column;
        font-family: 'Outfit', 'Sarabun', sans-serif;
    }

    /* --- แถบบน: Logo & User (สูงประมาณ 65px) --- */
    .sys-top-bar {
        flex: 1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
    }

    .sys-brand-zone {
        display: flex;
        align-items: center;
        text-decoration: none !important;
        color: var(--sys-dark);
        transition: 0.2s;
    }
    .sys-brand-zone:hover { opacity: 0.8; }

    .sys-logo-img { height: 32px; width: auto; }
    .sys-divider { width: 1.5px; height: 20px; background: #ddd; margin: 0 15px; }
    
    /* ชื่อโปรเจกต์ (รับค่าจาก config.projectName) */
    .sys-project-name { 
        font-weight: 800; 
        font-size: 1.2rem; 
        text-transform: uppercase; 
        letter-spacing: -0.5px; 
    }

    .sys-user-zone { display: flex; align-items: center; gap: 12px; }
    #user-display { font-size: 0.85rem; font-weight: 600; color: #888; }

    /* ปุ่มไอคอนคนสีเทา */
    .btn-user-profile { 
        background: none; border: none; padding: 0;
        color: var(--sys-grey); font-size: 1.8rem; 
        cursor: pointer; display: flex; align-items: center; 
        transition: 0.2s;
    }
    .btn-user-profile:hover { color: var(--sys-brand); }

    /* --- แถบล่าง: เมนูสี Brand (สูง 40px) --- */
    #sys-menu-bar {
        height: 40px;
        background: var(--sys-brand) !important;
        display: flex !important;
        flex-direction: row !important;
        align-items: center;
        padding: 0 30px;
        gap: 0;
    }

    .sys-menu-link {
        color: var(--sys-dark) !important;
        text-decoration: none !important;
        font-size: 0.85rem;
        font-weight: 800;
        text-transform: uppercase;
        padding: 0 25px;
        height: 100%;
        display: flex;
        align-items: center;
        transition: 0.3s;
        opacity: 0.5; /* เมนูที่ไม่เลือกจะดำจางๆ */
        border-bottom: 4px solid transparent;
    }

    .sys-menu-link:hover { opacity: 0.8; }

    /* 🚩 ไฮไลท์เมนูที่ใช้งานอยู่: ตัวหนังสือขาว + เส้นใต้ขาว */
    .sys-menu-link.active {
        color: var(--sys-white) !important;      /* ตัวหนังสือขาว */
        opacity: 1 !important;                   /* ชัดเจน 100% */
        border-bottom: 4px solid var(--sys-white) !important; /* เส้นใต้ขาว 4px */
    }

    /* Dropdown ปรับแต่ง */
    .dropdown-menu { 
        border: none; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        border-radius: 12px; 
        padding: 8px; 
        z-index: 1100; /* ให้ Dropdown ลอยเหนือ Header */
    }
    .dropdown-item { 
        border-radius: 8px; 
        padding: 10px 15px; 
        font-size: 0.9rem; 
        font-weight: 600; 
        color: var(--sys-dark);
    }
    .dropdown-item:hover { background: #f8fbef; color: var(--sys-brand); }
</style>

<div class="sys-header-wrapper">
    <div class="sys-top-bar">
        <a href="/index.html" class="sys-brand-zone">
            <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" class="sys-logo-img" alt="Logo">
            <div class="sys-divider"></div>
            <span class="sys-project-name" id="project-title">---</span>
        </a>

        <div class="sys-user-zone">
            <span id="user-display">Loading...</span>
            
            <div class="dropdown">
                <button class="btn-user-profile" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="/profiles.html"><i class="bi bi-person-gear"></i> Profiles</a></li>
                    <li><hr class="dropdown-divider opacity-50"></li>
                    <li>
                        <a class="dropdown-item text-danger" href="javascript:void(0)" onclick="window.logout()">
                            <i class="bi bi-box-arrow-right"></i> Log Out
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <nav id="sys-menu-bar">
        </nav>
</div>
