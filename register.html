<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B-QUEST Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --brand-accent: #bdc432;
    --font: "Outfit", sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: var(--font);
    background: linear-gradient(135deg,#a39f40,#bdc432);
    display:flex; justify-content:center; align-items:center;
    min-height:100vh;
}

.card {
    background:#fff;
    padding:2rem;
    border-radius:16px;
    width:100%;
    max-width:420px;
}

h2 { text-align:center; margin-bottom:1.5rem; }

.input-group { margin-bottom:1rem; position:relative; }

input, select {
    width:100%;
    padding:12px 45px 12px 12px;
    border-radius:10px;
    border:1px solid #ddd;
}

.password-toggle {
    position:absolute;
    right:10px;
    top:35px;
    cursor:pointer;
    z-index:2;
}

button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--brand-accent);
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>B-QUEST Register</h2>

<form id="form">

<div class="input-group">
<input type="text" id="employee_id" placeholder="Employee ID" required>
</div>

<div class="input-group">
<select id="role" required>
<option value="">Select Role</option>
<option>Creative</option>
<option>Designer</option>
<option>AE</option>
</select>
</div>

<div class="input-group">
<input type="text" id="full_name" placeholder="Full Name" required>
</div>

<div class="input-group">
<input type="email" id="email" placeholder="Email" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
<span class="password-toggle" onclick="togglePass('password',this)">👁️</span>
</div>

<div class="input-group">
<input type="password" id="confirm_password" placeholder="Confirm Password" required>
<span class="password-toggle" onclick="togglePass('confirm_password',this)">👁️</span>
</div>

<button type="submit">Sign Up</button>

</form>
</div>

<script>
// 🔹 toggle password
function togglePass(id, el){
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

// 🔹 ใส่ค่าจริงตรงนี้
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔹 submit
document.getElementById("form").addEventListener("submit", async(e)=>{
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm_password").value;

    if(password !== confirm){
        Swal.fire("Error","Password not match","error");
        return;
    }

    Swal.fire({title:"Loading...", allowOutsideClick:false});
    Swal.showLoading();

    try{
        const { data, error } = await supabaseClient.auth.signUp({
            email,
            password,
            options:{
                data:{
                    employee_id: document.getElementById("employee_id").value,
                    full_name: document.getElementById("full_name").value,
                    role: document.getElementById("role").value
                }
            }
        });

        if(error){
            Swal.fire("Error", error.message, "error");
        } else {
            Swal.fire("Success","Check your email","success")
            .then(()=> window.location.href="login.html");
        }

    } catch(err){
        Swal.fire("Error", err.message, "error");
    }
});
</script>

</body>
</html>
