<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Register</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Outfit", sans-serif; }

        body {
            /* สีเขียวไล่เฉดตามรูปตัวอย่างเป๊ะๆ */
            background: linear-gradient(135deg, #7c7a2d 0%, #bdc432 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .card {
            background: #fff; padding: 40px; border-radius: 20px;
            width: 100%; max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .logo { font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 30px; letter-spacing: -1px; }

        .group { margin-bottom: 18px; position: relative; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #333; }

        input, select {
            width: 100%; padding: 12px 15px; border: 1.5px solid #eee;
            border-radius: 10px; font-size: 15px; outline: none;
        }
        
        /* ช่องรหัสผ่าน: เผื่อที่ด้านขวาเยอะๆ หลบ Bitwarden และวางปุ่มตา */
        .pass-input { padding-right: 80px !important; }

        input:focus { border-color: #bdc432; background: #fafbf2; }

        .row { display: flex; gap: 10px; }
        .row .group { flex: 1; }

        /* ปุ่มรูปตา: ล็อคตำแหน่งให้ตายตัวที่ด้านขวา */
        .eye-btn {
            position: absolute; 
            right: 42px; /* หลบ Bitwarden */
            top: 36px;   /* วางตำแหน่งกึ่งกลาง input */
            background: none; border: none; cursor: pointer;
            color: #888; padding: 5px; z-index: 99;
            display: flex; align-items: center;
        }

        .btn-main {
            width: 100%; padding: 16px; background: #bdc432;
            border: none; border-radius: 10px; color: #fff;
            font-weight: 700; font-size: 16px; cursor: pointer;
            margin-top: 10px; transition: 0.2s;
        }
        .btn-main:hover { background: #a39f40; }

        .link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .link a { color: #000; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">B-QUEST</div>

    <form id="regForm">
        <div class="row">
            <div class="group"><label>Employer ID</label><input id="emp_id" placeholder="BXXXX" required></div>
            <div class="group">
                <label>Role</label>
                <select id="role_val" required>
                    <option value="">Select</option>
                    <option>Creative</option><option>Designer</option><option>AE</option>
                </select>
            </div>
        </div>

        <div class="group"><label>Nick Name</label><input id="nick" placeholder="Nick name"></div>
        <div class="group"><label>Full Name</label><input id="full" placeholder="Full name" required></div>
        <div class="group"><label>Email</label><input id="email_val" type="email" placeholder="name@brand-strom.com" required></div>

        <div class="group">
            <label>Password</label>
            <input id="pass_val" type="password" class="pass-input" placeholder="Min 6 chars" required minlength="6">
            <button type="button" class="eye-btn" onclick="toggle('pass_val', this)"></button>
        </div>

        <div class="group">
            <label>Confirm Password</label>
            <input id="conf_val" type="password" class="pass-input" placeholder="Repeat password" required>
            <button type="button" class="eye-btn" onclick="toggle('conf_val', this)"></button>
        </div>

        <button class="btn-main" type="submit">Sign Up</button>
    </form>
    <div class="link">Already have an account? <a href="login.html">Sign in</a></div>
</div>

<script>
    // 1. ICONS
    const open = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    const close = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

    document.querySelectorAll(".eye-btn").forEach(b => b.innerHTML = open);

    function toggle(id, btn) {
        const x = document.getElementById(id);
        if (x.type === "password") {
            x.type = "text"; btn.innerHTML = close;
        } else {
            x.type = "password"; btn.innerHTML = open;
        }
    }

    // 2. SUPABASE (ใส่การดัก Error ตั้งแต่เริ่ม)
    let sb;
    try {
        sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } catch(e) {
        console.error("Config fail:", e);
    }

    // 3. SUBMIT
    document.getElementById("regForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        // ทริกเกอร์ Popup ทันทีที่กด (จะได้รู้ว่า JS ไม่ตาย)
        Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        const p1 = document.getElementById("pass_val").value;
        const p2 = document.getElementById("conf_val").value;
        const em = document.getElementById("email_val").value;

        if (p1 !== p2) return Swal.fire("Error", "Passwords do not match", "error");
        if (!em.endsWith('@brand-strom.com')) return Swal.fire("Access Denied", "Use @brand-strom.com only", "warning");

        try {
            const { error } = await sb.auth.signUp({
                email: em,
                password: p1,
                options: {
                    data: {
                        employee_id: document.getElementById("emp_id").value,
                        nick_name: document.getElementById("nick").value,
                        full_name: document.getElementById("full").value,
                        role: document.getElementById("role_val").value
                    }
                }
            });

            if (error) throw error;

            Swal.fire({ icon: "success", title: "Complete!", text: "Check your email." }).then(() => location.href = "login.html");
        } catch (err) {
            Swal.fire("Failed", err.message, "error");
        }
    });
</script>

</body>
</html>
