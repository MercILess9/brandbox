<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST Registration | BrandBox Platform</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --brand-primary: #000000;
            --brand-bg: #ffffff;
            --brand-accent: #bdc432; /* สีเขียวมะกอกตามรูป */
            --brand-text: #000000;
            --brand-on-accent: #ffffff;
            --brand-font-sans: "Outfit", "LINESeedSansTH", system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--brand-font-sans);
            /* Gradient Background ตามตัวอย่างที่พี่ส่งมา */
            background: linear-gradient(135deg, #a39f40 0%, #bdc432 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--brand-text);
        }

        .login-card {
            background: var(--brand-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
        }

        .brand-logo {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-size: 15px;
            font-family: var(--brand-font-sans);
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--brand-accent);
            background-color: #fafbf2;
        }

        .row-inputs {
            display: flex;
            gap: 1rem;
        }

        button.btn-signup {
            width: 100%;
            padding: 16px;
            background-color: var(--brand-accent);
            color: var(--brand-on-accent);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s;
        }

        button.btn-signup:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .signin-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 14px;
            color: #666;
        }

        .signin-link a {
            color: var(--brand-primary);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">B-QUEST</div>

    <form id="registerForm">
        <div class="row-inputs">
            <div class="input-group" style="flex: 1;">
                <label>Employer ID</label>
                <input type="text" id="employee_id" placeholder="BXXXX" required>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Role</label>
                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="Creative">Creative</option>
                    <option value="Designer">Designer</option>
                    <option value="AE">AE</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Nick Name</label>
            <input type="text" id="nick_name" placeholder="Enter nickname">
        </div>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="full_name" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="name@brand-strom.com" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm_password" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="btn-signup">Sign Up</button>
    </form>

    <div class="signin-link">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>

<script>
    // --- ⚠️ สำคัญ: ใส่ API KEY ของพี่ตรงนี้ ⚠️ ---
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_ANON_KEY';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('registerForm');
    
    form.onsubmit = async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirm_pass = document.getElementById('confirm_password').value;
        
        // 1. ตรวจสอบรหัสผ่าน
        if (password !== confirm_pass) {
            Swal.fire({
                icon: 'error',
                title: 'Oops...',
                text: 'Passwords do not match!',
                confirmButtonColor: '#000000'
            });
            return;
        }

        // 2. ตรวจสอบ Domain Email
        if (!email.endsWith('@brand-strom.com')) {
            Swal.fire({
                icon: 'warning',
                title: 'Invalid Email',
                text: 'Please use @brand-strom.com only.',
                confirmButtonColor: '#bdc432'
            });
            return;
        }

        // แสดง Loading ตอนกดปุ่ม
        Swal.fire({
            title: 'Processing...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        // 3. ส่งข้อมูลไป Supabase
        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                data: {
                    employee_id: document.getElementById('employee_id').value,
                    full_name: document.getElementById('full_name').value,
                    nick_name: document.getElementById('nick_name').value,
                    role: document.getElementById('role').value
                }
            }
        });

        if (error) {
            Swal.fire({
                icon: 'error',
                title: 'Failed',
                text: error.message,
                confirmButtonColor: '#000000'
            });
        } else {
            // ✅ สำเร็จ! แสดง Popup และเด้งไปหน้า login.html
            Swal.fire({
                icon: 'success',
                title: 'Complete!',
                text: 'Registration successful! Check your email to verify.',
                confirmButtonColor: '#bdc432',
                timer: 3000,
                timerProgressBar: true
            }).then(() => {
                window.location.href = 'login.html';
            });
        }
    };
</script>

</body>
</html>
