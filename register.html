<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST Registration | BrandBox</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --brand-primary: #000000;
            --brand-bg: #ffffff;
            --brand-accent: #bdc432;
            --brand-font-sans: "Outfit", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--brand-font-sans);
            background: linear-gradient(135deg, #a39f40 0%, #bdc432 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }

        .login-card {
            background: white; padding: 2.5rem; border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); width: 100%; max-width: 450px;
        }

        .brand-logo { font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 2rem; }

        .input-group { margin-bottom: 1.2rem; position: relative; }

        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 0.5rem; }

        input, select {
            width: 100%; padding: 12px 16px; border: 1.5px solid #eee;
            border-radius: 10px; font-size: 15px; font-family: var(--brand-font-sans);
        }

        input:focus { outline: none; border-color: var(--brand-accent); background-color: #fafbf2; }

        /* Style ปรับปรุงปุ่ม Show Password */
        .password-toggle-btn {
            position: absolute; right: 8px; top: 34px;
            background: none; border: none; cursor: pointer; color: #666;
            padding: 8px; display: flex; align-items: center; justify-content: center;
        }

        .row-inputs { display: flex; gap: 1rem; }
        
        .btn-signup {
            width: 100%; padding: 16px; background-color: var(--brand-accent);
            color: white; border: none; border-radius: 10px; font-weight: 700;
            font-size: 16px; cursor: pointer; margin-top: 1rem;
        }

        .signin-link { text-align: center; margin-top: 1.5rem; font-size: 14px; }
        .signin-link a { color: var(--brand-primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">B-QUEST</div>

    <form id="registerForm">
        <div class="row-inputs">
            <div class="input-group" style="flex: 1;">
                <label>Employer ID</label>
                <input type="text" id="employee_id" placeholder="BXXXX" required>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>Role</label>
                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="Creative">Creative</option>
                    <option value="Designer">Designer</option>
                    <option value="AE">AE</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Nick Name</label>
            <input type="text" id="nick_name" placeholder="Your nickname">
        </div>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="full_name" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="name@brand-strom.com" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min 6 characters" required>
            <button type="button" class="password-toggle-btn" onclick="togglePass('password', this)">
                <svg id="eye-icon-password" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirm_password" placeholder="Confirm your password" required>
            <button type="button" class="password-toggle-btn" onclick="togglePass('confirm_password', this)">
                <svg id="eye-icon-confirm_password" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </div>

        <button type="submit" class="btn-signup">Sign Up</button>
    </form>

    <div class="signin-link">Already have an account? <a href="login.html">Sign in</a></div>
</div>

<script>
    // 1. Show Password Logic (แก้ไขใหม่ให้ทำงานแน่นอน)
    const eyeOpen = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    const eyeOff = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

    function togglePass(id, btn) {
        const input = document.getElementById(id);
        if (input.type === 'password') {
            input.type = 'text';
            btn.innerHTML = eyeOff;
        } else {
            input.type = 'password';
            btn.innerHTML = eyeOpen;
        }
    }

    // 2. Supabase Setup
    const SUPABASE_URL = 'YOUR_SUPABASE_URL'; // <-- ใส่ URL ตรงนี้
    const SUPABASE_KEY = 'YOUR_ANON_KEY'; // <-- ใส่ Key ตรงนี้

    let supabase;
    try {
        supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } catch(e) {
        console.error("Supabase fail:", e);
    }

    // 3. Register Function
    const form = document.getElementById('registerForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Check if Keys are missing
        if(SUPABASE_URL === 'YOUR_SUPABASE_URL') {
            Swal.fire('Config Error', 'Please enter your Supabase URL/Key in the code.', 'error');
            return;
        }

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirm_password = document.getElementById('confirm_password').value;

        // Validation
        if (password !== confirm_password) {
            Swal.fire('Error', 'Passwords do not match!', 'error');
            return;
        }
        if (!email.endsWith('@brand-strom.com')) {
            Swal.fire('Warning', 'Use @brand-strom.com only', 'warning');
            return;
        }

        // Show Loading (เพื่อให้รู้ว่ากำลังทำงาน)
        Swal.fire({ title: 'Signing up...', allowOutsideClick: false });
        Swal.showLoading();

        // Call Supabase
        const { data, error } = await supabase.auth.signUp({
            email: email, password: password,
            options: {
                data: {
                    employee_id: document.getElementById('employee_id').value,
                    full_name: document.getElementById('full_name').value,
                    nick_name: document.getElementById('nick_name').value,
                    role: document.getElementById('role').value
                }
            }
        });

        if (error) {
            Swal.fire('Failed', error.message, 'error');
        } else {
            // Success Popup
            Swal.fire({
                icon: 'success',
                title: 'Complete!',
                text: 'Check your email for confirmation.',
                confirmButtonColor: '#bdc432'
            }).then(() => {
                window.location.href = 'login.html';
            });
        }
    });
</script>

</body>
</html>
