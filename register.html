<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Quest Register | BrandBox</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --olive-green: #b5b24c;
            --bg-gray: #f5f7f8;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .register-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 6px solid var(--olive-green);
        }
        h2 { text-align: center; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 14px; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--olive-green);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="register-card">
    <h2>สมัครสมาชิก B-Quest</h2>
    <form id="registerForm">
        <div class="input-group">
            <label>รหัสพนักงาน (Employee ID)</label>
            <input type="text" id="employee_id" placeholder="เช่น STROM-001" required>
        </div>
        <div class="input-group">
            <label>ชื่อ-นามสกุลจริง</label>
            <input type="text" id="full_name" required>
        </div>
        <div class="input-group">
            <label>ชื่อเล่น</label>
            <input type="text" id="nick_name">
        </div>
        <div class="input-group">
            <label>ตำแหน่ง (Role)</label>
            <select id="role" required>
                <option value="">-- เลือกตำแหน่ง --</option>
                <option value="Creative">Creative</option>
                <option value="Designer">Designer</option>
                <option value="AE">AE</option>
            </select>
        </div>
        <div class="input-group">
            <label>อีเมลบริษัท (@brand-strom.com)</label>
            <input type="email" id="email" placeholder="name@brand-strom.com" required>
        </div>
        <div class="input-group">
            <label>รหัสผ่าน</label>
            <input type="password" id="password" required minlength="6">
        </div>
        <div class="input-group">
            <label>ยืนยันรหัสผ่าน</label>
            <input type="password" id="confirm_password" required>
        </div>
        <button type="submit">สมัครสมาชิก</button>
    </form>
</div>

<script>
    // --- STEP 2: ใส่ API Key ของพี่ตรงนี้ ---
    const SUPABASE_URL = 'URL_ของพี่';
    const SUPABASE_KEY = 'ANON_KEY_ของพี่';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('registerForm');
    
    form.onsubmit = async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirm_pass = document.getElementById('confirm_password').value;
        
        // เช็ครหัสผ่านตรงกันไหม
        if (password !== confirm_pass) {
            alert("รหัสผ่านไม่ตรงกันครับ!");
            return;
        }

        // เช็ค Email Domain
        if (!email.endsWith('@brand-strom.com')) {
            alert("ต้องใช้เมล @brand-strom.com เท่านั้นครับ");
            return;
        }

        // สั่งสมัครสมาชิก
        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                data: {
                    employee_id: document.getElementById('employee_id').value,
                    full_name: document.getElementById('full_name').value,
                    nick_name: document.getElementById('nick_name').value,
                    role: document.getElementById('role').value
                }
            }
        });

        if (error) {
            alert("Error: " + error.message);
        } else {
            alert("สมัครสำเร็จ! กรุณาตรวจสอบอีเมลเพื่อกดยืนยันตัวตนนะครับ");
            form.reset();
        }
    };
</script>

</body>
</html>
