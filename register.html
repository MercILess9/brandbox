<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Register</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script> <style>
        :root {
            --brand-accent: #bdc432;
            --brand-accent-dark: #7c7a2d;
            --font-main: "Outfit", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }

        body {
            /* ไล่เฉดสีตามสั่ง */
            background: linear-gradient(135deg, var(--brand-accent-dark) 0%, var(--brand-accent) 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .card {
            background: #fff; padding: 2.5rem; border-radius: 20px;
            width: 100%; max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        .logo { font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 2rem; letter-spacing: -1px; }

        .group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 6px; color: #333; }

        /* กล่องหุ้มเพื่อให้ปุ่มตาชิดขวาได้แม่นยำ */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input, select {
            width: 100%; padding: 12px 16px; border: 1.5px solid #eee;
            border-radius: 12px; font-size: 15px; outline: none; transition: 0.2s;
        }

        /* เผื่อที่ด้านขวาให้รูปตา */
        .pass-input { padding-right: 50px !important; }

        input:focus { border-color: var(--brand-accent); background: #fafbf2; }

        /* ปุ่มรูปตา: ชิดขวาเป๊ะ 15px */
        .eye-btn {
            position: absolute;
            right: 15px;
            background: none; border: none; cursor: pointer;
            color: #888; display: flex; align-items: center;
            z-index: 5;
        }

        .row { display: flex; gap: 0.8rem; }
        .row .group { flex: 1; }

        .btn-main {
            width: 100%; padding: 16px; background: var(--brand-accent);
            border: none; border-radius: 12px; color: #fff;
            font-weight: 700; font-size: 16px; cursor: pointer;
            margin-top: 1rem; transition: 0.2s;
        }
        .btn-main:hover { background: var(--brand-accent-dark); }

        .link { text-align: center; margin-top: 1.5rem; font-size: 14px; color: #666; }
        .link a { color: #000; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">B-QUEST</div>

    <form id="regForm">
        <div class="row">
            <div class="group"><label>Employer ID</label><input id="emp_id" placeholder="BXXXX" required></div>
            <div class="group">
                <label>Role</label>
                <select id="role_val" required>
                    <option value="">Select</option>
                    <option>Creative</option><option>Designer</option><option>AE</option>
                </select>
            </div>
        </div>

        <div class="group"><label>Nick Name</label><input id="nick" placeholder="Nick name"></div>
        <div class="group"><label>Full Name</label><input id="full" placeholder="Full name" required></div>
        <div class="group"><label>Email</label><input id="email_val" type="email" placeholder="name@brand-strom.com" required></div>

        <div class="group">
            <label>Password</label>
            <div class="input-wrapper">
                <input id="pass_val" type="password" class="pass-input" placeholder="Min 6 characters" required>
                <button type="button" class="eye-btn" onclick="togglePass('pass_val', this)"></button>
            </div>
        </div>

        <div class="group">
            <label>Confirm Password</label>
            <div class="input-wrapper">
                <input id="conf_val" type="password" class="pass-input" placeholder="Repeat password" required>
                <button type="button" class="eye-btn" onclick="togglePass('conf_val', this)"></button>
            </div>
        </div>

        <button class="btn-main" type="submit">Sign Up</button>
    </form>
    <div class="link">Already have an account? <a href="login.html">Sign in</a></div>
</div>

<script>
    // 1. ICONS Setup
    const eyeIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    const eyeOffIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

    document.querySelectorAll(".eye-btn").forEach(btn => btn.innerHTML = eyeIcon);

    function togglePass(id, btn) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text"; btn.innerHTML = eyeOffIcon;
        } else {
            input.type = "password"; btn.innerHTML = eyeIcon;
        }
    }

    // 2. SUPABASE
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 3. SUBMIT
    document.getElementById("regForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        // เด้ง Popup ทันทีที่กดเพื่อให้รู้ว่า Code ทำงาน
        Swal.fire({
            title: 'Please wait...',
            text: 'Creating your account',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        const p1 = document.getElementById("pass_val").value;
        const p2 = document.getElementById("conf_val").value;
        const em = document.getElementById("email_val").value;

        if (p1 !== p2) {
            Swal.fire("Error", "Passwords do not match!", "error");
            return;
        }

        if (!em.endsWith('@brand-strom.com')) {
            Swal.fire("Warning", "Use @brand-strom.com only", "warning");
            return;
        }

        try {
            const { error } = await supabaseClient.auth.signUp({
                email: em,
                password: p1,
                options: {
                    data: {
                        employee_id: document.getElementById("emp_id").value,
                        nick_name: document.getElementById("nick").value,
                        full_name: document.getElementById("full").value,
                        role: document.getElementById("role_val").value
                    }
                }
            });

            if (error) throw error;

            Swal.fire({
                icon: "success",
                title: "Success!",
                text: "Registration complete. Please check your email.",
                confirmButtonColor: "#bdc432"
            }).then(() => { location.href = "login.html"; });

        } catch (err) {
            Swal.fire("Failed", err.message, "error");
        }
    });
</script>

</body>
</html>
