<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Registration</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root {
            --brand-accent: #bdc432;
            --brand-accent-dark: #7c7a2d;
            --font-main: "Outfit", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }

        body {
            /* BG Gradient ตามที่พี่ต้องการ */
            background: linear-gradient(135deg, var(--brand-accent-dark) 0%, var(--brand-accent) 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .card {
            background: #fff; padding: 2.5rem; border-radius: 20px;
            width: 100%; max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .logo { font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 2rem; letter-spacing: -1px; }

        /* กล่องหุ้ม Input ทั่วไป */
        .group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #444; }

        /* ระบบ Wrapper สำหรับ Password (สำคัญมาก) */
        .input-wrapper { position: relative; display: flex; align-items: center; }

        input, select {
            width: 100%; padding: 12px 16px; border: 1.5px solid #eee;
            border-radius: 12px; font-size: 15px; outline: none; transition: 0.2s;
        }

        input:focus { border-color: var(--brand-accent); background: #fafbf2; }

        /* เฉพาะช่องรหัสผ่าน เผื่อที่ให้ Bitwarden และ ปุ่มตา */
        .pass-input { padding-right: 85px !important; }

        /* ปุ่มรูปตาใน Wrapper */
        .eye-btn {
            position: absolute; 
            right: 42px; /* ขยับหลบ Bitwarden */
            background: none; border: none; cursor: pointer;
            color: #888; display: flex; align-items: center;
            padding: 5px; z-index: 10;
        }

        .row { display: flex; gap: 0.8rem; }
        .row .group { flex: 1; }

        .btn-main {
            width: 100%; padding: 16px; background: var(--brand-accent);
            border: none; border-radius: 12px; color: #fff;
            font-weight: 700; font-size: 16px; cursor: pointer;
            margin-top: 1rem; transition: 0.2s;
        }
        .btn-main:hover { background: var(--brand-accent-dark); }

        .link { text-align: center; margin-top: 1.5rem; font-size: 14px; color: #666; }
        .link a { color: #000; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">B-QUEST</div>

    <form id="regForm">
        <div class="row">
            <div class="group"><label>Employer ID</label><input id="emp_id" placeholder="BXXXX" required></div>
            <div class="group">
                <label>Role</label>
                <select id="role_val" required>
                    <option value="">Select</option>
                    <option>Creative</option><option>Designer</option><option>AE</option>
                </select>
            </div>
        </div>

        <div class="group"><label>Nick Name</label><input id="nick" placeholder="Nick name"></div>
        <div class="group"><label>Full Name</label><input id="full" placeholder="Full name" required></div>
        <div class="group"><label>Email</label><input id="email_val" type="email" placeholder="name@brand-strom.com" required></div>

        <div class="group">
            <label>Password</label>
            <div class="input-wrapper">
                <input id="pass_val" type="password" class="pass-input" placeholder="Min 6 characters" required>
                <button type="button" class="eye-btn" onclick="toggle('pass_val', this)"></button>
            </div>
        </div>

        <div class="group">
            <label>Confirm Password</label>
            <div class="input-wrapper">
                <input id="conf_val" type="password" class="pass-input" placeholder="Repeat password" required>
                <button type="button" class="eye-btn" onclick="toggle('conf_val', this)"></button>
            </div>
        </div>

        <button class="btn-main" type="submit">Sign Up</button>
    </form>
    <div class="link">Already have an account? <a href="login.html">Sign in</a></div>
</div>

<script>
    // 1. ICONS (SVG ลายเส้นที่พี่ต้องการ)
    const iconEye = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    const iconEyeOff = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

    document.querySelectorAll(".eye-btn").forEach(b => b.innerHTML = iconEye);

    function toggle(id, btn) {
        const x = document.getElementById(id);
        if (x.type === "password") {
            x.type = "text"; btn.innerHTML = iconEyeOff;
        } else {
            x.type = "password"; btn.innerHTML = iconEye;
        }
    }

    // 2. SUPABASE INIT (เช็คว่าตัวแปรจาก config.js มาไหม)
    let sb;
    try {
        if (typeof SUPABASE_URL !== 'undefined') {
            sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } else {
            console.error("SUPABASE_URL is not defined. Check config.js");
        }
    } catch(e) { console.error("Init Error:", e); }

    // 3. SUBMIT LOGIC
    document.getElementById("regForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        // แสดง Popup ทันทีที่กด (ถ้าไม่เด้ง แปลว่ามี Error ใน Code ส่วนบน)
        Swal.fire({
            title: 'Connecting...',
            text: 'Setting up your B-QUEST profile',
            allowOutsideClick: false,
            didOpen: () => Swal.showLoading()
        });

        const p1 = document.getElementById("pass_val").value;
        const p2 = document.getElementById("conf_val").value;
        const em = document.getElementById("email_val").value;

        if (p1 !== p2) {
            Swal.fire("Error", "Passwords do not match!", "error");
            return;
        }

        if (!em.endsWith('@brand-strom.com')) {
            Swal.fire("Access Denied", "Use @brand-strom.com email only.", "warning");
            return;
        }

        try {
            const { error } = await sb.auth.signUp({
                email: em,
                password: p1,
                options: {
                    data: {
                        employee_id: document.getElementById("emp_id").value,
                        nick_name: document.getElementById("nick").value,
                        full_name: document.getElementById("full").value,
                        role: document.getElementById("role_val").value
                    }
                }
            });

            if (error) throw error;

            Swal.fire({
                icon: "success",
                title: "Welcome aboard!",
                text: "Please check your email to verify your account.",
                confirmButtonColor: "#bdc432"
            }).then(() => location.href = "login.html");

        } catch (err) {
            Swal.fire("Signup Failed", err.message, "error");
        }
    });
</script>

</body>
</html>
