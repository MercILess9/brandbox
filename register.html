<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B-QUEST Registration | BrandBox</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --accent:#bdc432;
    --font:"Outfit",sans-serif;
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family:var(--font);
    background:linear-gradient(135deg,#a39f40,#bdc432);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* CARD */
.login-card {
    background:#fff;
    padding:2.5rem;
    border-radius:16px;
    width:100%;
    max-width:450px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.brand-logo {
    font-size:32px;
    font-weight:700;
    text-align:center;
    margin-bottom:2rem;
}

/* INPUT */
.input-group {
    margin-bottom:1.2rem;
    position:relative;
    overflow:visible;
}

label {
    display:block;
    font-size:14px;
    font-weight:600;
    margin-bottom:6px;
}

input, select {
    width:100%;
    padding:12px 45px 12px 16px;
    border:1.5px solid #eee;
    border-radius:10px;
    font-size:15px;
}

input:focus, select:focus {
    outline:none;
    border-color:var(--accent);
    background:#fafbf2;
}

/* ROW */
.row-inputs {
    display:flex;
    gap:1rem;
}

/* PASSWORD BUTTON */
.password-toggle-btn {
    position:absolute;
    right:12px;
    top:38px;
    z-index:10;
    background:none;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#666;
}

/* BUTTON */
.btn-signup {
    width:100%;
    padding:16px;
    background:var(--accent);
    border:none;
    border-radius:10px;
    color:#fff;
    font-weight:700;
    cursor:pointer;
    margin-top:1rem;
}

.signin-link {
    text-align:center;
    margin-top:1.5rem;
    font-size:14px;
}
</style>
</head>

<body>

<div class="login-card">
<div class="brand-logo">B-QUEST</div>

<form id="registerForm">

<div class="row-inputs">
<div class="input-group">
<label>Employer ID</label>
<input id="employee_id" required>
</div>

<div class="input-group">
<label>Role</label>
<select id="role" required>
<option value="">Select Role</option>
<option>Creative</option>
<option>Designer</option>
<option>AE</option>
</select>
</div>
</div>

<div class="input-group">
<label>Nick Name</label>
<input id="nick_name">
</div>

<div class="input-group">
<label>Full Name</label>
<input id="full_name" required>
</div>

<div class="input-group">
<label>Email</label>
<input id="email" type="email" required>
</div>

<div class="input-group">
<label>Password</label>
<input id="password" type="password" required>
<button type="button" class="password-toggle-btn" onclick="toggle('password',this)"></button>
</div>

<div class="input-group">
<label>Confirm Password</label>
<input id="confirm_password" type="password" required>
<button type="button" class="password-toggle-btn" onclick="toggle('confirm_password',this)"></button>
</div>

<button class="btn-signup" type="submit">Sign Up</button>

</form>
</div>

<script>
// =====================
// SVG ICONS
// =====================
const eye = `
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
<circle cx="12" cy="12" r="3"/>
</svg>`;

const eyeOff = `
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M17.94 17.94A10 10 0 0 1 12 20C5 20 1 12 1 12"/>
<line x1="1" y1="1" x2="23" y2="23"/>
</svg>`;

// init icons
document.querySelectorAll(".password-toggle-btn").forEach(btn=>{
    btn.innerHTML = eye;
});

// =====================
// TOGGLE PASSWORD
// =====================
function toggle(id, btn){
    const el = document.getElementById(id);
    const show = el.type === "password";
    el.type = show ? "text" : "password";
    btn.innerHTML = show ? eyeOff : eye;
}

// =====================
// SUPABASE INIT
// =====================
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// =====================
// SUBMIT
// =====================
document.getElementById("registerForm").addEventListener("submit", async (e)=>{
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm_password").value;

    if(password !== confirm){
        Swal.fire("Error","Passwords do not match","error");
        return;
    }

    Swal.fire({
        title:"Creating account...",
        allowOutsideClick:false,
        didOpen:()=>Swal.showLoading()
    });

    try{
        const { error } = await supabaseClient.auth.signUp({
            email,
            password,
            options:{
                data:{
                    employee_id: employee_id.value,
                    nick_name: nick_name.value,
                    full_name: full_name.value,
                    role: role.value
                }
            }
        });

        if(error) throw error;

        Swal.fire({
            icon:"success",
            title:"Success",
            text:"Check your email to confirm account"
        }).then(()=>location.href="login.html");

    }catch(err){
        Swal.fire("Error",err.message,"error");
    }
});
</script>

</body>
</html>
