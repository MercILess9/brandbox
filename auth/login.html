<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>Brandbox | Login</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/system/config.js"></script>
    <script src="/system/system.js"></script>
    <script src="/auth/auth.js"></script>

    <style>
        :root {
            --brand-accent-dark: rgb(45, 71, 57);
            --brand-accent: rgb(189, 196, 50);
            --font-main: "Outfit", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }

        body {
            background: linear-gradient(135deg, var(--brand-accent-dark) 0%, var(--brand-accent) 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
            /* ปรับให้แสดงผลทันทีถ้า JS มีปัญหา จะได้ไม่หน้าขาว */
            opacity: 1; 
        }
        
        /* ถ้า JS ทำงานปกติ จะค่อยๆ Fade in ตามระบบ */
        body.js-enabled { opacity: 0; transition: opacity 0.5s; }
        body.auth-ready { opacity: 1; }

        .card {
            background: #fff; padding: 2.5rem; border-radius: 24px;
            width: 100%; max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        }

        .logo-wrap { text-align: center; margin-bottom: 2rem; margin-top: 0.5rem; }
        .logo-wrap img { height: 80px; object-fit: contain; }

        .group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #333; }

        .input-wrapper { position: relative; display: flex; align-items: center; }

        input {
            width: 100%; padding: 12px 16px; border: 1.5px solid #eee;
            border-radius: 12px; font-size: 15px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--brand-accent); background: #fafbf2; }

        .pass-input { padding-right: 45px !important; }

        .password-toggle-btn {
            position: absolute; right: 15px;
            background: none; border: none; cursor: pointer;
            color: #888; display: flex; align-items: center;
            padding: 0; z-index: 10;
        }

        .btn-main {
            width: 100%; padding: 16px; background: var(--brand-accent);
            border: none; border-radius: 12px; color: #fff;
            font-weight: 700; font-size: 16px; cursor: pointer;
            margin-top: 1rem; transition: 0.2s;
        }
        .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }

        .footer-links { text-align: center; margin-top: 1.8rem; font-size: 14px; color: #666; }
        .footer-links a { color: #000; text-decoration: none; font-weight: 700; transition: 0.2s; }
        .footer-links a:hover { color: var(--brand-accent-dark); }
        .footer-links span { margin: 0 8px; color: #ccc; }
    </style>
</head>
<body class="js-enabled">

<div class="card">
    <div class="logo-wrap"><img id="brandbox-logo" src="" alt="Brandbox"></div>

    <form id="loginForm">
        <div class="group">
            <label>Email Address</label>
            <input id="email" type="email" placeholder="name@brand-strom.com" required>
        </div>

        <div class="group">
            <label>Password</label>
            <div class="input-wrapper">
                <input id="password" type="password" class="pass-input" placeholder="Enter your password" required>
                <button type="button" class="password-toggle-btn" onclick="togglePass('password', this)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>
        </div>

        <button class="btn-main" type="submit">Sign In</button>
    </form>
    
    <div class="footer-links">
        <a href="signup.html">Sign up</a>
        <span>•</span>
        <a href="forgot-password.html">Forgot Password?</a>
    </div>
</div>

<script>
    document.getElementById('brandbox-logo').src = LOGO_URL;

    // สั่งให้ระบบเริ่มทำงาน
    if (typeof initLayout === 'function') {
        initLayout();
    } else {
        // กรณีหาไฟล์ system.js ไม่เจอ ให้ฝืนเปิดหน้าจอ
        document.body.classList.remove('js-enabled');
        console.error("System Engine not found. Check your paths!");
    }

    // Toggle Password UI
    const svgOpen = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    const svgClose = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

    function togglePass(id, btn) {
        const input = document.getElementById(id);
        const isPass = input.type === "password";
        input.type = isPass ? "text" : "password";
        btn.innerHTML = isPass ? svgClose : svgOpen;
    }

    // Form Submit
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();       
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        if (typeof handleLogin === 'function') {
            await handleLogin(email, password);
        } else {
            Swal.fire("Error", "Auth Engine (auth.js) not found!", "error");
        }
    });
</script>

</body>
</html>
