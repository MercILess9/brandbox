<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="config.js"></script>
    <script src="system.js"></script>

    <style>
        :root { --brand-dark: rgb(45, 71, 57); --brand-lime: rgb(189, 196, 50); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Outfit", sans-serif; }
        body {
            background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand-lime) 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .card { background: #fff; padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .logo { font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 2rem; color: var(--brand-dark); }
        .group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        input { width: 100%; padding: 12px 16px; border: 1.5px solid #eee; border-radius: 12px; outline: none; }
        input:focus { border-color: var(--brand-lime); background: #fafbf2; }
        .btn-main {
            width: 100%; padding: 16px; background: var(--brand-dark); border: none;
            border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer; margin-top: 1rem;
        }
        .link { text-align: center; margin-top: 1.5rem; font-size: 14px; }
        .link a { color: var(--brand-dark); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">B-QUEST</div>
    <form id="loginForm">
        <div class="group">
            <label>Email</label>
            <input id="email_val" type="email" placeholder="email@company.com" required>
        </div>
        <div class="group">
            <label>Password</label>
            <input id="pass_val" type="password" placeholder="••••••••" required>
        </div>
        <button class="btn-main" type="submit">Sign In</button>
    </form>
    <div class="link">Don't have an account? <a href="register.html">Sign up</a></div>
</div>

<script>
    // ใช้ supabaseClient ที่ประกาศไว้ใน system.js ได้เลย
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const email = document.getElementById("email_val").value;
        const password = document.getElementById("pass_val").value;

        Swal.fire({ title: 'Signing in...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) throw error;

            Swal.fire({ icon: "success", title: "Success!", timer: 1000, showConfirmButton: false })
            .then(() => { window.location.href = "index.html"; });

        } catch (err) {
            Swal.fire("Error", err.message, "error");
        }
    });
</script>
</body>
</html>
