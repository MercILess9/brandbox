<style>
    /* กว้าง 1000px ตามสั่ง */
    .bq-modal-1000 { max-width: 1000px !important; }
    .bq-form-container { border-radius: 30px; border: none; background: #ffffff; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    
    .bq-form-header { padding: 25px 40px; background: #fff; border-bottom: 1px solid #f1f5f9; }
    .bq-form-body { padding: 40px; background: #f8fafc; }
    .bq-form-footer { padding: 20px 40px; background: #fff; border-top: 1px solid #f1f5f9; display: flex; justify-content: flex-end; gap: 15px; }

    /* Card Section Style */
    .bq-card-section { 
        background: #ffffff; border-radius: 24px; padding: 30px; 
        border: 1px solid #eef2f6; height: 100%; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    .bq-card-highlight { border-top: 4px solid #bdc432; }

    /* Form Elements */
    .bq-label { 
        font-size: 0.75rem; font-weight: 800; color: #64748b; 
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.8px;
    }

    .bq-input { 
        width: 100%; border-radius: 14px; border: 1px solid #e2e8f0; 
        padding: 12px 16px; font-size: 0.95rem; background: #ffffff;
        transition: all 0.2s; margin-bottom: 22px; color: #1e293b;
    }
    .bq-input:focus { border-color: #bdc432; outline: none; box-shadow: 0 0 0 4px rgba(189, 196, 50, 0.1); }
    .bq-input:last-child { margin-bottom: 0; }

    /* Button Styles */
    .btn-bq-save { background: #1e293b; color: #bdc432; border-radius: 14px; padding: 12px 45px; font-weight: 700; border: none; transition: 0.2s; }
    .btn-bq-save:hover { background: #000; transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .btn-bq-cancel { color: #64748b; font-weight: 600; text-decoration: none; font-size: 0.95rem; padding: 12px 20px; }

    .edit-only { display: none !important; }
    .is-edit .edit-only { display: flex !important; }
</style>

<div class="modal fade" id="b-quest-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog bq-modal-1000 modal-dialog-centered">
        <div class="modal-content bq-form-container" id="b-quest-modal-content">
            
            <div class="bq-form-header d-flex justify-content-between align-items-center">
                <h4 class="fw-800 m-0" id="b-quest-modal-label" style="font-size: 1.6rem; letter-spacing: -1px;">New <span style="color: #bdc432;">Task</span></h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form id="b-quest-modal-form">
                <div class="bq-form-body">
                    <input type="hidden" id="b-quest-modal-id" name="id">
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <div class="bq-card-section">
                                <label class="bq-label">Account Name</label>
                                <input type="text" class="bq-input" id="b-quest-modal-account" name="account_name">

                                <label class="bq-label">Opportunity Name</label>
                                <input type="text" class="bq-input" id="b-quest-modal-opportunity" name="opportunity_name">

                                <label class="bq-label">Task Name</label>
                                <input type="text" class="bq-input" id="b-quest-modal-taskname" name="task_name">

                                <label class="bq-label">Link</label>
                                <input type="url" class="bq-input m-0" id="b-quest-modal-link" name="link">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="bq-card-section">
                                <label class="bq-label">Publish Date</label>
                                <input type="date" class="bq-input" id="b-quest-modal-publish-date" name="publish_date">

                                <label class="bq-label">Detail</label>
                                <textarea class="bq-input m-0" id="b-quest-modal-detail" name="detail" rows="9" 
                                    style="resize: none; height: 215px;"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="bq-card-section bq-card-highlight">
                                <div class="bq-label mb-4" style="color: #1e293b; font-size: 0.9rem;">DESIGNER</div>
                                
                                <label class="bq-label">Type</label>
                                <select class="bq-input" id="b-quest-modal-designer-type" name="designer_type"></select>

                                <label class="bq-label">Work</label>
                                <select class="bq-input" id="b-quest-modal-designer-work" name="designer"></select>

                                <label class="bq-label">Deadline</label>
                                <input type="date" class="bq-input m-0" id="b-quest-modal-designer-deadline" name="designer_deadline">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="bq-card-section bq-card-highlight">
                                <div class="bq-label mb-4" style="color: #1e293b; font-size: 0.9rem;">CREATIVE</div>

                                <label class="bq-label">Type</label>
                                <select class="bq-input" id="b-quest-modal-creative-type" name="creative_type"></select>

                                <label class="bq-label">Work</label>
                                <select class="bq-input" id="b-quest-modal-creative-work" name="creative"></select>

                                <label class="bq-label">Deadline</label>
                                <input type="date" class="bq-input m-0" id="b-quest-modal-creative-deadline" name="creative_deadline">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bq-form-footer">
                    <button type="button" class="btn btn-link text-danger fw-bold edit-only me-auto text-decoration-none" 
                        onclick="BQuestService.deleteQuest(document.getElementById('b-quest-modal-id').value)">
                        Delete Task
                    </button>
                    <a href="#" class="btn-bq-cancel" data-bs-dismiss="modal">Cancel</a>
                    <button type="submit" class="btn-bq-save shadow-sm">Save Mission</button>
                </div>
            </form>
        </div>
    </div>
</div>
