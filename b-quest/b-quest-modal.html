<style>
    /* ปรับความกว้างให้เหมาะสม (ประมาณ 800px) ไม่กว้างจนหลุดสายตา */
    .bq-modal-custom { max-width: 850px !important; }
    .bq-form-container { border-radius: 24px; border: none; background: #ffffff; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    
    .bq-form-header { padding: 20px 30px; background: #fff; border-bottom: 1px solid #f1f5f9; }
    .bq-form-body { padding: 25px 30px; background: #f8fafc; }
    .bq-form-footer { padding: 18px 30px; background: #fff; border-top: 1px solid #f1f5f9; display: flex; justify-content: flex-end; gap: 12px; }

    /* Card Layout */
    .bq-card-section { 
        background: #ffffff; border-radius: 20px; padding: 22px; 
        border: 1px solid #eef2f6; height: 100%; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    .bq-card-dark { background: #fcfcfc; border: 1px solid #e2e8f0; }

    /* Label & Input */
    .bq-label { 
        font-size: 0.7rem; font-weight: 800; color: #64748b; 
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .bq-label i { font-size: 0.9rem; color: #bdc432; }

    .bq-input { 
        width: 100%; border-radius: 12px; border: 1px solid #e2e8f0; 
        padding: 9px 14px; font-size: 0.9rem; background: #ffffff;
        transition: all 0.2s; margin-bottom: 15px; color: #1e293b;
    }
    .bq-input:focus { border-color: #bdc432; outline: none; box-shadow: 0 0 0 4px rgba(189, 196, 50, 0.15); }
    
    /* ปรับช่องสุดท้ายของกลุ่มไม่ให้มี margin */
    .bq-input:last-child { margin-bottom: 0; }

    /* Button Styles */
    .btn-bq-save { background: #1e293b; color: #bdc432; border-radius: 12px; padding: 10px 30px; font-weight: 700; border: none; transition: 0.2s; }
    .btn-bq-save:hover { background: #0f172a; transform: translateY(-1px); }
    .btn-bq-cancel { color: #64748b; font-weight: 600; text-decoration: none; font-size: 0.9rem; padding: 10px 15px; }

    .edit-only { display: none !important; }
    .is-edit .edit-only { display: flex !important; }
</style>

<div class="modal fade" id="b-quest-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog bq-modal-custom modal-dialog-centered">
        <div class="modal-content bq-form-container" id="b-quest-modal-content">
            
            <div class="bq-form-header d-flex justify-content-between align-items-center">
                <h4 class="fw-800 m-0" id="b-quest-modal-label">New <span style="color: #bdc432;">Task</span></h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form id="b-quest-modal-form">
                <div class="bq-form-body">
                    <input type="hidden" id="b-quest-modal-id" name="id">
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-7">
                            <div class="bq-card-section">
                                <label class="bq-label"><i class="bi bi-building"></i> Account Name</label>
                                <input type="text" class="bq-input" id="b-quest-modal-account" name="account_name" placeholder="...">

                                <label class="bq-label"><i class="bi bi-gem"></i> Opportunity Name</label>
                                <input type="text" class="bq-input" id="b-quest-modal-opportunity" name="opportunity_name" placeholder="...">

                                <label class="bq-label"><i class="bi bi-card-checklist"></i> Task Name</label>
                                <input type="text" class="bq-input" id="b-quest-modal-taskname" name="task_name" placeholder="...">

                                <label class="bq-label"><i class="bi bi-link-45deg"></i> Reference Link</label>
                                <input type="url" class="bq-input m-0" id="b-quest-modal-link" name="link" placeholder="https://...">
                            </div>
                        </div>

                        <div class="col-md-5">
                            <div class="bq-card-section bq-card-dark">
                                <label class="bq-label"><i class="bi bi-calendar-check"></i> Publish Date</label>
                                <input type="date" class="bq-input" id="b-quest-modal-publish-date" name="publish_date">

                                <label class="bq-label"><i class="bi bi-body-text"></i> Description</label>
                                <textarea class="bq-input m-0" id="b-quest-modal-detail" name="detail" rows="7" 
                                    style="resize: none; height: 153px;" placeholder="..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="bq-card-section">
                                <div class="bq-label mb-3" style="color: #1e293b; font-size: 0.8rem; border-bottom: 2px solid #bdc432; padding-bottom: 5px;">
                                    <i class="bi bi-brush"></i> Designer
                                </div>
                                
                                <label class="bq-label">Work Type</label>
                                <select class="bq-input" id="b-quest-modal-designer-type" name="designer_type"></select>

                                <label class="bq-label">Work List</label>
                                <select class="bq-input" id="b-quest-modal-designer-work" name="designer"></select>

                                <label class="bq-label">Deadline</label>
                                <input type="date" class="bq-input m-0" id="b-quest-modal-designer-deadline" name="designer_deadline">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="bq-card-section">
                                <div class="bq-label mb-3" style="color: #1e293b; font-size: 0.8rem; border-bottom: 2px solid #bdc432; padding-bottom: 5px;">
                                    <i class="bi bi-rocket-takeoff"></i> Creative
                                </div>

                                <label class="bq-label">Work Type</label>
                                <select class="bq-input" id="b-quest-modal-creative-type" name="creative_type"></select>

                                <label class="bq-label">Work List</label>
                                <select class="bq-input" id="b-quest-modal-creative-work" name="creative"></select>

                                <label class="bq-label">Deadline</label>
                                <input type="date" class="bq-input m-0" id="b-quest-modal-creative-deadline" name="creative_deadline">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bq-form-footer">
                    <button type="button" class="btn btn-link text-danger fw-bold edit-only me-auto text-decoration-none" 
                        onclick="BQuestService.deleteQuest(document.getElementById('b-quest-modal-id').value)">
                        <i class="bi bi-trash3 me-1"></i> Delete
                    </button>
                    <a href="#" class="btn-bq-cancel" data-bs-dismiss="modal">Cancel</a>
                    <button type="submit" class="btn-bq-save shadow-sm">Save Mission</button>
                </div>
            </form>
        </div>
    </div>
</div>
