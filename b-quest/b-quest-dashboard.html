<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>B-QUEST | Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="/system/config.js"></script>
    <script src="/system/system.js"></script>
    <script src="b-quest.js"></script>

    <style>
        :root {
            --c-accent: #bdc432;
            --c-accent-light: #f4f7a1;
            --c-dark: #1e293b;
            --c-bg: #f8fafc;
            --c-muted: #94a3b8;
            --c-slate: #626e7f;
            --c-border: #e2e8f0;
            --c-des: #3b82f6;
            --c-des-bg: #eff6ff;
            --c-des-border: #dbeafe;
            --c-cre: #8b5cf6;
            --c-cre-bg: #f5f3ff;
            --c-cre-border: #ede9fe;
        }

        body { font-family: 'Inter', 'Sarabun', sans-serif; background: var(--c-bg); color: var(--c-dark); margin: 0; padding-bottom: 80px; }

        /* ── Control Bar ── */
        .ctrl-bar { background: #fff; border-bottom: 1px solid var(--c-border); padding: 10px 20px; position: sticky; top: 0; z-index: 200; }
        .ctrl-inner { max-width: 1300px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
        .month-nav { display: flex; align-items: center; gap: 6px; position: relative; }
        .month-nav-btn { border: 1px solid var(--c-border); background: #fff; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--c-slate); transition: 0.15s; font-size: 0.82rem; }
        .month-nav-btn:hover { background: var(--c-bg); border-color: #cbd5e1; }

        .month-label-btn { border: 1px solid var(--c-border); background: #fff; border-radius: 10px; padding: 0 14px; height: 32px; font-size: 0.88rem; font-weight: 800; color: var(--c-dark); cursor: pointer; min-width: 148px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.15s; font-family: inherit; }
        .month-label-btn:hover { background: var(--c-bg); border-color: #cbd5e1; }
        .month-label-btn.open { background: var(--c-accent-light); border-color: var(--c-accent); color: #5a6400; }

        /* ── Month Picker Popover ── */
        .month-picker {
            display: none; position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: #fff; border: 1px solid var(--c-border); border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12); padding: 14px 16px; width: 240px; z-index: 300;
        }
        .month-picker.open { display: block; }
        .mp-year { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .mp-year-btn { border: none; background: var(--c-bg); border-radius: 7px; width: 28px; height: 28px; cursor: pointer; color: var(--c-slate); font-size: 0.8rem; display: flex; align-items: center; justify-content: center; transition: 0.15s; }
        .mp-year-btn:hover { background: var(--c-border); }
        .mp-year-label { font-size: 0.88rem; font-weight: 800; color: var(--c-dark); }
        .mp-months { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .mp-month { border: 1px solid transparent; background: transparent; border-radius: 8px; padding: 7px 4px; font-size: 0.75rem; font-weight: 700; color: var(--c-slate); cursor: pointer; text-align: center; transition: 0.15s; font-family: inherit; }
        .mp-month:hover { background: var(--c-bg); border-color: var(--c-border); color: var(--c-dark); }
        .mp-month.active { background: var(--c-dark); color: var(--c-accent); border-color: var(--c-dark); }
        .mp-month.today { border-color: var(--c-accent); color: #5a6400; }
        .mp-month.active.today { background: var(--c-dark); color: var(--c-accent); }

        .ctrl-sep { width: 1px; height: 22px; background: var(--c-border); }
        .btn-today { border: 1px solid var(--c-border); background: #fff; border-radius: 8px; padding: 0 14px; height: 32px; font-size: 0.74rem; font-weight: 700; color: var(--c-slate); cursor: pointer; transition: 0.15s; font-family: inherit; }
        .btn-today:hover { background: var(--c-bg); border-color: #cbd5e1; }

        /* ── Wrapper ── */
        .dash-wrapper { max-width: 1300px; margin: 0 auto; padding: 24px 20px 60px; display: flex; flex-direction: column; gap: 20px; }

        /* ── Section ── */
        .section { background: #fff; border: 1px solid var(--c-border); border-radius: 20px; overflow: hidden; }
        .section-header { display: flex; align-items: center; gap: 10px; padding: 15px 24px; border-bottom: 1px solid var(--c-border); }
        .section-title { font-size: 0.76rem; font-weight: 800; color: var(--c-dark); text-transform: uppercase; letter-spacing: 0.8px; display: flex; align-items: center; gap: 8px; }
        .section-body { padding: 20px 24px; }

        /* ── Overview ── */
        .ov-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
        .ov-card { border: 1px solid var(--c-border); border-radius: 14px; padding: 18px 20px; }
        .ov-val { font-size: 2rem; font-weight: 900; color: var(--c-dark); line-height: 1; }
        .ov-label { font-size: 0.68rem; font-weight: 700; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 7px; }
        .ov-card.ov-active { border-color: var(--c-accent); background: var(--c-accent-light); }
        .ov-card.ov-active .ov-val { color: #5a6400; }
        .ov-card.ov-des { border-color: var(--c-des-border); background: var(--c-des-bg); }
        .ov-card.ov-des .ov-val { color: var(--c-des); }
        .ov-card.ov-cre { border-color: var(--c-cre-border); background: var(--c-cre-bg); }
        .ov-card.ov-cre .ov-val { color: var(--c-cre); }

        /* ── Two-col layout ── */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .sub-col { border: 1px solid var(--c-border); border-radius: 14px; overflow: hidden; }
        .sub-col-head { display: flex; align-items: center; gap: 8px; padding: 11px 16px; font-size: 0.73rem; font-weight: 800; border-bottom: 1px solid var(--c-border); }
        .sub-col-head-des { background: var(--c-des-bg); color: var(--c-des); border-color: var(--c-des-border); }
        .sub-col-head-cre { background: var(--c-cre-bg); color: var(--c-cre); border-color: var(--c-cre-border); }

        /* ── Work Type Donut ── */
        .wt-body { display: flex; align-items: center; gap: 16px; padding: 14px 16px; min-height: 160px; }
        .wt-chart-area { position: relative; width: 130px; height: 130px; flex-shrink: 0; }
        .wt-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .wt-center-val { font-size: 1.5rem; font-weight: 900; color: var(--c-dark); line-height: 1; }
        .wt-center-lbl { font-size: 0.6rem; font-weight: 700; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 3px; }
        .wt-legend { flex: 1; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
        .wt-legend-item { display: flex; align-items: center; gap: 7px; }
        .wt-legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .wt-legend-name { font-size: 0.78rem; font-weight: 600; color: var(--c-dark); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .wt-legend-count { font-size: 0.78rem; font-weight: 800; color: var(--c-slate); flex-shrink: 0; }

        /* ── Work Breakdown ── */
        .wb-table-head { display: grid; grid-template-columns: 1fr 56px 70px; gap: 8px; padding: 8px 16px; background: var(--c-bg); font-size: 0.6rem; font-weight: 800; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .wb-table-head span:not(:first-child) { text-align: center; }
        .wb-row { display: grid; grid-template-columns: 1fr 56px 70px; gap: 8px; align-items: center; padding: 8px 16px; border-top: 1px solid #f8fafc; transition: background 0.15s; }
        .wb-row:hover { background: #fafbff; }
        .wb-row.wb-zero { opacity: 0.4; }
        .wb-name { font-size: 0.82rem; font-weight: 600; color: var(--c-dark); }
        .wb-num { font-size: 0.82rem; font-weight: 800; text-align: center; }
        .wb-weight-bar { height: 4px; background: var(--c-bg); border-radius: 4px; margin-top: 3px; overflow: hidden; }
        .wb-weight-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

        /* ── Person Summary ── */
        .ps-table-head { display: grid; grid-template-columns: 1fr 56px 60px; gap: 8px; padding: 8px 16px; background: var(--c-bg); font-size: 0.6rem; font-weight: 800; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .ps-table-head span:not(:first-child) { text-align: center; }
        .ps-row { display: grid; grid-template-columns: 1fr 56px 60px; gap: 8px; align-items: center; padding: 9px 16px; border-top: 1px solid #f8fafc; transition: background 0.15s; }
        .ps-row:hover { background: #fafbff; }
        .ps-name { font-size: 0.82rem; font-weight: 700; color: var(--c-dark); }
        .ps-num { font-size: 0.82rem; font-weight: 800; text-align: center; }

        /* ── Timeline ── */
        .tl-head { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; font-size: 0.73rem; font-weight: 800; border-bottom: 1px solid var(--c-border); }
        .tl-head-des { background: var(--c-des-bg); color: var(--c-des); border-color: var(--c-des-border); }
        .tl-head-cre { background: var(--c-cre-bg); color: var(--c-cre); border-color: var(--c-cre-border); }
        .tl-cap-badge { font-size: 0.67rem; font-weight: 700; opacity: 0.75; }
        .tl-chart-wrap { padding: 16px; height: 200px; }

        /* ── Empty / Skeleton ── */
        .col-empty { padding: 24px; text-align: center; color: var(--c-muted); font-size: 0.78rem; font-weight: 600; }
        .skel { background: #f1f5f9; border-radius: 8px; animation: shimmer 1.4s infinite; }
        @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.5} }
    </style>
</head>
<body>

<!-- Control Bar -->
<div class="ctrl-bar">
    <div class="ctrl-inner">
        <div class="month-nav">
            <button class="month-nav-btn" id="btn-prev"><i class="bi bi-chevron-left"></i></button>

            <button class="month-label-btn" id="month-label-btn">
                <i class="bi bi-calendar3" style="font-size:0.8rem"></i>
                <span id="month-label-text">—</span>
                <i class="bi bi-chevron-down" style="font-size:0.65rem;opacity:0.6"></i>
            </button>

            <!-- Month Picker Popover -->
            <div class="month-picker" id="month-picker">
                <div class="mp-year">
                    <button class="mp-year-btn" id="mp-prev-year"><i class="bi bi-chevron-left"></i></button>
                    <span class="mp-year-label" id="mp-year-label">2026</span>
                    <button class="mp-year-btn" id="mp-next-year"><i class="bi bi-chevron-right"></i></button>
                </div>
                <div class="mp-months" id="mp-months"></div>
            </div>

            <button class="month-nav-btn" id="btn-next"><i class="bi bi-chevron-right"></i></button>
        </div>
        <div class="ctrl-sep"></div>
        <button class="btn-today" id="btn-today">This Month</button>
    </div>
</div>

<!-- Dashboard Content -->
<div class="dash-wrapper">

    <!-- 1. Overview -->
    <div class="section">
        <div class="section-header">
            <div class="section-title"><i class="bi bi-grid-1x2-fill"></i> Overview</div>
        </div>
        <div class="section-body">
            <div class="ov-grid" id="ov-grid">
                <div class="ov-card" style="grid-column:1/6"><div class="skel" style="height:70px"></div></div>
            </div>
        </div>
    </div>

    <!-- 2. Work Types -->
    <div class="section">
        <div class="section-header">
            <div class="section-title"><i class="bi bi-pie-chart-fill"></i> Work Types</div>
        </div>
        <div class="section-body">
            <div class="two-col">
                <div class="sub-col">
                    <div class="sub-col-head sub-col-head-des"><i class="bi bi-brush-fill"></i> Designer</div>
                    <div id="wt-des"><div class="col-empty">Loading...</div></div>
                </div>
                <div class="sub-col">
                    <div class="sub-col-head sub-col-head-cre"><i class="bi bi-rocket-fill"></i> Creative</div>
                    <div id="wt-cre"><div class="col-empty">Loading...</div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. Work Breakdown (from b-quest-work) -->
    <div class="section">
        <div class="section-header">
            <div class="section-title"><i class="bi bi-table"></i> Work Breakdown</div>
        </div>
        <div class="section-body">
            <div class="two-col">
                <div class="sub-col">
                    <div class="sub-col-head sub-col-head-des"><i class="bi bi-brush-fill"></i> Designer</div>
                    <div class="wb-table-head"><span>Work</span><span>Tasks</span><span>Weight</span></div>
                    <div id="wb-des"><div class="col-empty">Loading...</div></div>
                </div>
                <div class="sub-col">
                    <div class="sub-col-head sub-col-head-cre"><i class="bi bi-rocket-fill"></i> Creative</div>
                    <div class="wb-table-head"><span>Work</span><span>Tasks</span><span>Weight</span></div>
                    <div id="wb-cre"><div class="col-empty">Loading...</div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. Person Summary -->
    <div class="section">
        <div class="section-header">
            <div class="section-title"><i class="bi bi-people-fill"></i> Person Summary</div>
        </div>
        <div class="section-body">
            <div class="two-col">
                <div class="sub-col">
                    <div class="sub-col-head sub-col-head-des"><i class="bi bi-brush-fill"></i> Designer</div>
                    <div class="ps-table-head"><span>Member</span><span>Tasks</span><span>Weight</span></div>
                    <div id="ps-des"><div class="col-empty">Loading...</div></div>
                </div>
                <div class="sub-col">
                    <div class="sub-col-head sub-col-head-cre"><i class="bi bi-rocket-fill"></i> Creative</div>
                    <div class="ps-table-head"><span>Member</span><span>Tasks</span><span>Weight</span></div>
                    <div id="ps-cre"><div class="col-empty">Loading...</div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 5. Daily Capacity -->
    <div class="section">
        <div class="section-header">
            <div class="section-title"><i class="bi bi-bar-chart-fill"></i> Daily Capacity</div>
        </div>
        <div class="section-body">
            <div class="two-col">
                <div class="sub-col">
                    <div class="tl-head tl-head-des">
                        <span><i class="bi bi-brush-fill me-1"></i> Designer</span>
                        <span class="tl-cap-badge" id="cap-badge-des">—</span>
                    </div>
                    <div class="tl-chart-wrap"><canvas id="chart-des"></canvas></div>
                </div>
                <div class="sub-col">
                    <div class="tl-head tl-head-cre">
                        <span><i class="bi bi-rocket-fill me-1"></i> Creative</span>
                        <span class="tl-cap-badge" id="cap-badge-cre">—</span>
                    </div>
                    <div class="tl-chart-wrap"><canvas id="chart-cre"></canvas></div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const DONUT_PALETTE = [
        '#3b82f6','#06b6d4','#10b981','#f59e0b','#ef4444',
        '#8b5cf6','#ec4899','#84cc16','#f97316','#64748b'
    ];

    let curYear, curMonth;
    let chartDes = null, chartCre = null;
    let chartWtDes = null, chartWtCre = null;
    let capDes = 0, capCre = 0;
    let pickerYear;
    let workList = [];

    // ── Month helpers ──
    function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
    function pad(n) { return String(n).padStart(2, '0'); }
    function monthRange() {
        const start = `${curYear}-${pad(curMonth + 1)}-01`;
        const end   = `${curYear}-${pad(curMonth + 1)}-${pad(daysInMonth(curYear, curMonth))}`;
        return { start, end };
    }

    function initMonth() {
        const now = new Date();
        curYear  = now.getFullYear();
        curMonth = now.getMonth();
        updateLabel();
    }
    function updateLabel() {
        document.getElementById('month-label-text').textContent =
            new Date(curYear, curMonth, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    // ── Month Picker ──
    function openPicker() {
        pickerYear = curYear;
        renderPickerMonths();
        document.getElementById('mp-year-label').textContent = pickerYear;
        document.getElementById('month-picker').classList.add('open');
        document.getElementById('month-label-btn').classList.add('open');
    }
    function closePicker() {
        document.getElementById('month-picker').classList.remove('open');
        document.getElementById('month-label-btn').classList.remove('open');
    }
    function renderPickerMonths() {
        const now = new Date();
        document.getElementById('mp-year-label').textContent = pickerYear;
        document.getElementById('mp-months').innerHTML = MONTHS.map((name, i) => {
            const isActive  = pickerYear === curYear && i === curMonth;
            const isToday   = pickerYear === now.getFullYear() && i === now.getMonth();
            const cls = [isActive ? 'active' : '', isToday ? 'today' : ''].join(' ');
            return `<button class="mp-month ${cls}" data-m="${i}">${name}</button>`;
        }).join('');
        document.querySelectorAll('.mp-month').forEach(btn => {
            btn.onclick = () => {
                curYear  = pickerYear;
                curMonth = parseInt(btn.dataset.m);
                updateLabel();
                closePicker();
                loadData();
            };
        });
    }

    document.getElementById('month-label-btn').onclick = (e) => {
        e.stopPropagation();
        document.getElementById('month-picker').classList.contains('open') ? closePicker() : openPicker();
    };
    document.getElementById('mp-prev-year').onclick = (e) => { e.stopPropagation(); pickerYear--; renderPickerMonths(); };
    document.getElementById('mp-next-year').onclick = (e) => { e.stopPropagation(); pickerYear++; renderPickerMonths(); };
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.month-nav')) closePicker();
    });

    document.getElementById('btn-prev').onclick = () => {
        if (--curMonth < 0) { curMonth = 11; curYear--; }
        updateLabel(); loadData();
    };
    document.getElementById('btn-next').onclick = () => {
        if (++curMonth > 11) { curMonth = 0; curYear++; }
        updateLabel(); loadData();
    };
    document.getElementById('btn-today').onclick = () => {
        const now = new Date(); curYear = now.getFullYear(); curMonth = now.getMonth();
        updateLabel(); loadData();
    };

    // ── Load ──
    async function loadData() {
        const { start, end } = monthRange();

        const [tasksRes, capRes, workRes] = await Promise.all([
            supabaseClient.from('b-quest-list').select('*')
                .or(`and(designer_deadline.gte.${start},designer_deadline.lte.${end}),and(creative_deadline.gte.${start},creative_deadline.lte.${end})`),
            supabaseClient.from('b_quest_capacity').select('*'),
            supabaseClient.from('b-quest-work').select('*').order('work')
        ]);

        const tasks = tasksRes.data || [];
        const caps  = capRes.data  || [];
        workList    = workRes.data  || [];
        capDes = caps.find(c => c.role === 'Designer')?.max_capacity || 0;
        capCre = caps.find(c => c.role === 'Creative')?.max_capacity || 0;

        renderOverview(tasks);
        renderWorkTypes(tasks);
        renderWorkBreakdown(tasks);
        renderPersons(tasks);
        renderTimeline(tasks);
    }

    // ── Section 1: Overview ──
    function renderOverview(tasks) {
        const { start, end } = monthRange();

        const dTasks = tasks.filter(t => t.designer_deadline >= start && t.designer_deadline <= end && t.designer_assign);
        const cTasks = tasks.filter(t => t.creative_deadline >= start && t.creative_deadline <= end && t.creative_assign);
        const allIds = new Set([...dTasks, ...cTasks].map(t => t.id));

        const activeUniq = new Set(tasks.filter(t =>
            (dTasks.find(d => d.id === t.id) && t.designer_status === 'On Progress') ||
            (cTasks.find(c => c.id === t.id) && t.creative_status === 'On Progress')
        ).map(t => t.id)).size;

        const done = [...allIds].filter(id => {
            const t = tasks.find(r => r.id === id);
            const dDone = !dTasks.find(d => d.id === id) || t.designer_status === 'Done';
            const cDone = !cTasks.find(c => c.id === id) || t.creative_status === 'Done';
            return dDone && cDone;
        }).length;

        document.getElementById('ov-grid').innerHTML = `
            <div class="ov-card">
                <div class="ov-val">${allIds.size}</div>
                <div class="ov-label">Total Tasks</div>
            </div>
            <div class="ov-card ov-active">
                <div class="ov-val">${activeUniq}</div>
                <div class="ov-label">On Progress</div>
            </div>
            <div class="ov-card">
                <div class="ov-val">${done}</div>
                <div class="ov-label">Done</div>
            </div>
            <div class="ov-card ov-des">
                <div class="ov-val">${new Set(dTasks.map(t => t.designer_assign)).size}</div>
                <div class="ov-label">Designers Working</div>
            </div>
            <div class="ov-card ov-cre">
                <div class="ov-val">${new Set(cTasks.map(t => t.creative_assign)).size}</div>
                <div class="ov-label">Creatives Working</div>
            </div>
        `;
    }

    // ── Section 2: Work Types (Donut) ──
    function renderWorkTypes(tasks) {
        const { start, end } = monthRange();

        function countBy(list, typeField, deadlineField) {
            const map = {};
            list.filter(t => t[deadlineField] >= start && t[deadlineField] <= end && t[typeField])
                .forEach(t => { map[t[typeField]] = (map[t[typeField]] || 0) + 1; });
            return Object.entries(map).sort((a, b) => b[1] - a[1]);
        }

        const desEntries = countBy(tasks.filter(t => t.designer_deadline && t.designer_assign), 'designer_type', 'designer_deadline');
        const creEntries = countBy(tasks.filter(t => t.creative_deadline && t.creative_assign), 'creative_type', 'creative_deadline');

        function renderDonut(entries, containerId, chartKey) {
            const el = document.getElementById(containerId);
            if (!entries.length) {
                el.innerHTML = `<div class="col-empty">No data this month</div>`;
                return;
            }

            const total = entries.reduce((s, [,n]) => s + n, 0);
            const canvasId = `wt-chart-${containerId}`;
            const colors   = entries.map((_, i) => DONUT_PALETTE[i % DONUT_PALETTE.length]);

            el.innerHTML = `
                <div class="wt-body">
                    <div class="wt-chart-area">
                        <canvas id="${canvasId}"></canvas>
                        <div class="wt-center">
                            <div class="wt-center-val">${total}</div>
                            <div class="wt-center-lbl">tasks</div>
                        </div>
                    </div>
                    <div class="wt-legend">
                        ${entries.map(([name, count], i) => `
                            <div class="wt-legend-item">
                                <div class="wt-legend-dot" style="background:${colors[i]}"></div>
                                <div class="wt-legend-name">${name}</div>
                                <div class="wt-legend-count">${count}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            // destroy old chart
            if (chartKey === 'des' && chartWtDes) { chartWtDes.destroy(); chartWtDes = null; }
            if (chartKey === 'cre' && chartWtCre) { chartWtCre.destroy(); chartWtCre = null; }

            const ctx = document.getElementById(canvasId).getContext('2d');
            const chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: entries.map(([n]) => n),
                    datasets: [{ data: entries.map(([,n]) => n), backgroundColor: colors, borderWidth: 2, borderColor: '#fff', hoverOffset: 4 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '68%',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: item => ` ${item.label}: ${item.parsed} (${Math.round(item.parsed / total * 100)}%)`
                            }
                        }
                    }
                }
            });

            if (chartKey === 'des') chartWtDes = chart;
            else chartWtCre = chart;
        }

        renderDonut(desEntries, 'wt-des', 'des');
        renderDonut(creEntries, 'wt-cre', 'cre');
    }

    // ── Section 3: Work Breakdown (b-quest-work × tasks) ──
    function renderWorkBreakdown(tasks) {
        const { start, end } = monthRange();

        const dTasks = tasks.filter(t => t.designer_deadline >= start && t.designer_deadline <= end && t.designer_assign);
        const cTasks = tasks.filter(t => t.creative_deadline >= start && t.creative_deadline <= end && t.creative_assign);

        function buildBreakdown(works, role, taskList, typeField, weightField) {
            return works
                .filter(w => w.role === role)
                .map(w => {
                    const matched = taskList.filter(t => t[typeField] === w.work);
                    const totalWeight = matched.reduce((s, t) => s + (t[weightField] || 0), 0);
                    return { work: w.work, baseWeight: w.weight, tasks: matched.length, totalWeight };
                })
                .sort((a, b) => b.tasks - a.tasks || b.totalWeight - a.totalWeight);
        }

        const desBreakdown = buildBreakdown(workList, 'Designer', dTasks, 'designer', 'designer_weight');
        const creBreakdown = buildBreakdown(workList, 'Creative', cTasks, 'creative', 'creative_weight');

        function renderWb(rows, color, fillColor, id) {
            const el = document.getElementById(id);
            if (!rows.length) { el.innerHTML = `<div class="col-empty">No work types configured</div>`; return; }
            const maxWeight = Math.max(...rows.map(r => r.totalWeight), 1);
            el.innerHTML = rows.map(r => `
                <div class="wb-row${r.tasks === 0 ? ' wb-zero' : ''}">
                    <div>
                        <div class="wb-name">${r.work}</div>
                        ${r.tasks > 0 ? `<div class="wb-weight-bar"><div class="wb-weight-fill" style="width:${Math.round(r.totalWeight / maxWeight * 100)}%;background:${fillColor}"></div></div>` : ''}
                    </div>
                    <div class="wb-num" style="color:${r.tasks > 0 ? color : 'var(--c-muted)'}">${r.tasks}</div>
                    <div class="wb-num" style="color:${r.totalWeight > 0 ? 'var(--c-dark)' : 'var(--c-muted)'}">${r.totalWeight > 0 ? r.totalWeight : '—'}</div>
                </div>
            `).join('');
        }

        renderWb(desBreakdown, 'var(--c-des)', 'rgba(59,130,246,0.35)', 'wb-des');
        renderWb(creBreakdown, 'var(--c-cre)', 'rgba(139,92,246,0.35)', 'wb-cre');
    }

    // ── Section 5: Person Summary ──
    function renderPersons(tasks) {
        const { start, end } = monthRange();

        function buildMap(list, assignField, weightField, deadlineField) {
            const map = {};
            list.filter(t => t[deadlineField] >= start && t[deadlineField] <= end && t[assignField])
                .forEach(t => {
                    const k = t[assignField];
                    if (!map[k]) map[k] = { tasks: 0, weight: 0 };
                    map[k].tasks++;
                    map[k].weight += (t[weightField] || 0);
                });
            return Object.entries(map).sort((a, b) => b[1].weight - a[1].weight);
        }

        const desData = buildMap(tasks.filter(t => t.designer_deadline), 'designer_assign', 'designer_weight', 'designer_deadline');
        const creData = buildMap(tasks.filter(t => t.creative_deadline), 'creative_assign', 'creative_weight', 'creative_deadline');

        function renderPs(entries, taskColor, id) {
            const el = document.getElementById(id);
            if (!entries.length) { el.innerHTML = `<div class="col-empty">No data this month</div>`; return; }
            el.innerHTML = entries.map(([name, d]) => `
                <div class="ps-row">
                    <div class="ps-name">${name}</div>
                    <div class="ps-num" style="color:${taskColor}">${d.tasks}</div>
                    <div class="ps-num" style="color:var(--c-dark)">${d.weight}</div>
                </div>
            `).join('');
        }

        renderPs(desData, 'var(--c-des)', 'ps-des');
        renderPs(creData, 'var(--c-cre)', 'ps-cre');
    }

    // ── Section 4: Daily Capacity Timeline ──
    function renderTimeline(tasks) {
        const { start, end } = monthRange();
        const days   = daysInMonth(curYear, curMonth);
        const labels = Array.from({ length: days }, (_, i) => i + 1);

        function buildDayWeights(list, deadlineField, weightField) {
            const map = {};
            list.filter(t => t[deadlineField] >= start && t[deadlineField] <= end)
                .forEach(t => {
                    const day = parseInt(t[deadlineField].split('-')[2]);
                    map[day] = (map[day] || 0) + (t[weightField] || 0);
                });
            return labels.map(d => map[d] || 0);
        }

        const desWeights = buildDayWeights(tasks.filter(t => t.designer_deadline && t.designer_assign), 'designer_deadline', 'designer_weight');
        const creWeights = buildDayWeights(tasks.filter(t => t.creative_deadline && t.creative_assign), 'creative_deadline', 'creative_weight');

        const today = new Date();
        const todayIdx = (today.getFullYear() === curYear && today.getMonth() === curMonth)
            ? today.getDate() - 1 : null;

        document.getElementById('cap-badge-des').textContent = capDes > 0 ? `Max ${capDes} / day` : '';
        document.getElementById('cap-badge-cre').textContent = capCre > 0 ? `Max ${capCre} / day` : '';

        function makeChart(canvasId, data, cap, baseColor, overColor, key) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            const bgs = data.map((v, i) => {
                if (i === todayIdx) return cap > 0 && v > cap ? 'rgba(239,68,68,0.9)' : baseColor.replace('0.45', '0.85');
                return cap > 0 && v > cap ? overColor : baseColor;
            });

            if (key === 'des' && chartDes) { chartDes.destroy(); chartDes = null; }
            if (key === 'cre' && chartCre) { chartCre.destroy(); chartCre = null; }

            const datasets = [{
                label: 'Weight',
                data,
                backgroundColor: bgs,
                borderRadius: 3,
                order: 2
            }];

            if (cap > 0) {
                datasets.push({
                    label: `Max (${cap})`,
                    data: Array(days).fill(cap),
                    type: 'line',
                    borderColor: 'rgba(239,68,68,0.6)',
                    borderWidth: 1.5,
                    borderDash: [5, 4],
                    pointRadius: 0,
                    fill: false,
                    order: 1
                });
            }

            const chart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: items => `Day ${items[0].label}`,
                                label: item => ` ${item.dataset.label}: ${item.parsed.y}`
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { font: { size: 9 }, maxRotation: 0, color: ctx => ctx.index === todayIdx ? '#ef4444' : '#94a3b8' }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f1f5f9' },
                            ticks: { font: { size: 9 }, color: '#94a3b8', precision: 0 }
                        }
                    }
                }
            });

            if (key === 'des') chartDes = chart;
            else chartCre = chart;
        }

        makeChart('chart-des', desWeights, capDes, 'rgba(59,130,246,0.45)',  'rgba(239,68,68,0.55)', 'des');
        makeChart('chart-cre', creWeights, capCre, 'rgba(139,92,246,0.45)', 'rgba(239,68,68,0.55)', 'cre');
    }

    // ── Init ──
    initMonth();
    initLayout({
        projectName: "B-QUEST",
        menus: B_QUEST_CONFIG.menus,
        getMenuPerms: loadBquestPerms
    });
    loadData();
</script>
