<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>B-QUEST | Assignment</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/system/config.js"></script>
    <script src="/system/system.js"></script>
    <script src="b-quest.js"></script>
    <link rel="stylesheet" href="b-quest.css">

    <style>
        .assign-wrapper { max-width: 1300px; margin: 0 auto; padding: 36px 20px 120px; }

        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 1.4rem; font-weight: 800; color: var(--c-dark); margin: 0; }

        /* ── Filter Bar ── */
        .filter-bar {
            background: #fff; border: 1px solid var(--c-border); border-radius: 16px;
            padding: 14px 20px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .filter-search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
        .filter-search-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--c-muted); font-size: 0.82rem; pointer-events: none; }
        .filter-search { width: 100%; border: 1px solid var(--c-border); border-radius: 10px; padding: 7px 12px 7px 32px; font-size: 0.82rem; color: var(--c-dark); background: var(--c-bg); outline: none; font-family: inherit; transition: 0.2s; box-sizing: border-box; }
        .filter-search:focus { border-color: var(--c-accent); background: #fff; }

        /* Role Pills */
        .pill-group { display: flex; gap: 6px; }
        .flt-pill { border: 1.5px solid var(--c-border); background: #fff; border-radius: 20px; padding: 5px 14px; font-size: 0.75rem; font-weight: 700; color: var(--slate); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        .flt-pill i { font-size: 0.8rem; }
        .flt-pill.active-des { background: var(--c-des-bg); color: var(--c-des); border-color: #dbeafe; }
        .flt-pill.active-cre { background: var(--c-cre-bg); color: var(--c-cre); border-color: #ede9fe; }

        /* Divider */
        .filter-divider { width: 1px; height: 22px; background: var(--c-border); flex-shrink: 0; }

        /* Select filters */
        .filter-select-wrap { display: flex; align-items: center; border: 1px solid var(--c-border); border-radius: 10px; overflow: hidden; height: 34px; background: var(--c-bg); transition: 0.2s; }
        .filter-select-tag { background: #f1f5f9; color: var(--c-muted); font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 9px; height: 100%; display: flex; align-items: center; border-right: 1px solid var(--c-border); white-space: nowrap; }
        .filter-select { border: none; background: transparent; font-size: 0.78rem; font-weight: 600; color: var(--c-slate); padding: 0 8px; outline: none; cursor: pointer; font-family: inherit; min-width: 90px; text-align-last: center; }
        #wrap-filterWork { width: 250px; flex-shrink: 0; }
        #filterWork { width: 100%; }
        .filter-select-wrap.active { border-color: var(--c-accent); background: var(--c-accent-light); }
        .filter-select-wrap.active .filter-select-tag { background: var(--c-accent); color: var(--c-dark); border-right-color: var(--c-accent); }

        .btn-reset { border: 1px solid var(--c-border); background: #fff; color: var(--c-muted); font-size: 0.7rem; font-weight: 800; border-radius: 8px; padding: 6px 15px; cursor: pointer; transition: 0.2s; margin-left: auto; }
        .btn-reset:hover { background: var(--c-bg); color: var(--c-dark); border-color: #cbd5e1; }

        /* ── Section ── */
        .section { background: #fff; border: 1px solid var(--c-border); border-radius: 20px; margin-bottom: 20px; overflow: hidden; }
        .section-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--c-border); background: #fff; }
        .section-title { font-size: 0.82rem; font-weight: 800; color: var(--c-dark); text-transform: uppercase; letter-spacing: 0.8px; display: flex; align-items: center; gap: 8px; }
        .section-badge { background: var(--c-accent); color: var(--c-dark); border-radius: 20px; padding: 2px 10px; font-size: 0.7rem; font-weight: 800; }

        /* ── Card List ── */
        #list-rows { padding: 14px 16px 20px; display: flex; flex-direction: column; gap: 10px; }

        /* ── Assign Card — CSS Grid ── */
        .assign-card {
            display: grid;
            grid-template-columns: 132px 350px 1fr 168px;
            background: #fff;
            border-radius: 14px;
            border: 1px solid #e8eaf0;
            border-left: 3px solid;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
            overflow: hidden;
            transition: box-shadow 0.2s, transform 0.18s;
        }
        .assign-card.card-des { border-left-color: var(--c-des); }
        .assign-card.card-cre { border-left-color: var(--c-cre); }
        .assign-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.09); transform: translateY(-1px); }

        /* Zone */
        .z { padding: 16px 15px; display: flex; flex-direction: column; justify-content: space-between; min-height: 92px; }
        .z + .z { position: relative; }
        .z + .z::before { content: ''; position: absolute; left: 0; top: 14px; bottom: 14px; width: 1px; background: #e8ecf2; }

        /* Col 1 — Owner */
        .z-owner { padding: 14px 12px; align-items: center; text-align: center; justify-content: center; gap: 8px; background: #fafbfc; }
        .owner-name { font-size: 0.88rem; font-weight: 700; color: #0f172a; line-height: 1.3; }
        .dl-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 0.68rem; font-weight: 600; white-space: nowrap; }
        .dl-tag.dl-ok      { background: #f1f5f9; color: #b0bac8; }
        .dl-tag.dl-warning { background: #fef9ec; color: #b88a30; }
        .dl-tag.dl-urgent  { background: #fff4ed; color: #c06820; }
        .dl-tag.dl-overdue { background: #fef2f2; color: #c04040; }

        /* Col 2 — Task */
        .task-name { font-size: 0.93rem; font-weight: 800; color: #0f172a; line-height: 1.35; margin-bottom: 2px; }
        .task-sub { font-size: 0.74rem; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-tags { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .meta-chip { background: #f1f5f9; border-radius: 4px; padding: 2px 8px; font-size: 0.67rem; font-weight: 600; color: #64748b; }
        .pub-date { display: inline-flex; align-items: center; gap: 3px; font-size: 0.67rem; font-weight: 600; color: #94a3b8; }
        .task-link { display: inline-flex; align-items: center; gap: 2px; font-size: 0.67rem; font-weight: 600; color: var(--c-accent); text-decoration: none; opacity: 0.85; transition: 0.12s; }
        .task-link:hover { opacity: 1; }

        /* Col 3 — Detail (top-aligned, 3-line scroll) */
        .z-detail { justify-content: flex-start; font-family: var(--f-sarabun); min-width: 0; }
        .detail-text { font-size: 0.78rem; color: #64748b; line-height: 1.7; height: calc(0.78rem * 1.7 * 3); overflow-y: auto; scrollbar-width: thin; scrollbar-color: #e2e8f0 transparent; }
        .detail-text::-webkit-scrollbar { width: 4px; }
        .detail-text::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

        /* Col 4 — Assign */
        .z-assign { justify-content: space-between; }
        .role-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.9px; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 3px 10px; border-radius: 20px; width: 100%; box-sizing: border-box; }
        .r-des { color: var(--c-des); background: #dbeafe; }
        .r-cre { color: var(--c-cre); background: #ede9fe; }
        .assign-select { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 7px 10px; font-size: 0.82rem; font-weight: 600; color: #0f172a; background: #fff; outline: none; cursor: pointer; appearance: none; -webkit-appearance: none; text-align: center; text-align-last: center; font-family: inherit; transition: 0.15s; }
        .assign-select:hover { border-color: #cbd5e1; }
        .assign-select:focus { border-color: var(--c-accent); background: #fff; box-shadow: 0 0 0 2px rgba(189,196,50,0.15); }
        .assign-select.is-pending { border-color: var(--c-accent); background: #fefff5; }

        /* Empty / Skeleton */
        .empty-state { padding: 60px 24px; text-align: center; color: var(--c-muted); }
        .empty-state i { font-size: 2.2rem; opacity: 0.3; display: block; margin-bottom: 12px; }
        .empty-state p { font-size: 0.85rem; font-weight: 600; margin: 0; }
        .skel { background: #e8eaee; border-radius: 4px; animation: shimmer 1.4s infinite; }
        @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.45} }

        /* ── Floating Save Bar ── */
        .save-bar {
            position: fixed; bottom: -120px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 48px); max-width: 600px;
            background: #1e293b; border-radius: 16px;
            padding: 14px 22px;
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.25);
            transition: bottom 0.4s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 999;
        }
        .save-bar.visible { bottom: 24px; }
        .save-bar-left { display: flex; align-items: center; gap: 12px; color: #fff; }
        .save-bar-left i { font-size: 1.3rem; color: var(--c-accent); }
        .save-bar-label { font-size: 0.78rem; font-weight: 800; color: #fff; letter-spacing: 0.3px; }
        .save-bar-sub { font-size: 0.72rem; color: rgba(255,255,255,0.5); margin-top: 2px; font-weight: 600; }
        .save-bar-right { display: flex; align-items: center; }
        .btn-save-main { background: var(--c-accent); color: var(--c-dark); border: none; border-radius: 10px; padding: 9px 26px; cursor: pointer; font-size: 0.84rem; font-weight: 800; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; transition: 0.15s; }
        .btn-save-main:hover { filter: brightness(1.08); }
        .btn-save-main:disabled { opacity: 0.55; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="assign-wrapper">

    <div class="page-header">
        <h1><i class="bi bi-person-lines-fill me-2" style="color:var(--c-accent)"></i>B-QUEST Assignment</h1>
    </div>

    <div class="filter-bar">
        <div class="filter-search-wrap">
            <i class="bi bi-search"></i>
            <input type="text" class="filter-search" id="filterSearch" placeholder="Search task, account...">
        </div>

        <div class="pill-group">
            <button id="pill-des" class="flt-pill active-des" onclick="togglePill('des')"><i class="bi bi-brush"></i> Designer</button>
            <button id="pill-cre" class="flt-pill active-cre" onclick="togglePill('cre')"><i class="bi bi-rocket"></i> Creative</button>
        </div>

        <div class="filter-select-wrap" id="wrap-filterOwner">
            <span class="filter-select-tag">Owner</span>
            <select class="filter-select" id="filterOwner" onchange="onSelectChange('filterOwner')"><option value="">All</option></select>
        </div>
        <div class="filter-select-wrap" id="wrap-filterType">
            <span class="filter-select-tag">Type</span>
            <select class="filter-select" id="filterType" onchange="onSelectChange('filterType')"><option value="">All</option></select>
        </div>
        <div class="filter-select-wrap" id="wrap-filterWork">
            <span class="filter-select-tag">Work</span>
            <select class="filter-select" id="filterWork" onchange="onSelectChange('filterWork')"><option value="">All</option></select>
        </div>
        <button class="btn-reset" onclick="resetFilters()">RESET</button>
    </div>

    <div class="section">
        <div class="section-header">
            <div class="section-title">
                <i class="bi bi-hourglass-split" style="color:#f59e0b"></i>
                Unassigned
                <span class="section-badge" id="badge-count">0</span>
            </div>
        </div>
        <div id="list-rows"></div>
        <div id="assign-load-more-trigger" style="height:50px;"></div>
    </div>

    <div id="save-bar" class="save-bar">
        <div class="save-bar-left">
            <i class="bi bi-check2-circle"></i>
            <div>
                <div class="save-bar-label">Assignment</div>
                <div class="save-bar-sub" id="save-bar-sub">0 item</div>
            </div>
        </div>
        <div class="save-bar-right">
            <button class="btn-save-main" id="save-btn" onclick="saveAll()">
                <i class="bi bi-floppy2-fill"></i> Save
            </button>
        </div>
    </div>

</div>

<script>
    let allRows  = [];
    let designers = [];
    let creatives = [];
    let workList  = [];
    let ownerList = [];
    let pendingAssign = {};
    let assignPage = 0;
    let assignHasMore = true;
    let assignFetching = false;

    // ── Init ──
    async function loadPage() {
        sessionStorage.removeItem('bx_perms_bquest');
        await initLayout(B_QUEST_CONFIG);
        guardBquestPage('assign');
        await Promise.all([loadProfiles(), loadWorkList()]);
        populateFilterWork();
        populateFilterType();
        await loadQuests(true);
        setupSearch();
        setupInfiniteScroll();
    }

    async function loadProfiles() {
        const { data } = await supabaseClient.from('b-quest-setting').select('codename, designer, creative').order('codename');
        if (!data) return;
        designers = data.filter(p => p.designer).map(p => p.codename);
        creatives = data.filter(p => p.creative).map(p => p.codename);
    }

    async function loadWorkList() {
        const { data } = await supabaseClient.from('b-quest-work').select('work, role').order('work');
        workList = data || [];
    }

    async function loadQuests(isFirst = false) {
        if (assignFetching || (!assignHasMore && !isFirst)) return;
        assignFetching = true;

        const limit = B_QUEST_CONFIG.itemsPerPage_Assign || 10;
        const from = assignPage * limit;
        const to = from + limit - 1;

        if (isFirst) document.getElementById('list-rows').innerHTML = skeletonHTML();

        let query = supabaseClient
            .from('b-quest-list')
            .select('id, task_name, account_name, opportunity_name, detail, link, publish_date, owner, designer, creative, designer_type, creative_type, designer_deadline, creative_deadline, designer_assign, creative_assign')
            .or('and(designer.neq.-,designer.not.is.null,designer_assign.is.null),and(designer.neq.-,designer.not.is.null,designer_assign.eq.-),and(creative.neq.-,creative.not.is.null,creative_assign.is.null),and(creative.neq.-,creative.not.is.null,creative_assign.eq.-)')
            .order('last_update', { ascending: false })
            .range(from, to);

        const { data, error } = await query;
        if (error) { console.error(error); assignFetching = false; return; }

        if (data.length < limit) assignHasMore = false;

        const newRows = [];
        (data || []).forEach(q => {
            const hasD = q.designer && q.designer !== '-' && q.designer !== '';
            const hasC = q.creative  && q.creative  !== '-' && q.creative  !== '';
            if (hasD && (!q.designer_assign || q.designer_assign === '-')) newRows.push({ role: 'Designer', quest: q });
            if (hasC && (!q.creative_assign  || q.creative_assign  === '-')) newRows.push({ role: 'Creative', quest: q });
        });

        if (isFirst) {
            allRows = newRows;
            ownerList = [...new Set(allRows.map(r => r.quest.owner).filter(o => o && o !== '-'))].sort();
            populateFilterOwner();
        } else {
            allRows = allRows.concat(newRows);
            const newOwners = newRows.map(r => r.quest.owner).filter(o => o && o !== '-' && !ownerList.includes(o));
            if (newOwners.length) { ownerList = [...new Set([...ownerList, ...newOwners])].sort(); populateFilterOwner(); }
        }

        assignPage++;
        assignFetching = false;
        applyFilters();
    }

    function resetAndReload() {
        assignPage = 0;
        assignHasMore = true;
        assignFetching = false;
        allRows = [];
        ownerList = [];
        loadQuests(true);
    }

    function setupInfiniteScroll() {
        const trigger = document.getElementById('assign-load-more-trigger');
        if (!trigger) return;
        const observer = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting && !assignFetching && assignHasMore) loadQuests();
        }, { rootMargin: '100px' });
        observer.observe(trigger);
    }

    // ── Populate filters ──
    function populateFilterWork() { rebuildWorkFilter(); }
    function rebuildWorkFilter() {
        const sel = document.getElementById('filterWork'); const prev = sel.value; sel.innerHTML = '<option value="">All</option>';
        const desActive = document.getElementById('pill-des').classList.contains('active-des');
        const creActive = document.getElementById('pill-cre').classList.contains('active-cre');
        const desWorks = workList.filter(w => w.role === 'Designer'); const creWorks = workList.filter(w => w.role === 'Creative');
        if (desActive && desWorks.length) { const g = document.createElement('optgroup'); g.label = '── Designer ──'; desWorks.forEach(w => g.appendChild(new Option(w.work, w.work))); sel.appendChild(g); }
        if (creActive && creWorks.length) { const g = document.createElement('optgroup'); g.label = '── Creative ──'; creWorks.forEach(w => g.appendChild(new Option(w.work, w.work))); sel.appendChild(g); }
        if ([...sel.options].some(o => o.value === prev)) sel.value = prev; updateSelectHighlight('filterWork');
    }
    function populateFilterType() { const sel = document.getElementById('filterType'); sel.innerHTML = '<option value="">All</option>'; B_QUEST_CONFIG.listTypes.forEach(t => sel.appendChild(new Option(t, t))); }
    function populateFilterOwner() { const sel = document.getElementById('filterOwner'); const prev = sel.value; sel.innerHTML = '<option value="">All</option>'; ownerList.forEach(o => sel.appendChild(new Option(o, o))); if ([...sel.options].some(op => op.value === prev)) sel.value = prev; updateSelectHighlight('filterOwner'); }

    // ── Filter logic ──
    function togglePill(role) { const btn = document.getElementById('pill-' + role); btn.classList.toggle(role === 'des' ? 'active-des' : 'active-cre'); rebuildWorkFilter(); applyFilters(); }
    function onSelectChange(id) { updateSelectHighlight(id); applyFilters(); }
    function updateSelectHighlight(id) { const wrap = document.getElementById('wrap-' + id); wrap.classList.toggle('active', !!document.getElementById(id).value); }
    function setupSearch() { let timer; document.getElementById('filterSearch').addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(applyFilters, 250); }); }

    function applyFilters() {
        const qInput = document.getElementById('filterSearch').value.trim().toLowerCase();
        const workInput = document.getElementById('filterWork').value;
        const typeInput = document.getElementById('filterType').value;
        const ownerInput = document.getElementById('filterOwner').value;
        const desOn = document.getElementById('pill-des').classList.contains('active-des');
        const creOn = document.getElementById('pill-cre').classList.contains('active-cre');

        const rows = allRows.filter(r => {
            if (r.role === 'Designer' && !desOn) return false;
            if (r.role === 'Creative'  && !creOn) return false;
            const rWork = r.role === 'Designer' ? r.quest.designer : r.quest.creative;
            const rType = r.role === 'Designer' ? r.quest.designer_type : r.quest.creative_type;
            if (workInput && rWork !== workInput) return false;
            if (typeInput && rType !== typeInput) return false;
            if (ownerInput && r.quest.owner !== ownerInput) return false;
            if (qInput) { const hay = [r.quest.task_name, r.quest.account_name, r.quest.opportunity_name, rWork, rType, r.quest.owner].join(' ').toLowerCase(); if (!hay.includes(qInput)) return false; }
            return true;
        });
        document.getElementById('badge-count').textContent = rows.length;
        renderRows(rows);
    }

    // ── Render ──
    function renderRows(rows) {
        const container = document.getElementById('list-rows');
        if (!rows.length) { container.innerHTML = `<div class="empty-state"><i class="bi bi-inbox"></i><p>No unassigned items</p></div>`; return; }

        container.innerHTML = rows.map(r => {
            const q = r.quest;
            const isDes = r.role === 'Designer';
            const rWork = isDes ? q.designer : q.creative;
            const rType = isDes ? q.designer_type : q.creative_type;
            const rDL   = isDes ? q.designer_deadline : q.creative_deadline;
            const options = isDes ? designers : creatives;
            const key  = `${q.id}__${r.role}`;
            const pending = pendingAssign[key];
            const opts = [`<option value="">— Unassigned —</option>`]
                .concat(options.map(n => `<option value="${n}" ${pending?.value === n ? 'selected' : ''}>${n}</option>`))
                .join('');

            return `
            <div class="assign-card ${isDes ? 'card-des' : 'card-cre'}" id="row-${q.id}__${r.role}">

                <div class="z z-owner">
                    <div class="owner-name">${esc(q.owner) || '—'}</div>
                    ${rDL ? `<div class="dl-tag ${dlUrgency(rDL)}"><i class="bi bi-calendar3"></i> ${formatDate(rDL, true)}</div>` : ''}
                </div>

                <div class="z z-task">
                    <div>
                        <div class="task-name">${esc(q.task_name) || 'Untitled'}</div>
                        ${(q.account_name || q.opportunity_name) ? `<div class="task-sub">${[esc(q.account_name), esc(q.opportunity_name)].filter(Boolean).join(' · ')}</div>` : ''}
                    </div>
                    <div class="task-tags">
                        ${rWork ? `<span class="meta-chip">${esc(rWork)}</span>` : ''}
                        ${rType ? `<span class="meta-chip">${esc(rType)}</span>` : ''}
                        ${q.publish_date ? `<span class="pub-date"><i class="bi bi-send"></i> ${formatDate(q.publish_date, true)}</span>` : ''}
                        ${q.link ? `<a class="task-link" href="${esc(q.link)}" target="_blank" rel="noopener"><i class="bi bi-link-45deg"></i> Link</a>` : ''}
                    </div>
                </div>

                <div class="z z-detail">
                    ${q.detail ? `<div class="detail-text">${esc(q.detail)}</div>` : ''}
                </div>

                <div class="z z-assign">
                    <div class="role-label ${isDes ? 'r-des' : 'r-cre'}">
                        <i class="bi bi-${isDes ? 'brush' : 'rocket'}"></i> ${r.role}
                    </div>
                    <select class="assign-select ${pending ? 'is-pending' : ''}"
                        data-quest-id="${q.id}"
                        data-role="${r.role}"
                        onchange="onAssignChange(this)">
                        ${opts}
                    </select>
                </div>

            </div>`;
        }).join('');
    }

    function skeletonHTML() {
        const row = (accent) => `
        <div class="assign-card ${accent}" style="pointer-events:none">
            <div class="z z-owner">
                <div class="skel" style="height:13px;width:72px;border-radius:3px"></div>
                <div class="skel" style="height:18px;width:68px;border-radius:20px;margin-top:2px"></div>
            </div>
            <div class="z z-task">
                <div>
                    <div class="skel" style="height:14px;width:70%;border-radius:3px;margin-bottom:6px"></div>
                    <div class="skel" style="height:10px;width:44%;border-radius:3px"></div>
                </div>
                <div style="display:flex;gap:5px">
                    <div class="skel" style="height:17px;width:54px;border-radius:4px"></div>
                    <div class="skel" style="height:17px;width:42px;border-radius:4px"></div>
                </div>
            </div>
            <div class="z z-detail">
                <div style="display:flex;flex-direction:column;gap:5px">
                    <div class="skel" style="height:10px;width:100%;border-radius:3px"></div>
                    <div class="skel" style="height:10px;width:85%;border-radius:3px"></div>
                    <div class="skel" style="height:10px;width:68%;border-radius:3px"></div>
                </div>
            </div>
            <div class="z z-assign">
                <div class="skel" style="height:10px;width:58px;border-radius:3px"></div>
                <div class="skel" style="height:32px;width:100%;border-radius:8px"></div>
            </div>
        </div>`;
        return row('card-des') + row('card-cre') + row('card-des') + row('card-cre');
    }
    function dlUrgency(dateStr) {
        if (!dateStr) return '';
        const days = Math.ceil((new Date(dateStr) - new Date()) / 86400000);
        if (days < 0)  return 'dl-overdue';
        if (days <= 3) return 'dl-urgent';
        if (days <= 7) return 'dl-warning';
        return 'dl-ok';
    }
    function esc(str) { return str ? str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

    // ── Reset ──
    function resetFilters() {
        document.getElementById('filterSearch').value = ''; document.getElementById('filterWork').value = ''; document.getElementById('filterType').value = ''; document.getElementById('filterOwner').value = '';
        updateSelectHighlight('filterWork'); updateSelectHighlight('filterType'); updateSelectHighlight('filterOwner');
        const desPill = document.getElementById('pill-des'); const crePill = document.getElementById('pill-cre');
        if (!desPill.classList.contains('active-des')) desPill.classList.add('active-des'); if (!crePill.classList.contains('active-cre')) crePill.classList.add('active-cre');
        rebuildWorkFilter(); resetAndReload();
    }

    // ── Pending Assign ──
    function onAssignChange(sel) {
        const questId = sel.dataset.questId;
        const role    = sel.dataset.role;
        const newVal  = sel.value;
        const key     = `${questId}__${role}`;

        if (!newVal) {
            delete pendingAssign[key];
            sel.classList.remove('is-pending');
        } else {
            pendingAssign[key] = { questId, role, value: newVal, sel };
            sel.classList.add('is-pending');
        }
        updateSaveBar();
    }

    function updateSaveBar() {
        const count = Object.keys(pendingAssign).length;
        const bar   = document.getElementById('save-bar');
        if (!count) { bar.classList.remove('visible'); return; }
        bar.classList.add('visible');
        document.getElementById('save-bar-sub').textContent = `${count} item`;
    }

    function cancelAll() {
        Object.values(pendingAssign).forEach(p => { p.sel.value = ''; p.sel.classList.remove('is-pending'); });
        pendingAssign = {};
        updateSaveBar();
    }

    async function saveAll() {
        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Saving...';

        const entries = Object.entries(pendingAssign);
        let saved = 0, failed = 0;

        for (const [key, { questId, role, value }] of entries) {
            const field = role === 'Designer' ? 'designer_assign' : 'creative_assign';
            const { error } = await supabaseClient.from('b-quest-list')
                .update({ [field]: value, last_update: new Date().toISOString() })
                .eq('id', questId);
            if (error) { failed++; }
            else { allRows = allRows.filter(r => !(String(r.quest.id) === String(questId) && r.role === role)); delete pendingAssign[key]; saved++; }
        }

        if (failed) Swal.fire({ icon: 'error', title: `บันทึกไม่สำเร็จ ${failed} รายการ`, timer: 3000, showConfirmButton: false });
        if (saved)  notify('Assigned', `บันทึกสำเร็จ ${saved} รายการ`, 'success');

        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-floppy2-fill"></i> Save';
        updateSaveBar();
        applyFilters();
    }
    loadPage();
</script>
</body>
</html>
