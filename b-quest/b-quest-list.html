<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Mission Board</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../config.js"></script>
    <script src="../system.js"></script>

    <style>
        :root { --bquest-accent: #bdc432; --bg-gray: #f4f6f9; }
        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: var(--bg-gray); }

        .main-header { background: #fff; padding: 10px 0; border-bottom: 1px solid #dee2e6; }
        .sub-header-line { background: var(--bquest-accent); height: 40px; display: flex; align-items: center; padding: 0 20px; font-weight: 700; }

        .quest-card {
            background: white; border: none; border-radius: 12px; margin-bottom: 12px;
            transition: 0.2s; border-left: 6px solid #e9ecef; cursor: pointer;
        }
        .quest-card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .status-done { border-left-color: #28a745; }
        .status-progress { border-left-color: var(--bquest-accent); }

        .deadline-container { min-width: 180px; text-align: center; }
        .deadline-label { font-size: 0.65rem; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .deadline-value { background: #f1f3f5; border-radius: 8px; padding: 6px 0; font-weight: 700; font-size: 0.9rem; border: 1px solid #e9ecef; width: 100%; display: block; }

        .modal-details-box { background: #f8f9fa; border-radius: 10px; padding: 15px; border: 1px solid #eee; height: 100%; }
        .info-header { font-weight: 700; font-size: 0.8rem; color: #555; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .table-custom { font-size: 0.85rem; width: 100%; }
        .table-custom td { padding: 5px 0; border-bottom: 1px solid #f1f1f1; }
        .table-custom td:last-child { text-align: right; font-weight: 700; }
        
        /* แก้ปัญหา Modal ซ้อนหรือเปิดไม่ขึ้น */
        .modal { z-index: 1060 !important; }
        .modal-backdrop { z-index: 1050 !important; }
    </style>
</head>
<body>

<nav class="main-header sticky-top">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" style="height: 32px;">
        <button class="btn btn-dark btn-sm rounded-pill px-4" onclick="BQuest.logout()">Logout</button>
    </div>
</nav>
<div class="sub-header-line shadow-sm">B-QUEST MISSION BOARD</div>

<div class="container mt-4 pb-5">
    <div id="taskContainer" class="row"></div>
    <div id="load-more-trigger" style="height: 100px;"></div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-header bg-white border-0 px-4 pt-4">
                <div class="flex-grow-1">
                    <h3 class="fw-bold mb-1" id="m-task-name">Loading...</h3>
                    <p class="text-muted mb-0" id="m-account-info">- | -</p>
                </div>
                <div class="d-flex gap-3">
                    <div class="deadline-container">
                        <div class="deadline-label">DESIGNER DEADLINE</div>
                        <div class="deadline-value text-primary" id="m-ds-dl">-</div>
                    </div>
                    <div class="deadline-container">
                        <div class="deadline-label">CREATIVE DEADLINE</div>
                        <div class="deadline-value text-secondary" id="m-ct-dl">-</div>
                    </div>
                </div>
            </div>
            <div class="modal-body p-4">
                <div class="row g-3">
                    <div class="col-md-6"><div class="modal-details-box"><div class="info-header">Link</div><div class="small text-primary text-break" id="m-link">-</div></div></div>
                    <div class="col-md-3"><div class="modal-details-box"><div class="info-header">Publish Date</div><div class="fw-bold" id="m-publish">-</div></div></div>
                    <div class="col-md-3"><div class="modal-details-box"><div class="info-header">Owner</div><div class="fw-bold" id="m-owner">-</div></div></div>
                    <div class="col-md-12"><div class="modal-details-box"><div class="info-header">Detail</div><div id="m-detail" class="small">-</div></div></div>
                    <div class="col-md-6">
                        <div class="modal-details-box">
                            <div class="info-header">🎨 Designer</div>
                            <table class="table-custom">
                                <tr><td>Type:</td><td id="m-ds-type">-</td></tr>
                                <tr><td>Assign:</td><td id="m-ds-name">-</td></tr>
                                <tr><td>Status:</td><td id="m-ds-status">-</td></tr>
                            </table>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="modal-details-box">
                            <div class="info-header">🚀 Creative</div>
                            <table class="table-custom">
                                <tr><td>Type:</td><td id="m-ct-type">-</td></tr>
                                <tr><td>Assign:</td><td id="m-ct-name">-</td></tr>
                                <tr><td>Status:</td><td id="m-ct-status">-</td></tr>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let allQuests = [];
    let currentPage = 0;
    const itemsPerPage = 12;
    let isFetching = false;
    let hasMore = true;

    // สร้าง Modal Instance ไว้รอเลย
    let myModal;
    window.addEventListener('DOMContentLoaded', () => {
        myModal = new bootstrap.Modal(document.getElementById('detailModal'));
    });

    async function fetchQuests(isFirstLoad = false) {
        if (isFetching || (!hasMore && !isFirstLoad)) return;
        isFetching = true;

        const from = currentPage * itemsPerPage;
        const to = from + itemsPerPage - 1;

        try {
            const { data, error } = await supabaseClient
                .from('b-quest-list')
                .select('*')
                .range(from, to)
                .order('id', { ascending: false });

            if (error) throw error;
            if (data.length < itemsPerPage) hasMore = false;

            allQuests = [...allQuests, ...data];
            renderCards(data);
            currentPage++;
        } catch (e) { 
            console.error("Fetch error:", e); 
        } finally { 
            isFetching = false; 
        }
    }

    function renderCards(data) {
        const container = document.getElementById("taskContainer");
        data.forEach(task => {
            const card = document.createElement("div");
            card.className = "col-12";
            const isDone = (task.designer_status === 'Done');
            
            card.innerHTML = `
                <div class="quest-card p-4 shadow-sm ${isDone ? 'status-done' : 'status-progress'}" id="card-${task.id}">
                    <div class="row align-items-center">
                        <div class="col-md-5">
                            <h5 class="fw-bold mb-1">${task.task_name || 'No Title'}</h5>
                            <small class="text-muted">${task.account_name || '-'} | ${task.opportunity_name || '-'}</small>
                        </div>
                        <div class="col-md-5 d-flex justify-content-center gap-4">
                            <div class="deadline-container">
                                <div class="deadline-label">Designer Deadline</div>
                                <div class="deadline-value text-primary">${task.designer_deadline || '-'}</div>
                            </div>
                            <div class="deadline-container">
                                <div class="deadline-label">Creative Deadline</div>
                                <div class="deadline-value text-secondary">${task.creative_deadline || '-'}</div>
                            </div>
                        </div>
                        <div class="col-md-2 text-end">
                            <button class="btn btn-outline-primary btn-sm rounded-pill px-3">Edit</button>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);

            // ผูก Event ทันทีที่สร้างเสร็จ
            document.getElementById(`card-${task.id}`).addEventListener('click', function(e) {
                // ถ้ากดโดนปุ่ม Edit ไม่ต้องเปิด Modal
                if (e.target.tagName === 'BUTTON') return;
                openDetail(task.id);
            });
        });
    }

    function openDetail(taskId) {
        // หาข้อมูลจาก Array allQuests
        const q = allQuests.find(item => item.id == taskId);
        if (!q) return;

        // เติมข้อมูล
        document.getElementById('m-task-name').innerText = q.task_name || '-';
        document.getElementById('m-account-info').innerText = `${q.account_name || '-'} | ${q.opportunity_name || '-'}`;
        document.getElementById('m-ds-dl').innerText = q.designer_deadline || '-';
        document.getElementById('m-ct-dl').innerText = q.creative_deadline || '-';
        document.getElementById('m-link').innerHTML = q.link ? `<a href="${q.link}" target="_blank">${q.link}</a>` : 'ไม่มีลิงก์';
        document.getElementById('m-publish').innerText = q.publish_date || '-';
        document.getElementById('m-owner').innerText = q.owner || '-';
        document.getElementById('m-detail').innerText = q.detail || 'ไม่มีรายละเอียด';
        
        document.getElementById('m-ds-type').innerText = q.designer_type || '-';
        document.getElementById('m-ds-name').innerText = q.designer || '-';
        document.getElementById('m-ds-status').innerText = q.designer_status || '-';

        document.getElementById('m-ct-type').innerText = q.creative_type || '-';
        document.getElementById('m-ct-name').innerText = q.creative || '-';
        document.getElementById('m-ct-status').innerText = q.creative_status || '-';

        // สั่งเปิด
        myModal.show();
    }

    // Infinite Scroll
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isFetching && hasMore) {
            fetchQuests();
        }
    }, { rootMargin: '600px' });
    observer.observe(document.getElementById('load-more-trigger'));

    // เริ่มทำงานครั้งแรก
    fetchQuests(true);
</script>

</body>
</html>
