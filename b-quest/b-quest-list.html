<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Master Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../config.js"></script>
    <script src="../system.js"></script>

    <style>
        /* =========================================
           0. ROOT VARIABLES
        ========================================= */
        :root { 
            --c-progress: #4e73df; 
            --c-done: #94a3b8;     
            --c-bg: #f8fafc;
            --c-text-main: #1e293b;
            --c-text-muted: #94a3b8;
            --c-slate: #626e7f;
            --c-accent: #bdc432;
            --c-role: #50adba; /* สีใหม่สำหรับ Role */
            --radius-card: 20px;
        }

        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: var(--c-bg); color: var(--c-text-main); padding-bottom: 50px; margin: 0; }

        /* =========================================
           1. SYSTEM GLOBAL (sys-)
        ========================================= */
        .sys-topnav { background: #fff; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .sys-brand { display: flex; align-items: center; gap: 15px; }
        .sys-logo { height: 28px; }
        .sys-title { font-weight: 700; font-size: 1.1rem; color: var(--c-text-main); border-left: 2px solid #e2e8f0; padding-left: 15px; }
        .sys-user-panel { display: flex; align-items: center; gap: 20px; }
        .sys-user-info { display: flex; align-items: center; gap: 10px; color: var(--c-slate); font-weight: 500; font-size: 0.9rem; }
        .sys-icon-btn { color: var(--c-text-muted); font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .sys-icon-btn:hover { color: var(--c-text-main); }
        
        .sys-menubar { background: var(--c-accent); padding: 0 30px; display: flex; gap: 30px; }
        .sys-menu-link { padding: 12px 15px; font-size: 0.85rem; font-weight: 700; color: rgba(0,0,0,0.6); text-decoration: none; text-transform: uppercase; }
        .sys-menu-link.active { color: #000; background: rgba(255,255,255,0.2); }

        /* =========================================
           2. FILTER ZONE (flt-)
        ========================================= */
        .flt-wrapper { background: #fff; padding: 15px 30px; border-bottom: 1px solid #e2e8f0; }
        .flt-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        
        /* Search (ยาวขึ้น) */
        .flt-search { position: relative; width: 380px; }
        .flt-search i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--c-text-muted); }
        .flt-search-input { background: var(--c-bg); border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 15px 8px 40px; font-size: 0.85rem; width: 100%; outline: none; }
        
        /* Date Inputs (รองรับ Type Date) */
        .flt-date-group { display: flex; align-items: center; background: var(--c-bg); border: 1px solid #e2e8f0; border-radius: 12px; padding: 0 12px; height: 38px; }
        .flt-date-input { border: none; background: transparent; font-size: 0.82rem; color: var(--c-slate); outline: none; font-family: inherit; }
        
        .flt-btn-icon { border: 1px solid #e2e8f0; background: #fff; border-radius: 10px; height: 38px; width: 38px; display: flex; align-items: center; justify-content: center; color: var(--c-text-muted); cursor: pointer; }
        .flt-btn-adv { border: 1px solid #e2e8f0; background: #fff; border-radius: 10px; padding: 0 15px; height: 38px; font-size: 0.8rem; font-weight: 600; color: var(--c-slate); cursor: pointer; margin-left: auto; transition: 0.2s; }
        .flt-btn-adv:hover { background: #f1f5f9; }

        /* Pills (แบ่ง Group ชัดเจน ไม่มี Text Label) */
        .flt-pill-group { display: flex; align-items: center; gap: 6px; }
        .flt-pill { border: 1px solid #e2e8f0; background: #fff; border-radius: 20px; padding: 4px 14px; font-size: 0.75rem; font-weight: 600; color: var(--c-slate); cursor: pointer; transition: all 0.2s ease; }
        .flt-divider { width: 1px; height: 24px; background: #e2e8f0; margin: 0 5px; }

        /* Pill Active States */
        .flt-pill.active-role { background: var(--c-role); color: #fff; border-color: var(--c-role); }
        .flt-pill.active-prog { background: var(--c-progress); color: #fff; border-color: var(--c-progress); }
        .flt-pill.active-done { background: var(--c-slate); color: #fff; border-color: var(--c-slate); }

        /* Expandable Advanced (อยู่แถวเดียวกันหมด) */
        .flt-advanced-zone { display: none; padding-top: 15px; border-top: 1px dashed #eee; margin-top: 15px; }
        .flt-advanced-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        
        .flt-select-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; overflow: hidden; height: 38px; }
        .flt-select-tag { background: #f1f5f9; color: var(--c-text-muted); font-size: 0.6rem; font-weight: 800; padding: 0 10px; height: 100%; display: flex; align-items: center; text-transform: uppercase; border-right: 1px solid #e2e8f0; min-width: 65px; }
        .flt-select-input { border: none; font-size: 0.8rem; font-weight: 600; color: var(--c-slate); padding: 0 8px; width: 100%; outline: none; background: transparent; cursor: pointer; min-width: 120px; }
        
        .flt-btn-reset-adv { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 0 15px; height: 38px; font-size: 0.8rem; font-weight: 600; color: var(--c-text-muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .flt-btn-reset-adv:hover { color: var(--c-text-main); background: #f8fafc; }

        /* =========================================
           3. B-QUEST CARD (bqc-) -> ล็อคห้ามเพี้ยน 100%
        ========================================= */
        .bqc-card { background: white; border: 1px solid #f1f5f9; border-radius: var(--radius-card); margin-bottom: 15px; border-left: 6px solid #e2e8f0; transition: 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
        .bqc-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .bqc-status-done { border-left-color: var(--c-done); }
        .bqc-status-prog { border-left-color: var(--c-progress); }

        .bqc-header { cursor: pointer; padding: 20px 28px; display: flex; align-items: center; }
        .bqc-info-zone { width: 50%; flex-shrink: 0; min-width: 0; padding-right: 20px; }
        .bqc-title { font-weight: 700; font-size: 1rem; color: var(--c-text-main); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bqc-subtitle { font-size: 0.8rem; color: var(--c-text-muted); }
        
        .bqc-dl-grid { display: grid; grid-template-columns: 140px 140px; gap: 20px; flex-grow: 1; justify-content: center; }
        .bqc-dl-col { text-align: center; display: flex; flex-direction: column; justify-content: center; height: 42px; }
        .bqc-dl-label { font-size: 0.55rem; font-weight: 800; color: var(--c-text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .bqc-tag { border-radius: 8px; padding: 4px 12px; font-size: 0.78rem; font-weight: 700; display: inline-block; border: 1px solid transparent; }
        .bqc-tag-des { background: #eff6ff; color: #3b82f6; border-color: #dbeafe; }
        .bqc-tag-cre { background: #f8fafc; color: #64748b; border-color: #f1f5f9; }

        .bqc-actions { width: 120px; display: flex; justify-content: flex-end; align-items: center; gap: 8px; opacity: 0; transition: 0.2s; }
        .bqc-card:hover .bqc-actions { opacity: 1; }
        .bqc-btn-more { color: var(--c-text-muted); padding: 8px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .bqc-btn-more:hover { background: #f1f5f9; color: var(--c-text-main); }

        .bqc-body { background: #fdfdfd; border-top: 1px solid #f1f5f9; padding: 25px; }
        .bqc-meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .bqc-meta-pill { background: white; border: 1px solid #e2e8f0; padding: 6px 14px; border-radius: 12px; display: flex; align-items: center; gap: 8px; }
        .bqc-meta-label { font-size: 0.7rem; font-weight: 700; color: var(--c-text-muted); text-transform: uppercase; }
        .bqc-meta-val { font-size: 0.85rem; font-weight: 600; color: var(--c-slate); }
        .bqc-last-update { font-size: 0.72rem; color: var(--c-slate); font-weight: 500; display: flex; align-items: center; gap: 5px; }
        .bqc-btn-link { background: var(--c-text-main); border: none; border-radius: 10px; padding: 6px 15px; font-size: 0.75rem; font-weight: 600; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 6px; }
        
        .bqc-layout-row { display: flex; gap: 20px; }
        .bqc-col-30 { width: 30%; }
        .bqc-col-40 { width: 40%; }
        
        .bqc-sec-title { font-size: 0.82rem; font-weight: 700; color: var(--c-slate); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .bqc-panel { background: white; border-radius: var(--radius-card); padding: 20px; border: 1px solid #eef2f6; height: 200px; }
        .bqc-detail-box { overflow-y: auto; overflow-x: hidden; line-height: 1.7; font-size: 0.92rem; color: var(--c-slate); word-break: break-word; }
        .bqc-detail-box::-webkit-scrollbar { width: 3px; }
        .bqc-detail-box::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .bqc-panel.is-empty { background-color: #fcfcfc; border: 2px dashed #f1f5f9; }
        .bqc-empty-text { margin-top: 50px; color: var(--c-slate); opacity: 0.5; font-weight: 400; font-size: 0.75rem; text-transform: uppercase; text-align: center; }
        
        .bqc-item { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 0.82rem; color: var(--c-slate); }
        .bqc-val { font-weight: 600; }
        .bqc-divider { border-bottom: 1px dashed #f1f5f9; margin: 6px 0 10px 0; }
        .bqc-dot { height: 7px; width: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .bqc-dot-prog { background-color: var(--c-progress); }
        .bqc-dot-done { background-color: var(--c-done); }
    </style>
</head>
<body>

<header id="global-header" class="sticky-top shadow-sm" style="z-index: 1020;">
    <div class="sys-topnav">
        <div class="sys-brand">
            <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" class="sys-logo" alt="Logo">
            <span class="sys-title">B-QUEST</span>
        </div>
        <div class="sys-user-panel">
            <div class="sys-user-info"><i class="bi bi-person-circle"></i> <span id="user-display">Loading...</span></div>
            <i class="bi bi-gear sys-icon-btn"></i>
            <i class="bi bi-box-arrow-right sys-icon-btn ms-2" onclick="BQuest.logout()" title="Logout"></i>
        </div>
    </div>
    <nav class="sys-menubar">
        <a href="#" class="sys-menu-link active">List</a>
        <a href="#" class="sys-menu-link">New Mission</a>
    </nav>

    <section id="filter-zone" class="flt-wrapper">
        <div class="flt-row">
            
            <div class="flt-search">
                <i class="bi bi-search"></i>
                <input type="text" class="flt-search-input" id="globalSearch" placeholder="Search...">
            </div>
            
            <div class="flt-date-group" title="Filter by Deadline">
                <input type="date" class="flt-date-input" id="startDate">
                <span style="color:#cbd5e1; padding: 0 5px;">-</span>
                <input type="date" class="flt-date-input" id="endDate">
            </div>

            <div class="flt-pill-group">
                <button class="flt-pill active-role" onclick="this.classList.toggle('active-role')">Designer</button>
                <button class="flt-pill active-role" onclick="this.classList.toggle('active-role')">Creative</button>
            </div>

            <div class="flt-divider"></div>

            <div class="flt-pill-group">
                <button class="flt-pill active-prog" onclick="this.classList.toggle('active-prog')">Progress</button>
                <button class="flt-pill active-done" onclick="this.classList.toggle('active-done')">Done</button>
            </div>

            <button class="flt-btn-adv" id="toggleFilters"><i class="bi bi-sliders"></i> Advance</button>
        </div>

        <div class="flt-advanced-zone" id="advancedFilterZone">
            <div class="flt-advanced-row">
                <div class="flt-select-box"><span class="flt-select-tag">Work</span><select class="flt-select-input" id="filterWork"><option>All Work</option></select></div>
                <div class="flt-select-box"><span class="flt-select-tag">Type</span><select class="flt-select-input" id="filterType"><option>All Type</option></select></div>
                <div class="flt-select-box"><span class="flt-select-tag">Assign</span><select class="flt-select-input" id="filterAssign"><option>All Staff</option></select></div>
                <div class="flt-select-box"><span class="flt-select-tag">Owner</span><select class="flt-select-input" id="filterOwner"><option>All Owner</option></select></div>
                
                <button class="flt-btn-reset-adv" id="resetAdvanced"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
            </div>
        </div>
    </section>
</header>

<main id="card-container" class="container-fluid px-5 mt-4">
    <div id="taskContainer" class="row"></div>
    <div id="load-more-trigger" style="height: 100px;"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ---------------------------------------------------------
    // 1. UI Logic (Filters)
    // ---------------------------------------------------------
    document.getElementById('toggleFilters').addEventListener('click', function() {
        const zone = document.getElementById('advancedFilterZone');
        zone.style.display = (window.getComputedStyle(zone).display === 'none') ? 'block' : 'none';
    });

    document.getElementById('resetAdvanced').addEventListener('click', function() {
        document.getElementById('filterWork').selectedIndex = 0;
        document.getElementById('filterType').selectedIndex = 0;
        document.getElementById('filterAssign').selectedIndex = 0;
        document.getElementById('filterOwner').selectedIndex = 0;
    });

    // ---------------------------------------------------------
    // 2. Data Logic (Fetch & Render)
    // ---------------------------------------------------------
    let currentPage = 0;
    const itemsPerPage = 12;
    let isFetching = false;
    let hasMore = true;

    function formatDate(dateStr) {
        if (!dateStr || dateStr === '-') return '-';
        try {
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return dateStr;
            return String(date.getDate()).padStart(2, '0') + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + date.getFullYear();
        } catch (e) { return dateStr; }
    }

    async function initPage() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            const profile = await BQuest.getProfile(session.user.id);
            if (profile) document.getElementById("user-display").innerText = profile.nick_name || profile.full_name;
        }
        fetchQuests(true);
    }

    async function fetchQuests(isFirstLoad = false) {
        if (isFetching || (!hasMore && !isFirstLoad)) return;
        isFetching = true;
        const from = currentPage * itemsPerPage;
        const to = from + itemsPerPage - 1;
        try {
            const { data, error } = await supabaseClient.from('b-quest-list').select('*').range(from, to).order('id', { ascending: false });
            if (error) throw error;
            if (data.length < itemsPerPage) hasMore = false;
            renderCards(data);
            currentPage++;
        } catch (e) { console.error(e); }
        finally { isFetching = false; }
    }

    function renderCards(data) {
        const container = document.getElementById("taskContainer");
        data.forEach(task => {
            const isDone = (task.designer_status === 'Done');
            const hasDes = !!task.designer && task.designer !== '-';
            const hasCre = !!task.creative && task.creative !== '-';
            const collapseId = `collapse-${task.id}`;
            const dDL = formatDate(task.designer_deadline);
            const cDL = formatDate(task.creative_deadline);
            const pubDate = formatDate(task.publish_date);
            const updateDate = formatDate(task.last_update);

            const card = document.createElement("div");
            card.className = "col-12";
            
            card.innerHTML = `
                <div class="bqc-card ${isDone ? 'bqc-status-done' : 'bqc-status-prog'}">
                    
                    <div class="bqc-header">
                        <div class="bqc-info-zone" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <div class="bqc-title">${task.task_name || 'Untitled Project'}</div>
                            <div class="bqc-subtitle">${task.account_name} | ${task.opportunity_name}</div>
                        </div>
                        
                        <div class="bqc-dl-grid" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <div class="bqc-dl-col">${task.designer_deadline ? `<span class="bqc-dl-label">Designer</span><span class="bqc-tag bqc-tag-des">${dDL}</span>` : ''}</div>
                            <div class="bqc-dl-col">${task.creative_deadline ? `<span class="bqc-dl-label">Creative</span><span class="bqc-tag bqc-tag-cre">${cDL}</span>` : ''}</div>
                        </div>
                        
                        <div class="bqc-actions">
                            <button class="btn btn-outline-dark btn-sm rounded-pill px-3" style="font-size: 0.7rem;">Edit</button>
                            <div class="dropdown">
                                <button class="bqc-btn-more" type="button" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                                <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg" style="border-radius: 12px; font-size: 0.85rem;">
                                    <li><a class="dropdown-item py-2" href="#"><i class="bi bi-eye me-2"></i> View Project</a></li>
                                    <li><hr class="dropdown-divider opacity-50"></li>
                                    <li><a class="dropdown-item py-2 text-danger" href="#"><i class="bi bi-trash me-2"></i> Delete</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="collapse" id="${collapseId}">
                        <div class="bqc-body">
                            
                            <div class="bqc-meta-row">
                                <div class="d-flex gap-2">
                                    <div class="bqc-meta-pill"><span class="bqc-meta-label">Owner</span><span class="bqc-meta-val">${task.owner || '-'}</span></div>
                                    <div class="bqc-meta-pill"><span class="bqc-meta-label">Publish</span><span class="bqc-meta-val">${pubDate}</span></div>
                                    ${task.link ? `<a href="${task.link}" target="_blank" class="bqc-btn-link"><i class="bi bi-link-45deg"></i> Link</a>` : ''}
                                </div>
                                <div class="bqc-last-update"><i class="bi bi-clock-history"></i> Last Update : ${updateDate}</div>
                            </div>

                            <div class="bqc-layout-row">
                                <div class="bqc-col-30">
                                    <div class="bqc-sec-title"><i class="bi bi-brush"></i> Designer</div>
                                    <div class="bqc-panel ${!hasDes ? 'is-empty' : ''}">
                                        ${hasDes ? `
                                            <div class="bqc-item"><span>Status</span><span class="bqc-val"><span class="bqc-dot ${isDone?'bqc-dot-done':'bqc-dot-prog'}"></span>${task.designer_status}</span></div><div class="bqc-divider"></div>
                                            <div class="bqc-item"><span>Type</span><span class="bqc-val">${task.designer_type}</span></div>
                                            <div class="bqc-item"><span>Work</span><span class="bqc-val text-truncate" style="max-width:120px;">${task.designer}</span></div>
                                            <div class="bqc-item"><span>Assign</span><span class="bqc-val">${task.designer_assign}</span></div>
                                            <div class="bqc-item mt-2"><span>Deadline</span><span class="bqc-val fw-bold">${dDL}</span></div>
                                        ` : '<div class="bqc-empty-text">No Designer</div>'}
                                    </div>
                                </div>
                                
                                <div class="bqc-col-30">
                                    <div class="bqc-sec-title"><i class="bi bi-rocket"></i> Creative</div>
                                    <div class="bqc-panel ${!hasCre ? 'is-empty' : ''}">
                                        ${hasCre ? `
                                            <div class="bqc-item"><span>Status</span><span class="bqc-val"><span class="bqc-dot bqc-dot-prog"></span>${task.creative_status}</span></div><div class="bqc-divider"></div>
                                            <div class="bqc-item"><span>Type</span><span class="bqc-val">${task.creative_type}</span></div>
                                            <div class="bqc-item"><span>Work</span><span class="bqc-val text-truncate" style="max-width:120px;">${task.creative}</span></div>
                                            <div class="bqc-item"><span>Assign</span><span class="bqc-val">${task.creative_assign}</span></div>
                                            <div class="bqc-item mt-2"><span>Deadline</span><span class="bqc-val fw-bold">${cDL}</span></div>
                                        ` : '<div class="bqc-empty-text">No Creative</div>'}
                                    </div>
                                </div>
                                
                                <div class="bqc-col-40">
                                    <div class="bqc-sec-title"><i class="bi bi-justify-left"></i> Detail</div>
                                    <div class="bqc-panel bqc-detail-box">${task.detail || '...'}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isFetching && hasMore) fetchQuests();
    }, { rootMargin: '600px' });
    observer.observe(document.getElementById('load-more-trigger'));

    initPage();
</script>

</body>
</html>
