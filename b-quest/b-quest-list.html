<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Mission Control</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/style.css">
    
    <style>
        :root {
            --primary-dark: #212529;
            --accent-color: #0d6efd;
        }
        body {
            font-family: 'Inter', 'Sarabun', sans-serif;
            background-color: #f8f9fa;
        }
        .navbar {
            backdrop-filter: blur(10px);
            background-color: rgba(33, 37, 41, 0.95) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .quest-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            border-radius: 12px;
        }
        .quest-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
        .sticky-search {
            position: sticky;
            top: 70px; /* ต่อจาก Navbar */
            z-index: 900;
            background: rgba(248, 249, 250, 0.9);
            padding: 15px 0;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-rocket-takeoff-fill me-2 text-primary"></i>
                <span class="fw-bold">B-QUEST</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="d-flex align-items-center">
                    <div class="text-light me-3 d-none d-sm-block text-end">
                        <div class="small opacity-75">Welcome,</div>
                        <div class="fw-bold small" id="user-display-name">Guest</div>
                    </div>
                    <button onclick="handleLogout()" class="btn btn-outline-danger btn-sm px-3 rounded-pill">
                        <i class="bi bi-box-arrow-right me-1"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="sticky-search">
        <div class="container">
            <div class="row g-2 align-items-center">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="main-search" class="form-control border-start-0 ps-0" placeholder="หว่านแหหาข้อมูลทุกอย่างที่นี่...">
                    </div>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100 shadow-sm" onclick="openNewQuestModal()">
                        <i class="bi bi-plus-lg"></i> New Quest
                    </button>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-light w-100 shadow-sm border" onclick="refreshData()">
                        <i class="bi bi-arrow-clockwise"></i> Refresh
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0 text-secondary">Mission Board</h5>
            <small class="text-muted" id="total-count">พบทั้งหมด 0 รายการ</small>
        </div>

        <div id="quest-container" class="row g-3">
            </div>

        <div id="load-more-trigger" class="py-5 text-center">
            <div id="loader" class="d-none">
                <div class="spinner-border text-primary border-3" role="status"></div>
                <p class="mt-2 text-muted small">กำลังดึงภารกิจเพิ่ม...</p>
            </div>
            <div id="no-more-data" class="d-none text-muted">
                <hr>
                <small>— สิ้นสุดรายการภารกิจ —</small>
            </div>
        </div>
    </div>

    <div id="modal-holder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // ใส่ข้อมูล Supabase ของพี่ที่นี่
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_KEY = 'your-anon-key';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
    <script src="assets/main.js"></script>

</body>
</html>
