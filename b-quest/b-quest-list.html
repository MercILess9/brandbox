<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Mission Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="config.js"></script> <script src="system.js"></script> <style>
        :root { --bquest-dark: #2d4739; --bquest-accent: #bdc432; }
        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: #f0f2f0; }
        .premium-nav { background: var(--bquest-dark); padding: 1rem 0; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .brand-text { color: var(--bquest-accent) !important; font-weight: 700; letter-spacing: 2px; }
        .quest-card { background: white; border: none; border-radius: 12px; transition: 0.3s; border-left: 5px solid #ddd; }
        .quest-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .status-done { border-left-color: #28a745; }
        .status-progress { border-left-color: var(--bquest-accent); }
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); z-index: 10000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-border text-success" role="status"></div>
    <div class="mt-3">กำลังเชื่อมต่อฐานข้อมูล...</div>
</div>

<nav class="premium-nav sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand brand-text" href="#">B-QUEST</a>
        <button class="btn btn-sm btn-outline-light rounded-pill" onclick="BQuest.logout()">
            Logout <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>
</nav>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-10">
            <input type="text" id="searchInput" class="form-control p-3 shadow-sm border-0" placeholder="ค้นหาภารกิจ...">
        </div>
        <div class="col-md-2">
            <button class="btn btn-dark w-100 h-100 shadow-sm" onclick="fetchQuests()">
                <i class="bi bi-arrow-repeat"></i> รีเฟรช
            </button>
        </div>
    </div>

    <div id="taskContainer" class="row g-3">
        </div>

    <div id="load-more-trigger" style="height: 20px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentPage = 0;
    const itemsPerPage = 10;
    let isFetching = false;
    let hasMore = true;

    // ฟังก์ชันดึงข้อมูล (ใช้ supabaseClient จาก system.js)
    async function fetchQuests() {
        if (isFetching || !hasMore) return;
        
        isFetching = true;
        document.getElementById('loadingOverlay').style.display = 'flex';

        const from = currentPage * itemsPerPage;
        const to = from + itemsPerPage - 1;

        try {
            // เรียกใช้ supabaseClient ที่ประกาศไว้ใน system.js
            const { data, error } = await supabaseClient
                .from('b-quest-list')
                .select('*')
                .range(from, to)
                .order('id', { ascending: false });

            if (error) throw error;

            if (data.length < itemsPerPage) hasMore = false;
            
            renderCards(data);
            currentPage++;

        } catch (err) {
            console.error("Fetch Error:", err.message);
            BQuest.notify("ไม่สามารถดึงข้อมูลได้: " + err.message, "error");
        } finally {
            isFetching = false;
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    function renderCards(data) {
        const container = document.getElementById("taskContainer");
        
        data.forEach(task => {
            const card = document.createElement("div");
            card.className = "col-md-6 col-lg-4 mb-3";
            card.innerHTML = `
                <div class="card quest-card shadow-sm h-100 p-3">
                    <div class="card-body">
                        <small class="text-muted text-uppercase fw-bold" style="font-size: 0.7rem;">${task.account_name || 'General'}</small>
                        <h5 class="fw-bold mt-1">${task.task_name || 'Unnamed Task'}</h5>
                        <hr class="opacity-10">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-light text-dark border">${task.status || task.designer_status || 'Pending'}</span>
                            <small class="text-secondary"><i class="bi bi-person"></i> ${task.owner || '-'}</small>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // ระบบ Infinite Scroll
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
            fetchQuests();
        }
    }, { rootMargin: '200px' });

    observer.observe(document.getElementById('load-more-trigger'));

    // เริ่มทำงาน
    window.onload = () => {
        // เช็คว่ามีตัวแปรจาก system.js มาหรือยัง
        if (typeof supabaseClient !== 'undefined') {
            fetchQuests();
        } else {
            console.error("Error: supabaseClient หายไป! เช็คการเรียกไฟล์ system.js");
        }
    };
</script>

</body>
</html>
