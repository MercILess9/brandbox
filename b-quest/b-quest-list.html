<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Master Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../config.js"></script>
    <script src="../system.js"></script>

    <style>
        :root { 
            --status-progress: #4e73df; 
            --status-done: #94a3b8;     
            --bg-body: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #94a3b8;
            --slate-main: #626e7f;
            --bquest-accent: #bdc432;
            --card-radius: 20px;
        }

        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: var(--bg-body); color: var(--text-dark); padding-bottom: 50px; margin: 0; }

        /* --- 1. TOP NAV & MENU --- */
        .top-nav { background: #fff; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .logo-zone { display: flex; align-items: center; gap: 15px; }
        .logo-zone img { height: 28px; }
        .system-name { font-weight: 700; font-size: 1.1rem; color: var(--text-dark); border-left: 2px solid #e2e8f0; padding-left: 15px; }
        .user-zone { display: flex; align-items: center; gap: 20px; }
        .user-info { display: flex; align-items: center; gap: 10px; color: var(--slate-main); font-weight: 500; font-size: 0.9rem; }
        
        .menu-bar { background: var(--bquest-accent); padding: 0 30px; display: flex; gap: 30px; }
        .menu-item { padding: 12px 15px; font-size: 0.85rem; font-weight: 700; color: rgba(0,0,0,0.6); text-decoration: none; text-transform: uppercase; }
        .menu-item.active { color: #000; background: rgba(255,255,255,0.2); }

        /* --- 2. BQ FILTER ZONE (FULLY PROTECTED CSS) --- */
        .bq-f-container { background: #ffffff; padding: 15px 30px; border-bottom: 1px solid #f1f5f9; position: relative; z-index: 1000; }
        .bq-f-main-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        
        .bq-f-search-wrap { position: relative; width: 350px; }
        .bq-f-search-wrap i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
        .bq-f-search-input { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 15px 8px 40px; font-size: 0.85rem; width: 100%; outline: none; height: 38px; }

        .bq-f-date-group { display: flex; align-items: center; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 0 10px; height: 38px; }
        .bq-f-date-item { border: none; background: transparent; font-size: 0.82rem; width: 90px; text-align: center; color: var(--slate-main); outline: none; }
        
        .bq-f-btn-icon { border: 1px solid #e2e8f0; background: #fff; border-radius: 10px; height: 38px; width: 38px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; }
        .bq-f-btn-more { border: 1px solid #e2e8f0; background: #fff; border-radius: 10px; padding: 0 15px; height: 38px; font-size: 0.8rem; font-weight: 600; color: var(--slate-main); cursor: pointer; }

        .bq-f-pill-box { display: flex; align-items: center; gap: 8px; padding-left: 15px; border-left: 1px solid #eee; }
        .bq-f-pill-label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-right: 5px; }
        .bq-f-pill-btn { border: 1px solid #e2e8f0; background: #fff; border-radius: 20px; padding: 4px 14px; font-size: 0.75rem; font-weight: 600; color: var(--slate-main); cursor: pointer; }
        .bq-f-pill-btn.active-blue { background: #eff6ff; color: #3b82f6; border-color: #dbeafe; }
        .bq-f-pill-btn.active-progress { background: #eef2ff; color: var(--status-progress); border-color: #e0e7ff; }
        .bq-f-pill-btn.active-done { background: #f1f5f9; color: var(--status-done); border-color: #e2e8f0; }

        /* Advanced Area */
        .bq-f-advanced { display: none; padding-top: 15px; border-top: 1px dashed #eee; margin-top: 15px; }
        .bq-f-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .bq-f-select-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; overflow: hidden; height: 38px; }
        .bq-f-select-tag { background: #f1f5f9; color: var(--text-muted); font-size: 0.6rem; font-weight: 800; padding: 0 10px; height: 100%; display: flex; align-items: center; text-transform: uppercase; border-right: 1px solid #e2e8f0; min-width: 60px; }
        .bq-f-select-ui { border: none; font-size: 0.8rem; font-weight: 600; color: var(--slate-main); padding: 0 8px; width: 100%; outline: none; background: transparent; }

        /* --- 3. THE SACRED CARD CSS (DO NOT TOUCH) --- */
        .quest-card { background: white !important; border: 1px solid #f1f5f9 !important; border-radius: var(--card-radius) !important; margin-bottom: 15px !important; border-left: 6px solid #e2e8f0 !important; transition: 0.3s ease !important; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02) !important; }
        .status-done { border-left-color: var(--status-done) !important; }
        .status-progress { border-left-color: var(--status-progress) !important; }
        
        .card-clickable { cursor: pointer; padding: 20px 28px !important; display: flex !important; align-items: center !important; width: 100% !important; }
        .project-info { width: 50% !important; flex-shrink: 0 !important; min-width: 0 !important; padding-right: 20px !important; text-align: left !important; }
        .deadline-grid { display: grid !important; grid-template-columns: 140px 140px !important; gap: 20px !important; flex-grow: 1 !important; justify-content: center !important; align-items: center !important; }
        
        .header-dl-item { text-align: center !important; display: flex !important; flex-direction: column !important; justify-content: center !important; }
        .header-dl-label { font-size: 0.55rem !important; font-weight: 800 !important; color: var(--text-muted) !important; text-transform: uppercase !important; margin-bottom: 4px !important; }
        .dl-tag { border-radius: 8px !important; padding: 4px 12px !important; font-size: 0.78rem !important; font-weight: 700 !important; display: inline-block !important; border: 1px solid transparent !important; }
        .tag-des { background: #eff6ff !important; color: #3b82f6 !important; border-color: #dbeafe !important; }
        .tag-cre { background: #f8fafc !important; color: #64748b !important; border-color: #f1f5f9 !important; }
        
        .action-btns { width: 120px !important; display: flex !important; justify-content: flex-end !important; align-items: center !important; gap: 8px !important; opacity: 0; transition: 0.2s !important; }
        .quest-card:hover .action-btns { opacity: 1 !important; }
        .btn-more { color: var(--text-muted) !important; padding: 8px !important; border: none !important; background: transparent !important; cursor: pointer !important; display: inline-flex !important; }

        /* Detail Area */
        .expanded-content { background: #fdfdfd !important; border-top: 1px solid #f1f5f9 !important; padding: 25px !important; }
        .col-30 { width: 30% !important; }
        .col-40 { width: 40% !important; }
        .meta-pill { background: white !important; border: 1px solid #e2e8f0 !important; padding: 6px 14px !important; border-radius: 12px !important; display: flex !important; align-items: center !important; gap: 8px !important; }
        .role-card, .detail-box { background: white !important; border-radius: var(--card-radius) !important; padding: 20px !important; border: 1px solid #eef2f6 !important; height: 200px !important; }
        .role-item { display: flex !important; justify-content: space-between !important; margin-bottom: 7px !important; font-size: 0.82rem !important; color: var(--slate-main) !important; }
        .divider-status { border-bottom: 1px dashed #f1f5f9 !important; margin: 6px 0 10px 0 !important; }
    </style>
</head>
<body>

<header class="sticky-top shadow-sm">
    <div class="top-nav">
        <div class="logo-zone">
            <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" alt="Logo">
            <span class="system-name">B-QUEST</span>
        </div>
        <div class="user-zone">
            <div class="user-info"><i class="bi bi-person-circle"></i> <span id="user-display">...</span></div>
            <i class="bi bi-box-arrow-right nav-icon ms-2" onclick="BQuest.logout()" title="Logout"></i>
        </div>
    </div>

    <nav class="menu-bar">
        <a href="#" class="menu-item active">List</a>
        <a href="#" class="menu-item">New Mission</a>
    </nav>

    <div class="bq-f-container">
        <div class="bq-f-main-row">
            <div class="bq-f-search-wrap">
                <i class="bi bi-search"></i>
                <input type="text" class="bq-f-search-input" id="globalSearch" placeholder="Search Project, Account, Opp...">
            </div>
            
            <div class="bq-f-date-group">
                <input type="text" class="bq-f-date-item" id="startDate" placeholder="DD-MM-YYYY">
                <span style="color:#cbd5e1">-</span>
                <input type="text" class="bq-f-date-item" id="endDate" placeholder="DD-MM-YYYY">
            </div>
            
            <button class="bq-f-btn-icon" id="btnToday" title="Today"><i class="bi bi-calendar-check"></i></button>
            <button class="bq-f-btn-icon" onclick="window.location.reload()"><i class="bi bi-arrow-clockwise"></i></button>
            <button class="bq-f-btn-more" id="toggleFilters"><i class="bi bi-sliders"></i> Advanced</button>

            <div class="bq-f-pill-box">
                <span class="bq-f-pill-label">Role</span>
                <button class="bq-f-pill-btn active-blue">Designer</button>
                <button class="bq-f-pill-btn active-blue">Creative</button>
            </div>

            <div class="bq-f-pill-box">
                <span class="bq-f-pill-label">Status</span>
                <button class="bq-f-pill-btn active-progress">Progress</button>
                <button class="bq-f-pill-btn active-done">Done</button>
            </div>
        </div>

        <div class="bq-f-advanced" id="advancedFilterZone">
            <div class="bq-f-grid">
                <div class="bq-f-select-box"><span class="bq-f-select-tag">Work</span><select class="bq-f-select-ui" id="filterWork"><option>All Work</option></select></div>
                <div class="bq-f-select-box"><span class="bq-f-select-tag">Type</span><select class="bq-f-select-ui" id="filterType"><option>All Type</option></select></div>
                <div class="bq-f-select-box"><span class="bq-f-select-tag">Assign</span><select class="bq-f-select-ui" id="filterAssign"><option>All Staff</option></select></div>
                <div class="bq-f-select-box"><span class="bq-f-select-tag">Owner</span><select class="bq-f-select-ui" id="filterOwner"><option>All Owner</option></select></div>
            </div>
        </div>
    </div>
</header>

<main class="container-fluid px-5 mt-4">
    <div id="taskContainer" class="row"></div>
    <div id="load-more-trigger" style="height: 100px;"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Toggle Logic
    document.getElementById('toggleFilters').addEventListener('click', function() {
        const zone = document.getElementById('advancedFilterZone');
        const isHidden = window.getComputedStyle(zone).display === 'none';
        zone.style.display = isHidden ? 'block' : 'none';
    });

    // Fetch & Render Card Logic (คงเดิมเป๊ะ)
    let currentPage = 0;
    const itemsPerPage = 12;
    let isFetching = false;
    let hasMore = true;

    function formatDate(dateStr) {
        if (!dateStr || dateStr === '-') return '-';
        try {
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return dateStr;
            const d = String(date.getDate()).padStart(2, '0');
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const y = date.getFullYear();
            return `${d}-${m}-${y}`;
        } catch (e) { return dateStr; }
    }

    async function initPage() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            const profile = await BQuest.getProfile(session.user.id);
            if (profile) document.getElementById("user-display").innerText = profile.nick_name || profile.full_name;
        }
        fetchQuests(true);
    }

    async function fetchQuests(isFirstLoad = false) {
        if (isFetching || (!hasMore && !isFirstLoad)) return;
        isFetching = true;
        const from = currentPage * itemsPerPage;
        const to = from + itemsPerPage - 1;
        try {
            const { data, error } = await supabaseClient.from('b-quest-list').select('*').range(from, to).order('id', { ascending: false });
            if (error) throw error;
            if (data.length < itemsPerPage) hasMore = false;
            renderCards(data);
            currentPage++;
        } catch (e) { console.error(e); }
        finally { isFetching = false; }
    }

    function renderCards(data) {
        const container = document.getElementById("taskContainer");
        data.forEach(task => {
            const isDone = (task.designer_status === 'Done');
            const hasDes = !!task.designer && task.designer !== '-';
            const hasCre = !!task.creative && task.creative !== '-';
            const collapseId = `collapse-${task.id}`;
            const dDL = formatDate(task.designer_deadline);
            const cDL = formatDate(task.creative_deadline);
            const pubDate = formatDate(task.publish_date);
            const updateDate = formatDate(task.last_update);

            const card = document.createElement("div");
            card.className = "col-12";
            card.innerHTML = `
                <div class="quest-card ${isDone ? 'status-done' : 'status-progress'}">
                    <div class="card-clickable">
                        <div class="project-info text-truncate" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <h6 class="fw-bold mb-1" style="color: var(--text-dark);">${task.task_name || 'Untitled Project'}</h6>
                            <span class="text-muted small">${task.account_name} | ${task.opportunity_name}</span>
                        </div>
                        <div class="deadline-grid" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <div class="header-dl-item">${task.designer_deadline ? `<div class="header-dl-label">Designer</div><div class="dl-tag tag-des shadow-sm">${dDL}</div>` : ''}</div>
                            <div class="header-dl-item">${task.creative_deadline ? `<div class="header-dl-label">Creative</div><div class="dl-tag tag-cre shadow-sm">${cDL}</div>` : ''}</div>
                        </div>
                        <div class="action-btns">
                            <button class="btn btn-outline-dark btn-sm rounded-pill px-3" style="font-size: 0.7rem;">Edit</button>
                            <div class="dropdown">
                                <button class="btn-more" type="button" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                                <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg" style="border-radius: 12px; font-size: 0.85rem;">
                                    <li><a class="dropdown-item py-2" href="#"><i class="bi bi-eye me-2"></i> View Project</a></li>
                                    <li><hr class="dropdown-divider opacity-50"></li>
                                    <li><a class="dropdown-item py-2 text-danger" href="#"><i class="bi bi-trash me-2"></i> Delete</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="collapse" id="${collapseId}">
                        <div class="expanded-content">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="d-flex gap-2">
                                    <div class="meta-pill shadow-sm"><span class="meta-label">Owner</span><span class="meta-value">${task.owner || '-'}</span></div>
                                    <div class="meta-pill shadow-sm"><span class="meta-label">Publish Date</span><span class="meta-value">${pubDate}</span></div>
                                    ${task.link ? `<a href="${task.link}" target="_blank" class="btn-link-premium shadow-sm"><i class="bi bi-link-45deg"></i> Link</a>` : ''}
                                </div>
                                <div class="last-update-text">Last Update : ${updateDate}</div>
                            </div>
                            <div class="d-flex gap-4">
                                <div class="col-30">
                                    <div class="section-title">Designer</div>
                                    <div class="role-card shadow-sm ${!hasDes ? 'is-empty' : ''}">
                                        ${hasDes ? `<div class="role-item"><span>Status</span><span class="fw-bold"><span class="dot ${isDone?'dot-done':'dot-progress'}"></span>${task.designer_status}</span></div><div class="divider-status"></div><div class="role-item"><span>Type</span><span class="fw-bold">${task.designer_type}</span></div><div class="role-item"><span>Work</span><span class="fw-bold">${task.designer}</span></div><div class="role-item"><span>Assign</span><span class="fw-bold">${task.designer_assign}</span></div><div class="role-item mt-2"><span>Deadline</span><span class="fw-bold">${dDL}</span></div>` : '<div class="no-assign-text">No Designer</div>'}
                                    </div>
                                </div>
                                <div class="col-30">
                                    <div class="section-title">Creative</div>
                                    <div class="role-card shadow-sm ${!hasCre ? 'is-empty' : ''}">
                                        ${hasCre ? `<div class="role-item"><span>Status</span><span class="fw-bold"><span class="dot dot-progress"></span>${task.creative_status}</span></div><div class="divider-status"></div><div class="role-item"><span>Type</span><span class="fw-bold">${task.creative_type}</span></div><div class="role-item"><span>Work</span><span class="fw-bold">${task.creative}</span></div><div class="role-item"><span>Assign</span><span class="fw-bold">${task.creative_assign}</span></div><div class="role-item mt-2"><span>Deadline</span><span class="fw-bold">${cDL}</span></div>` : '<div class="no-assign-text">No Creative</div>'}
                                    </div>
                                </div>
                                <div class="col-40">
                                    <div class="section-title">Detail</div>
                                    <div class="detail-box">${task.detail || '...'}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isFetching && hasMore) fetchQuests();
    }, { rootMargin: '600px' });
    observer.observe(document.getElementById('load-more-trigger'));

    initPage();
</script>
</body>
</html>
