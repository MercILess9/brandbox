<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Mission Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../config.js"></script>
    <script src="../system.js"></script>

    <style>
        :root { --bquest-accent: #bdc432; --bquest-dark: #2d4739; --bg-gray: #f4f6f9; }
        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: var(--bg-gray); color: #333; }

        /* Header */
        .main-header { background: #fff; padding: 10px 0; border-bottom: 1px solid #dee2e6; }
        .sub-header-line { background: var(--bquest-accent); height: 40px; display: flex; align-items: center; padding: 0 20px; font-weight: 700; font-size: 0.9rem; }

        /* Card Layout */
        .quest-card {
            background: white; border: none; border-radius: 12px; margin-bottom: 12px;
            transition: 0.2s; border-left: 6px solid #e9ecef; box-shadow: 0 2px 5px rgba(0,0,0,0.04);
            cursor: pointer;
        }
        .quest-card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .status-done { border-left-color: #28a745; }
        .status-progress { border-left-color: var(--bquest-accent); }

        /* ล็อคความกว้างกล่อง Deadline ให้เท่ากันทุกอัน */
        .deadline-container {
            min-width: 160px; /* ล็อคความกว้าง */
            text-align: center;
        }
        .deadline-label { 
            font-size: 0.65rem; 
            font-weight: 800; 
            color: #888; 
            text-transform: uppercase; 
            margin-bottom: 4px;
            white-space: nowrap;
        }
        .deadline-value { 
            background: #f1f3f5; 
            border-radius: 8px; 
            padding: 6px 0; 
            font-weight: 700; 
            font-size: 0.9rem; 
            border: 1px solid #e9ecef;
            display: block;
            width: 100%;
        }

        /* Modal Details */
        .modal-details-box { background: #f8f9fa; border-radius: 10px; padding: 15px; border: 1px solid #eee; height: 100%; }
        .info-header { font-weight: 700; font-size: 0.8rem; color: #555; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .table-custom { font-size: 0.85rem; width: 100%; }
        .table-custom td { padding: 5px 0; border-bottom: 1px solid #f1f1f1; }
        .table-custom tr:last-child td { border-bottom: none; }
        .table-custom td:last-child { text-align: right; font-weight: 700; color: #000; }
    </style>
</head>
<body>

<nav class="main-header sticky-top">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" style="height: 32px;">
        <div class="d-flex align-items-center gap-3">
            <span id="user-display" class="fw-bold small d-none d-md-inline">...</span>
            <button class="btn btn-dark btn-sm rounded-pill px-4" onclick="BQuest.logout()">Logout</button>
        </div>
    </div>
</nav>
<div class="sub-header-line shadow-sm">B-QUEST MISSION BOARD</div>

<div class="container mt-4 pb-5">
    <div id="taskContainer"></div>
    
    <div id="load-more-trigger" class="text-center py-4">
        <div id="loader" class="spinner-border spinner-border-sm text-secondary d-none"></div>
    </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px; overflow: hidden;">
            <div class="modal-header bg-white border-0 px-4 pt-4 align-items-start">
                <div class="flex-grow-1">
                    <h3 class="fw-bold mb-1" id="m-task-name">Loading...</h3>
                    <p class="text-muted mb-0" id="m-account-info">- | -</p>
                </div>
                <div class="d-flex gap-3">
                    <div class="deadline-container">
                        <div class="badge bg-primary-subtle text-primary mb-1">DESIGNER DEADLINE</div>
                        <div class="deadline-value" id="m-ds-dl">-</div>
                    </div>
                    <div class="deadline-container">
                        <div class="badge bg-secondary-subtle text-secondary mb-1">CREATIVE DEADLINE</div>
                        <div class="deadline-value" id="m-ct-dl">-</div>
                    </div>
                    <button class="btn btn-primary rounded-3 px-3 shadow-sm"><i class="bi bi-pencil-square"></i></button>
                </div>
            </div>
            <div class="modal-body p-4">
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="modal-details-box">
                            <div class="info-header"><i class="bi bi-link-45deg"></i> Link</div>
                            <div class="text-primary small text-break" id="m-link">-</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="modal-details-box">
                            <div class="info-header"><i class="bi bi-calendar3"></i> Publish Date</div>
                            <div class="fw-bold" id="m-publish">-</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="modal-details-box">
                            <div class="info-header"><i class="bi bi-person"></i> Owner</div>
                            <div class="fw-bold" id="m-owner">-</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="modal-details-box">
                            <div class="info-header"><i class="bi bi-card-text"></i> Detail</div>
                            <div class="small text-secondary" id="m-detail">-</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="modal-details-box">
                            <div class="info-header">🎨 Designer Role</div>
                            <table class="table-custom">
                                <tr><td>Type:</td><td id="m-ds-type">-</td></tr>
                                <tr><td>Assign:</td><td id="m-ds-name">-</td></tr>
                                <tr><td>Status:</td><td id="m-ds-status">-</td></tr>
                                <tr><td>Work:</td><td id="m-ds-work">-</td></tr>
                            </table>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="modal-details-box">
                            <div class="info-header">🪄 Creative Role</div>
                            <table class="table-custom">
                                <tr><td>Type:</td><td id="m-ct-type">-</td></tr>
                                <tr><td>Assign:</td><td id="m-ct-name">-</td></tr>
                                <tr><td>Status:</td><td id="m-ct-status">-</td></tr>
                                <tr><td>Work:</td><td id="m-ct-work">-</td></tr>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let allQuests = [];
    let currentPage = 0;
    const itemsPerPage = 12; // โหลดทีละ 12 เพื่อให้เต็มหน้าจอพอดี
    let isFetching = false;
    let hasMore = true;

    async function initPage() {
        // ดึงชื่อ User
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            const profile = await BQuest.getProfile(session.user.id);
            if (profile) BQuest.setText("user-display", profile.nick_name || profile.full_name);
        }
        fetchQuests(true);
    }

    async function fetchQuests(isFirstLoad = false) {
        if (isFetching || (!hasMore && !isFirstLoad)) return;
        
        isFetching = true;
        document.getElementById('loader').classList.remove('d-none');

        const from = currentPage * itemsPerPage;
        const to = from + itemsPerPage - 1;

        try {
            const { data, error } = await supabaseClient
                .from('b-quest-list')
                .select('*')
                .range(from, to)
                .order('id', { ascending: false });

            if (error) throw error;
            if (data.length < itemsPerPage) hasMore = false;

            allQuests = [...allQuests, ...data];
            renderCards(data);
            currentPage++;

        } catch (e) {
            console.error("Fetch Error:", e.message);
        } finally {
            isFetching = false;
            document.getElementById('loader').classList.add('d-none');
        }
    }

    function renderCards(data) {
        const container = document.getElementById("taskContainer");
        data.forEach(task => {
            const card = document.createElement("div");
            // เช็คสถานะเพื่อเปลี่ยนสีขอบ
            const isDone = (task.designer_status === 'Done');
            card.className = `quest-card p-4 shadow-sm ${isDone ? 'status-done' : 'status-progress'}`;
            
            // คลิกเปิด Modal (ส่ง ID ไป)
            card.onclick = () => openDetail(task.id);

            card.innerHTML = `
                <div class="row align-items-center">
                    <div class="col-md-5">
                        <h5 class="fw-bold mb-1">${task.task_name || 'Untitled Mission'}</h5>
                        <small class="text-muted">${task.account_name || '-'} | ${task.opportunity_name || '-'}</small>
                    </div>
                    <div class="col-md-5 d-flex justify-content-center gap-4">
                        <div class="deadline-container">
                            <div class="deadline-label">Designer Deadline</div>
                            <div class="deadline-value text-primary">${task.designer_deadline || '-'}</div>
                        </div>
                        <div class="deadline-container">
                            <div class="deadline-label">Creative Deadline</div>
                            <div class="deadline-value text-secondary">${task.creative_deadline || '-'}</div>
                        </div>
                    </div>
                    <div class="col-md-2 text-end">
                        <div class="dropdown" onclick="event.stopPropagation()">
                            <button class="btn btn-outline-primary btn-sm rounded-pill px-3 me-2" onclick="alert('Edit Mode Soon')">Edit</button>
                            <button class="btn btn-light btn-sm rounded-circle" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li><a class="dropdown-item" href="#"><i class="bi bi-share me-2"></i> Share</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item text-danger" href="#"><i class="bi bi-trash me-2"></i> Delete</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function openDetail(id) {
        // หาข้อมูลจากการ์ดที่โหลดมาแล้ว (รองรับทั้ง id แบบ String และ Number)
        const q = allQuests.find(i => i.id == id);
        if(!q) return;

        // ใส่ข้อมูลลงใน Modal
        document.getElementById('m-task-name').innerText = q.task_name || 'No Name';
        document.getElementById('m-account-info').innerText = `${q.account_name || '-'} | ${q.opportunity_name || '-'}`;
        document.getElementById('m-ds-dl').innerText = q.designer_deadline || '-';
        document.getElementById('m-ct-dl').innerText = q.creative_deadline || '-';
        document.getElementById('m-link').innerText = q.link || 'None';
        document.getElementById('m-publish').innerText = q.publish_date || '-';
        document.getElementById('m-owner').innerText = q.owner || '-';
        document.getElementById('m-detail').innerText = q.detail || '-';

        document.getElementById('m-ds-type').innerText = q.designer_type || '-';
        document.getElementById('m-ds-name').innerText = q.designer || '-';
        document.getElementById('m-ds-status').innerText = q.designer_status || '-';
        document.getElementById('m-ds-work').innerText = q.designer_work || '-';

        document.getElementById('m-ct-type').innerText = q.creative_type || '-';
        document.getElementById('m-ct-name').innerText = q.creative || '-';
        document.getElementById('m-ct-status').innerText = q.creative_status || '-';
        document.getElementById('m-ct-work').innerText = q.creative_work || '-';

        // สั่งเปิด Modal
        const modalEl = new bootstrap.Modal(document.getElementById('detailModal'));
        modalEl.show();
    }

    // --- Infinite Scroll Logic ---
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isFetching && hasMore) {
            console.log("ไถถึงก้นแล้ว... กำลังโหลดต่อ");
            fetchQuests();
        }
    }, { 
        rootMargin: '400px', // ดึงข้อมูลล่วงหน้าก่อนถึงก้นจอ 400px
        threshold: 0.1 
    });

    observer.observe(document.getElementById('load-more-trigger'));

    // เรียกครั้งแรก
    initPage();
</script>

</body>
</html>
