<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Mission Board</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../config.js"></script>
    <script src="../system.js"></script>

    <style>
        :root { --bquest-accent: #bdc432; --bg-gray: #f4f6f9; }
        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: var(--bg-gray); padding-bottom: 50px; }

        .main-header { background: #fff; padding: 10px 0; border-bottom: 1px solid #dee2e6; }
        .sub-header-line { background: var(--bquest-accent); height: 40px; display: flex; align-items: center; padding: 0 20px; font-weight: 700; }

        /* Card Layout */
        .quest-card {
            background: white; border: none; border-radius: 12px; margin-bottom: 12px;
            transition: 0.2s; border-left: 6px solid #e9ecef; overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .quest-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .status-done { border-left-color: #28a745; }
        .status-progress { border-left-color: var(--bquest-accent); }

        /* Card Header */
        .card-clickable { cursor: pointer; padding: 20px; }
        
        .deadline-container { min-width: 170px; text-align: center; }
        .deadline-label { font-size: 0.65rem; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .deadline-value { background: #f1f3f5; border-radius: 8px; padding: 5px 0; font-weight: 700; font-size: 0.85rem; border: 1px solid #e9ecef; width: 100%; display: block; }

        /* Card Body Expanded */
        .expanded-content { background: #fafafa; border-top: 1px dashed #eee; padding: 25px; }
        .info-box { background: white; border-radius: 10px; padding: 15px; border: 1px solid #eee; height: 100%; }
        .info-header { font-weight: 700; font-size: 0.75rem; color: #666; margin-bottom: 8px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .table-custom { font-size: 0.85rem; width: 100%; }
        .table-custom td { padding: 4px 0; border-bottom: 1px solid #f8f8f8; }
        .table-custom td:last-child { text-align: right; font-weight: 700; color: #333; }

        /* Dropdown Custom */
        .dropdown-menu { border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 12px; padding: 8px; }
        .dropdown-item { border-radius: 8px; font-size: 0.9rem; padding: 8px 12px; transition: 0.2s; }
        .dropdown-item:hover { background-color: var(--bquest-accent); color: #000; }
        .dropdown-item.text-danger:hover { background-color: #ff4d4d; color: #fff; }
    </style>
</head>
<body>

<nav class="main-header sticky-top">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" style="height: 32px;">
        <button class="btn btn-dark btn-sm rounded-pill px-4" onclick="BQuest.logout()">Logout</button>
    </div>
</nav>
<div class="sub-header-line shadow-sm">B-QUEST MISSION BOARD</div>

<div class="container mt-4">
    <div id="taskContainer" class="row"></div>
    <div id="load-more-trigger" style="height: 100px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentPage = 0;
    const itemsPerPage = 12;
    let isFetching = false;
    let hasMore = true;

    async function fetchQuests(isFirstLoad = false) {
        if (isFetching || (!hasMore && !isFirstLoad)) return;
        isFetching = true;

        const from = currentPage * itemsPerPage;
        const to = from + itemsPerPage - 1;

        try {
            const { data, error } = await supabaseClient
                .from('b-quest-list').select('*').range(from, to).order('id', { ascending: false });

            if (error) throw error;
            if (data.length < itemsPerPage) hasMore = false;

            renderCards(data);
            currentPage++;
        } catch (e) { console.error(e); }
        finally { isFetching = false; }
    }

    function renderCards(data) {
    const container = document.getElementById("taskContainer");
    data.forEach(task => {
        const isDone = (task.designer_status === 'Done');
        const collapseId = `collapse-${task.id}`;
        
        const cardWrapper = document.createElement("div");
        cardWrapper.className = "col-12";
        
        cardWrapper.innerHTML = `
            <div class="quest-card shadow-sm ${isDone ? 'status-done' : 'status-progress'}">
                <div class="p-4">
                    <div class="row align-items-center">
                        <div class="col-md-5 card-clickable" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <h5 class="fw-bold mb-1 text-dark">${task.task_name || 'Untitled'}</h5>
                            <small class="text-muted">${task.account_name || '-'} | ${task.opportunity_name || '-'}</small>
                        </div>
                        <div class="col-md-5 d-flex justify-content-center gap-3 card-clickable" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <div class="deadline-container">
                                <div class="deadline-label">Designer Deadline</div>
                                <div class="deadline-value text-primary">${task.designer_deadline || '-'}</div>
                            </div>
                            <div class="deadline-container">
                                <div class="deadline-label">Creative Deadline</div>
                                <div class="deadline-value text-secondary">${task.creative_deadline || '-'}</div>
                            </div>
                        </div>
                        <div class="col-md-2 text-end">
                            <div class="d-flex align-items-center justify-content-end gap-2">
                                <button class="btn btn-outline-primary btn-sm rounded-pill px-3 fw-600">Edit</button>
                                <div class="dropdown">
                                    <button class="btn btn-light btn-sm rounded-circle shadow-sm" type="button" data-bs-toggle="dropdown">
                                        <i class="bi bi-three-dots-vertical"></i>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end shadow">
                                        <li><a class="dropdown-item" href="#"><i class="bi bi-eye me-2"></i> View Profile</a></li>
                                        <li><a class="dropdown-item" href="#"><i class="bi bi-share me-2"></i> Share Link</a></li>
                                        <li><hr class="dropdown-divider"></li>
                                        <li><a class="dropdown-item text-danger" href="#"><i class="bi bi-trash me-2"></i> Delete</a></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="collapse" id="${collapseId}">
                    <div class="expanded-content">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="info-box">
                                    <div class="info-header"><i class="bi bi-link-45deg"></i> Link Reference</div>
                                    <div class="small text-break">
                                        ${task.link ? `<a href="${task.link}" target="_blank" class="text-primary text-decoration-none fw-600">${task.link}</a>` : 'ไม่มีลิงก์อ้างอิง'}
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="info-box text-center">
                                    <div class="info-header justify-content-center"><i class="bi bi-calendar3"></i> Publish Date</div>
                                    <div class="fw-bold">${task.publish_date || '-'}</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="info-box text-center">
                                    <div class="info-header justify-content-center"><i class="bi bi-person"></i> Owner</div>
                                    <div class="fw-bold">${task.owner || '-'}</div>
                                </div>
                            </div>

                            <div class="col-md-12">
                                <div class="info-box">
                                    <div class="info-header"><i class="bi bi-card-text"></i> Detailed Brief</div>
                                    <div class="small text-secondary" style="white-space: pre-wrap; line-height: 1.6;">${task.detail || 'ไม่มีข้อมูลรายละเอียด'}</div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="info-box shadow-sm border-0" style="background-color: #fff;">
                                    <div class="info-header" style="color: var(--bquest-dark); border-bottom: 2px solid var(--bquest-accent); padding-bottom: 5px;">
                                        🎨 Designer Team
                                    </div>
                                    <table class="table-custom mt-2">
                                        <tr><td>Type:</td><td>${task.designer_type || '-'}</td></tr>
                                        <tr><td>Assign:</td><td>${task.designer || '-'}</td></tr>
                                        <tr><td>Status:</td><td><span class="badge ${isDone?'bg-success':'bg-warning text-dark'}">${task.designer_status || 'Pending'}</span></td></tr>
                                        <tr><td>Work:</td><td>${task.designer_work || '-'}</td></tr>
                                        <tr><td>Deadline:</td><td>${task.designer_deadline || '-'}</td></tr>
                                    </table>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="info-box shadow-sm border-0" style="background-color: #fff;">
                                    <div class="info-header" style="color: var(--bquest-dark); border-bottom: 2px solid #555; padding-bottom: 5px;">
                                        🚀 Creative Team
                                    </div>
                                    <table class="table-custom mt-2">
                                        <tr><td>Type:</td><td>${task.creative_type || '-'}</td></tr>
                                        <tr><td>Assign:</td><td>${task.creative || '-'}</td></tr>
                                        <tr><td>Status:</td><td><span class="badge bg-info text-white">${task.creative_status || 'On Progress'}</span></td></tr>
                                        <tr><td>Work:</td><td>${task.creative_work || '-'}</td></tr>
                                        <tr><td>Deadline:</td><td>${task.creative_deadline || '-'}</td></tr>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        container.appendChild(cardWrapper);
    });
}

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isFetching && hasMore) fetchQuests();
    }, { rootMargin: '600px' });
    observer.observe(document.getElementById('load-more-trigger'));

    fetchQuests(true);
</script>

</body>
</html>
