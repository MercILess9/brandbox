<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>B-QUEST | Master Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="../config.js"></script>
    <script src="../system.js"></script>
    <script src="b-quest.js"></script>

    <style>
        :root { 
            --c-progress: #4e73df; --c-done: #94a3b8; --c-bg: #f8fafc;
            --c-text-main: #1e293b; --c-text-muted: #94a3b8; --c-slate: #626e7f;
            --c-accent: #bdc432; --c-accent-light: #f4f7a1;
            --c-role: #50adba; --radius-card: 20px;
        }

        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: var(--c-bg); color: var(--c-text-main); padding-bottom: 50px; margin: 0; }

        /* --- Filter Zone --- */
        .flt-wrapper { background: #fff; padding: 15px 30px; border-bottom: 1px solid #e2e8f0; }
        .flt-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .flt-search { position: relative; width: 380px; }
        .flt-search i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--c-text-muted); }
        .flt-search-input { background: var(--c-bg); border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 15px 8px 40px; font-size: 0.85rem; width: 100%; outline: none; }
        .flt-date-group { display: flex; align-items: center; background: var(--c-bg); border: 1px solid #e2e8f0; border-radius: 12px; padding: 0 12px; height: 38px; }
        .flt-date-input { border: none; background: transparent; font-size: 0.82rem; color: var(--c-slate); outline: none; }
        .flt-btn-adv { border: 1px solid #e2e8f0; background: #fff; border-radius: 10px; padding: 0 15px; height: 38px; font-size: 0.8rem; font-weight: 600; color: var(--c-slate); cursor: pointer; margin-left: auto; display: flex; align-items: center; gap: 6px; }
        .flt-pill { border: 1px solid #e2e8f0; background: #fff; border-radius: 20px; padding: 4px 14px; font-size: 0.75rem; font-weight: 600; color: var(--c-slate); cursor: pointer; transition: 0.2s; }
        .flt-pill.active-role { background: var(--c-role); color: #fff; border-color: var(--c-role); }
        .flt-pill.active-prog { background: var(--c-progress); color: #fff; border-color: var(--c-progress); }
        .flt-pill.active-done { background: var(--c-slate); color: #fff; border-color: var(--c-slate); }

        /* Advance Filter Row */
        .flt-advanced-zone { display: none; padding-top: 15px; border-top: 1px dashed #eee; margin-top: 15px; }
        .flt-advanced-row { display: flex; align-items: center; gap: 12px; flex-wrap: nowrap; overflow-x: auto; }
        .flt-select-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; overflow: hidden; height: 38px; flex: 1; min-width: 150px; }
        .flt-select-tag { background: #f1f5f9; color: var(--c-text-muted); font-size: 0.6rem; font-weight: 800; padding: 0 10px; height: 100%; display: flex; align-items: center; text-transform: uppercase; border-right: 1px solid #e2e8f0; min-width: 65px; }
        .flt-select-input { border: none; font-size: 0.8rem; font-weight: 600; color: var(--c-slate); padding: 0 8px; width: 100%; outline: none; background: transparent; text-align-last: center; }
        .flt-select-box.active-filter { background: var(--c-accent-light); border-color: var(--c-accent); }
        .flt-select-box.active-filter .flt-select-tag { background: var(--c-accent); color: #000; border-right-color: var(--c-accent); }

        /* --- Card Styles (Locked 100%) --- */
        .bqc-card { background: white; border: 1px solid #f1f5f9; border-radius: var(--radius-card); margin-bottom: 15px; border-left: 6px solid #e2e8f0; transition: 0.3s ease; }
        .bqc-status-done { border-left-color: var(--c-done); }
        .bqc-status-prog { border-left-color: var(--c-progress); }
        .bqc-header { cursor: pointer; padding: 20px 28px; display: flex; align-items: center; }
        .bqc-info-zone { width: 50%; flex-shrink: 0; padding-right: 20px; }
        .bqc-title { font-weight: 700; font-size: 1rem; color: var(--c-text-main); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bqc-subtitle { font-size: 0.8rem; color: var(--c-text-muted); }
        .bqc-dl-grid { display: grid; grid-template-columns: 140px 140px; gap: 20px; flex-grow: 1; justify-content: center; }
        .bqc-dl-col { text-align: center; display: flex; flex-direction: column; justify-content: center; height: 42px; }
        .bqc-dl-label { font-size: 0.55rem; font-weight: 800; color: var(--c-text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .bqc-tag { border-radius: 8px; padding: 4px 12px; font-size: 0.78rem; font-weight: 700; display: inline-block; border: 1px solid transparent; }
        .bqc-tag-des { background: #eff6ff; color: #3b82f6; border-color: #dbeafe; }
        .bqc-tag-cre { background: #f8fafc; color: #64748b; border-color: #f1f5f9; }
        .bqc-actions { width: 140px; display: flex; justify-content: flex-end; align-items: center; gap: 10px; opacity: 0; transition: 0.2s; }
        .bqc-card:hover .bqc-actions { opacity: 1; }
        .bqc-btn-more { color: var(--c-text-muted); padding: 5px; border: none; background: transparent; cursor: pointer; font-size: 1.2rem; }

        .bqc-body { background: #fdfdfd; border-top: 1px solid #f1f5f9; padding: 25px; }
        .bqc-meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .bqc-meta-pill { background: white; border: 1px solid #e2e8f0; padding: 6px 14px; border-radius: 12px; display: flex; align-items: center; gap: 8px; }
        .bqc-meta-label { font-size: 0.7rem; font-weight: 700; color: var(--c-text-muted); text-transform: uppercase; }
        .bqc-meta-val { font-size: 0.85rem; font-weight: 600; color: var(--c-slate); }
        .bqc-last-update { font-size: 0.72rem; color: #626e7f; font-weight: 500; display: flex; align-items: center; gap: 5px; }
        .bqc-btn-link { background: var(--c-text-main); border: none; border-radius: 10px; padding: 6px 15px; font-size: 0.75rem; font-weight: 600; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 6px; }
        
        .bqc-layout-row { display: flex; gap: 20px; }
        .bqc-col-30 { width: 30%; }
        .bqc-col-40 { width: 40%; }
        .bqc-panel { background: white; border-radius: var(--radius-card); padding: 20px; border: 1px solid #eef2f6; height: 160px; }
        .bqc-item { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 0.82rem; color: var(--c-slate); }
        .bqc-val { font-weight: 600; }
        .bqc-dot { height: 7px; width: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .bqc-dot-prog { background-color: var(--c-progress); }
        .bqc-dot-done { background-color: var(--c-done); }

        .fab-add {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 65px;
    height: 65px;
    background: #1e293b;
    color: #bdc432;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: none;
    z-index: 1000;
}

.fab-add:hover {
    transform: scale(1.1) rotate(90deg);
    background: #0f172a;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}

.fab-add i {
    transition: 0.3s;
}
    </style>
</head>
<body>

<section id="filter-zone" class="flt-wrapper">
    <div class="flt-row">
        <div class="flt-search">
            <i class="bi bi-search"></i>
            <input type="text" class="flt-search-input" id="globalSearch" placeholder="Search...">
        </div>
        <div class="flt-date-group">
            <input type="date" class="flt-date-input" id="startDate">
            <span style="color:#cbd5e1; padding: 0 5px;">-</span>
            <input type="date" class="flt-date-input" id="endDate">
        </div>
        <div class="flt-pill-group">
            <button id="pill-des" class="flt-pill active-role" onclick="togglePill(this, 'designer')">Designer</button>
            <button id="pill-cre" class="flt-pill active-role" onclick="togglePill(this, 'creative')">Creative</button>
        </div>
        <div style="width: 1px; height: 24px; background: #e2e8f0; margin: 0 5px;"></div>
        <div class="flt-pill-group">
            <button id="pill-prog" class="flt-pill active-prog" onclick="togglePill(this, 'progress')">Progress</button>
            <button id="pill-done" class="flt-pill active-done" onclick="togglePill(this, 'done')">Done</button>
        </div>
        <button class="flt-btn-adv" id="toggleFilters"><i class="bi bi-sliders"></i> Advance</button>
    </div>

    <div class="flt-advanced-zone" id="advancedFilterZone">
        <div class="flt-advanced-row">
            <div class="flt-select-box"><span class="flt-select-tag">Work</span><select class="flt-select-input" id="filterWork"></select></div>
            <div class="flt-select-box"><span class="flt-select-tag">Type</span><select class="flt-select-input" id="filterType"></select></div>
            <div class="flt-select-box"><span class="flt-select-tag">Staff</span><select class="flt-select-input" id="filterAssign"></select></div>
            <div class="flt-select-box"><span class="flt-select-tag">Owner</span><select class="flt-select-input" id="filterOwner"></select></div>
            <button class="flt-btn-reset-adv" onclick="resetAdvanced()">Reset</button>
        </div>
    </div>

    <button class="fab-add" onclick="openTaskModal()" title="New Mission">
        <i class="bi bi-plus-lg"></i>
    </button>
</section>

<main id="card-container" class="container-fluid px-5 mt-4">
    <div id="taskContainer" class="row"></div>
    <div id="load-more-trigger" style="height: 100px;"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const SEARCH_COLUMNS = ['task_name', 'account_name', 'opportunity_name', 'designer', 'creative', 'designer_assign', 'creative_assign', 'owner', 'detail', 'designer_type', 'creative_type'];
    let MASTER_WORK_DATA = []; 
    let currentPage = 0;
    let isFetching = false;
    let hasMore = true;

    // --- UI Helpers ---
    document.getElementById('toggleFilters').addEventListener('click', () => {
        const zone = document.getElementById('advancedFilterZone');
        zone.style.display = (window.getComputedStyle(zone).display === 'none') ? 'flex' : 'none';
    });

    function togglePill(btn, type) {
        if (type === 'designer' || type === 'creative') btn.classList.toggle('active-role');
        if (type === 'progress') btn.classList.toggle('active-prog');
        if (type === 'done') btn.classList.toggle('active-done');
        if (type === 'designer' || type === 'creative') renderWorkDropdown();
        applyFilters();
    }

    function setupDefaultOptions(el, label) {
        el.innerHTML = `<option value="">All ${label}</option><option disabled>----------</option>`;
    }

    function updateHighlight(id) {
        const el = document.getElementById(id);
        const box = el.closest('.flt-select-box');
        if (box) el.value !== "" ? box.classList.add('active-filter') : box.classList.remove('active-filter');
    }

    function resetAdvanced() {
        ['filterWork', 'filterType', 'filterAssign', 'filterOwner'].forEach(id => {
            document.getElementById(id).value = "";
            updateHighlight(id);
        });
        applyFilters();
    }

    // --- Data Logic ---
    async function loadMasterData() {
        try {
            const { data } = await supabaseClient.from('b_quest_work').select('*').order('work');
            MASTER_WORK_DATA = data || [];
            renderWorkDropdown();

            const tSel = document.getElementById('filterType');
            setupDefaultOptions(tSel, "Type");
            B_QUEST_CONFIG.listTypes.forEach(t => tSel.add(new Option(t, t)));

            const { data: list } = await supabaseClient.from('b-quest-list').select('designer_assign, creative_assign, owner');
            if (list) {
                const fill = (id, lbl, keys) => {
                    const set = new Set();
                    list.forEach(i => keys.forEach(k => { if(i[k] && i[k] !== '-') set.add(i[k]); }));
                    const el = document.getElementById(id);
                    setupDefaultOptions(el, lbl);
                    [...set].sort().forEach(v => el.add(new Option(v, v)));
                };
                fill('filterAssign', "Staff", ['designer_assign', 'creative_assign']);
                fill('filterOwner', "Owner", ['owner']);
            }
        } catch (e) { console.error(e); }
    }

    function renderWorkDropdown() {
        const select = document.getElementById('filterWork');
        const pDes = document.getElementById('pill-des').classList.contains('active-role');
        const pCre = document.getElementById('pill-cre').classList.contains('active-role');
        const cur = select.value;
        setupDefaultOptions(select, "Work");
        const dW = MASTER_WORK_DATA.filter(i => i.role === 'Designer');
        const cW = MASTER_WORK_DATA.filter(i => i.role === 'Creative');
        if (pDes && pCre) {
            const g1 = document.createElement('optgroup'); g1.label = "--- Designer ---";
            dW.forEach(w => g1.appendChild(new Option(w.work, w.work)));
            select.appendChild(g1);
            const g2 = document.createElement('optgroup'); g2.label = "--- Creative ---";
            cW.forEach(w => g2.appendChild(new Option(w.work, w.work)));
            select.appendChild(g2);
        } else if (pDes) dW.forEach(w => select.appendChild(new Option(w.work, w.work)));
        else if (pCre) cW.forEach(w => select.appendChild(new Option(w.work, w.work)));
        select.value = cur;
        updateHighlight('filterWork');
    }

    function applyFilters() {
        currentPage = 0; hasMore = true;
        document.getElementById("taskContainer").innerHTML = ''; 
        fetchQuests();
    }

    async function fetchQuests(isFirst = false) {
        if (isFetching || (!hasMore && !isFirst)) return;
        isFetching = true;
        const limit = B_QUEST_CONFIG.itemsPerPage;
        const from = currentPage * limit;
        const to = from + limit - 1;
        
        let query = supabaseClient.from('b-quest-list').select('*');
        const search = document.getElementById('globalSearch').value.trim();
        if (search) query = query.or(SEARCH_COLUMNS.map(col => `${col}.ilike.%${search}%`).join(','));

        const pDes = document.getElementById('pill-des').classList.contains('active-role');
        const pCre = document.getElementById('pill-cre').classList.contains('active-role');
        const sd = document.getElementById('startDate').value;
        const ed = document.getElementById('endDate').value;

        if (!pDes && !pCre) query = query.eq('id', -1);
        else {
            const build = (r) => `and(${r}.neq.-,${r}.not.is.null${sd?`,${r}_deadline.gte.${sd}`:''}${ed?`,${r}_deadline.lte.${ed}`:''})`;
            let parts = [];
            if (pDes) parts.push(build('designer'));
            if (pCre) parts.push(build('creative'));
            query = query.or(parts.join(','));
        }

        const pProg = document.getElementById('pill-prog').classList.contains('active-prog');
        const pDone = document.getElementById('pill-done').classList.contains('active-done');
        if (pProg && !pDone) query = query.or('designer_status.neq.Done, creative_status.neq.Done');
        else if (!pProg && pDone) query = query.eq('designer_status', 'Done').eq('creative_status', 'Done');
        else if (!pProg && !pDone) query = query.eq('id', -1);

        const val = (id) => document.getElementById(id).value;
        if (val('filterWork')) query = query.or(`designer.eq."${val('filterWork')}",creative.eq."${val('filterWork')}"`);
        if (val('filterType')) query = query.or(`designer_type.eq."${val('filterType')}",creative_type.eq."${val('filterType')}"`);
        if (val('filterAssign')) query = query.or(`designer_assign.eq."${val('filterAssign')}",creative_assign.eq."${val('filterAssign')}"`);
        if (val('filterOwner')) query = query.eq('owner', val('filterOwner'));

        query = query.range(from, to).order('id', { ascending: false });

        try {
            const { data } = await query;
            if (data.length < limit) hasMore = false;
            renderCards(data);
            currentPage++;
        } catch (e) { console.error(e); } finally { isFetching = false; }
    }

    function renderCards(data) {
        const container = document.getElementById("taskContainer");
        data.forEach(task => {
            const hasD = !!task.designer && task.designer !== '-';
            const hasC = !!task.creative && task.creative !== '-';
            let isDone = (hasD || hasC) && (!hasD || task.designer_status === 'Done') && (!hasC || task.creative_status === 'Done');
            
            const collapseId = `collapse-${task.id}`;
            const card = document.createElement("div");
            card.className = "col-12";
            card.innerHTML = `
                <div class="bqc-card ${isDone ? 'bqc-status-done' : 'bqc-status-prog'}">
                    <div class="bqc-header">
                        <div class="bqc-info-zone" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <div class="bqc-title">${task.task_name || 'Untitled'}</div>
                            <div class="bqc-subtitle">${task.account_name} | ${task.opportunity_name}</div>
                        </div>
                        <div class="bqc-dl-grid" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <div class="bqc-dl-col">${hasD ? `<span class="bqc-dl-label">Designer</span><span class="bqc-tag bqc-tag-des">${formatDate(task.designer_deadline)}</span>` : ''}</div>
                            <div class="bqc-dl-col">${hasC ? `<span class="bqc-dl-label">Creative</span><span class="bqc-tag bqc-tag-cre">${formatDate(task.creative_deadline)}</span>` : ''}</div>
                        </div>
                        <div class="bqc-actions">
                            <button class="btn btn-outline-dark btn-sm rounded-pill px-3" style="font-size: 0.7rem;">Edit</button>
                            <div class="dropdown">
                                <button class="bqc-btn-more" type="button" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                                <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg" style="border-radius: 12px; font-size: 0.85rem;">
                                    <li><a class="dropdown-item py-2" href="#"><i class="bi bi-eye me-2"></i> View Project</a></li>
                                    <li><hr class="dropdown-divider opacity-50"></li>
                                    <li><a class="dropdown-item py-2 text-danger" href="javascript:void(0)" onclick="BQuestService.deleteQuest('${task.id}')"><i class="bi bi-trash me-2"></i> Delete</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="collapse" id="${collapseId}">
                        <div class="bqc-body">
                            <div class="bqc-meta-row">
                                <div class="d-flex gap-2">
                                    <div class="bqc-meta-pill"><span class="bqc-meta-label">Owner</span><span class="bqc-meta-val">${task.owner || '-'}</span></div>
                                    <div class="bqc-meta-pill"><span class="bqc-meta-label">Publish</span><span class="bqc-meta-val">${formatDate(task.publish_date)}</span></div>
                                    ${task.link ? `<a href="${task.link}" target="_blank" class="bqc-btn-link"><i class="bi bi-link-45deg"></i> Link</a>` : ''}
                                </div>
                                <div class="bqc-last-update"><i class="bi bi-clock-history"></i> Last Update : ${formatDate(task.last_update)}</div>
                            </div>
                            <div class="bqc-layout-row">
                                <div class="bqc-col-30">
                                    <div class="bqc-panel ${!hasD ? 'is-empty' : ''}">
                                        ${hasD ? `<div class="bqc-item"><span>Status</span><span class="bqc-val"><span class="bqc-dot ${task.designer_status==='Done'?'bqc-dot-done':'bqc-dot-prog'}"></span>${task.designer_status}</span></div>
                                        <div class="bqc-item"><span>Type</span><span class="bqc-val">${task.designer_type}</span></div>
                                        <div class="bqc-item"><span>Work</span><span class="bqc-val">${task.designer}</span></div>
                                        <div class="bqc-item"><span>Assign</span><span class="bqc-val">${task.designer_assign}</span></div>
                                        <div class="bqc-item mt-2"><span>Deadline</span><span class="bqc-val fw-bold">${formatDate(task.designer_deadline)}</span></div>` : 'No Designer'}
                                    </div>
                                </div>
                                <div class="bqc-col-30">
                                    <div class="bqc-panel ${!hasC ? 'is-empty' : ''}">
                                        ${hasC ? `<div class="bqc-item"><span>Status</span><span class="bqc-val"><span class="bqc-dot ${task.creative_status==='Done'?'bqc-dot-done':'bqc-dot-prog'}"></span>${task.creative_status}</span></div>
                                        <div class="bqc-item"><span>Type</span><span class="bqc-val">${task.creative_type}</span></div>
                                        <div class="bqc-item"><span>Work</span><span class="bqc-val">${task.creative}</span></div>
                                        <div class="bqc-item"><span>Assign</span><span class="bqc-val">${task.creative_assign}</span></div>
                                        <div class="bqc-item mt-2"><span>Deadline</span><span class="bqc-val fw-bold">${formatDate(task.creative_deadline)}</span></div>` : 'No Creative'}
                                    </div>
                                </div>
                                <div class="bqc-col-40">
                                    <div class="bqc-panel bqc-detail-box" style="overflow-y:auto; font-size:0.9rem;">${task.detail || '...'}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            container.appendChild(card);
        });
    }

    // --- Init ---
    async function initPage() {
        await System.initLayout(B_QUEST_CONFIG);
        await System.loadModal('modal-task-form.html');
        await loadMasterData();
        fetchQuests(true);
    }

    ['startDate', 'endDate', 'filterWork', 'filterType', 'filterAssign', 'filterOwner'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => {
            if(id.startsWith('filter')) updateHighlight(id);
            applyFilters();
        });
    });
    document.getElementById('globalSearch').addEventListener('keypress', e => { if(e.key==='Enter') applyFilters() });

    const obs = new IntersectionObserver(e => { if(e[0].isIntersecting && !isFetching && hasMore) fetchQuests() }, { rootMargin: '600px' });
    obs.observe(document.getElementById('load-more-trigger'));

    initPage();

    // ฟังก์ชันกลางสำหรับเปิด Modal (เรียกใช้ได้ทั้งหน้า)
async function openTaskModal(taskId = null) {
    const modalEl = document.getElementById('taskModal');
    const modalMain = document.getElementById('modalMainContent');
    const form = document.getElementById('taskForm');
    
    form.reset(); // ล้างค่าเดิมออกก่อนเสมอ
    
    if (taskId) {
        // --- MODE: EDIT ---
        modalMain.classList.add('is-edit');
        document.getElementById('taskModalLabel').innerHTML = 'Edit <span>Mission</span>';
        document.getElementById('modalSubtitle').innerText = 'Update task details and assignments';
        
        // ดึงข้อมูลมาเติม (เดี๋ยวเราไปเขียนต่อใน BQuestService)
        const taskData = await BQuestService.getQuestById(taskId);
        if (taskData) fillFormData(taskData); 
        
    } else {
        // --- MODE: NEW ---
        modalMain.classList.remove('is-edit');
        document.getElementById('taskModalLabel').innerHTML = 'New <span>Mission</span>';
        document.getElementById('modalSubtitle').innerText = 'Create a new task for the production team';
        document.getElementById('task-id').value = '';
    }
    
    const myModal = new bootstrap.Modal(modalEl);
    myModal.show();
}
</script>
</body>
</html>
