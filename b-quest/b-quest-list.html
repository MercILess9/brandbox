<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Mission Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../config.js"></script>
    <script src="../system.js"></script>

    <style>
        :root { --bquest-accent: #bdc432; --bquest-dark: #2d4739; --bg-gray: #f4f6f9; }
        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: var(--bg-gray); padding-bottom: 50px; }

        /* --- Header Section --- */
        .main-header { background: #fff; padding: 10px 0; border-bottom: 1px solid #dee2e6; }
        .sub-header-line { background: var(--bquest-accent); height: 40px; display: flex; align-items: center; padding: 0 20px; font-weight: 700; color: #000; }

        /* --- Card Styles --- */
        .quest-card {
            background: white; border: none; border-radius: 12px; margin-bottom: 12px;
            transition: 0.2s; border-left: 6px solid #e9ecef; overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .quest-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .status-done { border-left-color: #28a745; }
        .status-progress { border-left-color: var(--bquest-accent); }

        .card-clickable { cursor: pointer; }
        
        /* Deadline UI */
        .deadline-container { min-width: 140px; text-align: center; }
        .deadline-label { font-size: 0.65rem; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .deadline-value { background: #f1f3f5; border-radius: 6px; padding: 4px 0; font-weight: 700; font-size: 0.8rem; border: 1px solid #e9ecef; width: 100%; display: block; }

        /* --- Expanded Detail UI --- */
        .expanded-content { background: #fcfcfc; border-top: 1px solid #eee; padding: 15px; }
        
        /* Meta Box (Row 1) */
        .info-box-compact { 
            background: white; border-radius: 8px; padding: 10px 15px; border: 1px solid #eee; 
            display: flex; align-items: center; justify-content: space-between; height: 45px;
        }

        /* Role & Detail Box (Row 2) */
        .role-box { background: #fff; border-radius: 10px; padding: 12px; border: 1px solid #eee; height: 180px; }
        .detail-scroll-box {
            background: #fff; border-radius: 10px; padding: 12px; border: 1px solid #eee; 
            height: 180px; overflow-y: auto; font-size: 0.85rem; line-height: 1.5; color: #555;
        }
        .detail-scroll-box::-webkit-scrollbar { width: 4px; }
        .detail-scroll-box::-webkit-scrollbar-thumb { background: var(--bquest-accent); border-radius: 10px; }

        .info-header { 
            font-weight: 700; font-size: 0.75rem; color: #666; margin-bottom: 8px; 
            text-transform: uppercase; display: flex; align-items: center; gap: 6px; 
        }

        .table-custom { font-size: 0.8rem; width: 100%; }
        .table-custom td { padding: 3px 0; border-bottom: 1px solid #f8f8f8; }
        .table-custom td:last-child { text-align: right; font-weight: 700; color: #333; }

        /* Icon Button */
        .btn-link-icon {
            width: 30px; height: 30px; display: inline-flex; align-items: center; 
            justify-content: center; border-radius: 6px; background: #f0f7f4; 
            color: var(--bquest-dark); transition: 0.2s; border: none;
        }
        .btn-link-icon:hover { background: var(--bquest-accent); color: #000; }
    </style>
</head>
<body>

<nav class="main-header sticky-top">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" alt="Brandbox" style="height: 35px;">
        <div class="d-flex align-items-center gap-3">
            <span id="user-display" class="fw-bold small text-muted">...</span>
            <button class="btn btn-dark btn-sm rounded-pill px-4" onclick="BQuest.logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="sub-header-line shadow-sm">B-QUEST MISSION BOARD</div>

<div class="container mt-4">
    <div id="taskContainer" class="row"></div>
    
    <div id="load-more-trigger" style="height: 100px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentPage = 0;
    const itemsPerPage = 12;
    let isFetching = false;
    let hasMore = true;

    async function initPage() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            const profile = await BQuest.getProfile(session.user.id);
            if (profile) BQuest.setText("user-display", profile.nick_name || profile.full_name);
        }
        fetchQuests(true);
    }

    async function fetchQuests(isFirstLoad = false) {
        if (isFetching || (!hasMore && !isFirstLoad)) return;
        isFetching = true;

        const from = currentPage * itemsPerPage;
        const to = from + itemsPerPage - 1;

        try {
            const { data, error } = await supabaseClient
                .from('b-quest-list').select('*').range(from, to).order('id', { ascending: false });

            if (error) throw error;
            if (data.length < itemsPerPage) hasMore = false;

            renderCards(data);
            currentPage++;
        } catch (e) { console.error("Fetch Error:", e); }
        finally { isFetching = false; }
    }

    function renderCards(data) {
        const container = document.getElementById("taskContainer");
        data.forEach(task => {
            const isDone = (task.designer_status === 'Done');
            const collapseId = `collapse-${task.id}`;
            
            const cardWrapper = document.createElement("div");
            cardWrapper.className = "col-12";
            cardWrapper.innerHTML = `
                <div class="quest-card shadow-sm ${isDone ? 'status-done' : 'status-progress'}">
                    <div class="p-3">
                        <div class="row align-items-center">
                            <div class="col-md-5 card-clickable" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                                <h6 class="fw-bold mb-0 text-dark">${task.task_name || 'Untitled'}</h6>
                                <small class="text-muted" style="font-size: 0.75rem;">${task.account_name || '-'} | ${task.opportunity_name || '-'}</small>
                            </div>
                            <div class="col-md-5 d-flex justify-content-center gap-3 card-clickable" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                                <div class="deadline-container">
                                    <div class="deadline-label">Designer Deadline</div>
                                    <div class="deadline-value text-primary">${task.designer_deadline || '-'}</div>
                                </div>
                                <div class="deadline-container">
                                    <div class="deadline-label">Creative Deadline</div>
                                    <div class="deadline-value text-secondary">${task.creative_deadline || '-'}</div>
                                </div>
                            </div>
                            <div class="col-md-2 text-end">
                                <div class="d-flex align-items-center justify-content-end gap-2" onclick="event.stopPropagation()">
                                    <button class="btn btn-outline-primary btn-sm rounded-pill px-3 fw-600" style="font-size: 0.75rem;">Edit</button>
                                    <div class="dropdown">
                                        <button class="btn btn-light btn-sm rounded-circle shadow-sm" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                                        <ul class="dropdown-menu dropdown-menu-end shadow border-0" style="border-radius:12px;">
                                            <li><a class="dropdown-item small" href="#"><i class="bi bi-eye me-2"></i> View Profile</a></li>
                                            <li><a class="dropdown-item small" href="#"><i class="bi bi-share me-2"></i> Share Link</a></li>
                                            <li><hr class="dropdown-divider"></li>
                                            <li><a class="dropdown-item small text-danger" href="#"><i class="bi bi-trash me-2"></i> Delete</a></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="collapse" id="${collapseId}">
                        <div class="expanded-content bg-light">
                            <div class="row g-2 mb-3">
                                <div class="col-md-6">
                                    <div class="info-box-compact">
                                        <span class="small fw-bold text-muted text-uppercase">Publish: <span class="text-dark ms-1">${task.publish_date || '-'}</span></span>
                                        ${task.link ? `<a href="${task.link}" target="_blank" class="btn-link-icon"><i class="bi bi-box-arrow-up-right"></i></a>` : ''}
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="info-box-compact">
                                        <span class="small fw-bold text-muted text-uppercase">Owner: <span class="text-dark ms-1">${task.owner || '-'}</span></span>
                                        <span class="text-muted" style="font-size: 0.65rem;">Update: ${task.updated_at ? new Date(task.updated_at).toLocaleDateString() : '-'}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-2">
                                <div class="col-md-3">
                                    <div class="role-box shadow-sm">
                                        <div class="info-header" style="border-bottom: 2px solid var(--bquest-accent); padding-bottom: 3px;">🎨 Designer</div>
                                        <table class="table-custom mt-2">
                                            <tr><td>Type:</td><td>${task.designer_type || '-'}</td></tr>
                                            <tr><td>Assign:</td><td>${task.designer || '-'}</td></tr>
                                            <tr><td>Status:</td><td>${task.designer_status || '-'}</td></tr>
                                            <tr><td>Work:</td><td>${task.designer_work || '-'}</td></tr>
                                            <tr><td>Deadline:</td><td>${task.designer_deadline || '-'}</td></tr>
                                        </table>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="role-box shadow-sm">
                                        <div class="info-header" style="border-bottom: 2px solid #555; padding-bottom: 3px;">🚀 Creative</div>
                                        <table class="table-custom mt-2">
                                            <tr><td>Type:</td><td>${task.creative_type || '-'}</td></tr>
                                            <tr><td>Assign:</td><td>${task.creative || '-'}</td></tr>
                                            <tr><td>Status:</td><td>${task.creative_status || '-'}</td></tr>
                                            <tr><td>Work:</td><td>${task.creative_work || '-'}</td></tr>
                                            <tr><td>Deadline:</td><td>${task.creative_deadline || '-'}</td></tr>
                                        </table>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="detail-scroll-box shadow-sm">
                                        <div class="info-header mb-2" style="position: sticky; top: 0; background: white; z-index: 1;"><i class="bi bi-card-text"></i> Detailed Brief</div>
                                        <div style="white-space: pre-wrap;">${task.detail || 'ไม่มีรายละเอียดเพิ่มเติม'}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(cardWrapper);
        });
    }

    // Pre-fetching Infinite Scroll
    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isFetching && hasMore) fetchQuests();
    }, { rootMargin: '600px' });
    observer.observe(document.getElementById('load-more-trigger'));

    initPage();
</script>

</body>
</html>
