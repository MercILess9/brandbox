<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Premium Mission Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="config.js"></script>
    <script src="system.js"></script>

    <style>
        :root {
            --bquest-dark: #2d4739;
            --bquest-accent: #bdc432;
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body { 
            font-family: 'Inter', 'Sarabun', sans-serif; 
            background-color: #f0f2f0;
            color: #333;
        }

        /* Navbar & Header */
        .premium-nav {
            background: var(--bquest-dark);
            padding: 1.2rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .brand-text {
            color: var(--bquest-accent) !important;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 1.5rem;
        }

        /* Search & Filter Bar */
        .filter-card {
            background: var(--glass-bg);
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-top: -30px;
            backdrop-filter: blur(10px);
        }

        /* Quest Card Design */
        .quest-card {
            background: white;
            border: none;
            border-radius: 15px;
            margin-bottom: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 6px solid #e0e0e0;
            overflow: hidden;
            cursor: pointer;
        }

        .quest-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .status-done { border-left-color: #28a745; }
        .status-progress { border-left-color: var(--bquest-accent); }
        .status-pending { border-left-color: #ffc107; }

        .card-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            font-weight: 600;
        }

        .deadline-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 8px 12px;
            min-width: 120px;
        }

        /* UI Elements */
        .btn-premium {
            background: var(--bquest-dark);
            color: white;
            border-radius: 10px;
            padding: 10px 20px;
            border: none;
            transition: 0.3s;
        }

        .btn-premium:hover {
            background: #1e3126;
            color: var(--bquest-accent);
        }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-grow text-success" role="status"></div>
    <div class="mt-3 fw-light text-secondary">กำลังดึงภารกิจจากฐานข้อมูล...</div>
</div>

<nav class="premium-nav sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand brand-text" href="#">B-QUEST</a>
        <div class="text-white d-flex align-items-center gap-3">
            <div class="text-end d-none d-md-block">
                <div class="small opacity-75">ผู้ใช้งานปัจจุบัน</div>
                <div id="user-display" class="fw-bold text-white">...</div>
            </div>
            <button class="btn btn-sm btn-outline-light rounded-pill px-3" onclick="BQuest.logout()">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <div class="card filter-card p-4 mb-5">
        <div class="row g-3">
            <div class="col-lg-5">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" id="searchInput" class="form-control border-start-0" placeholder="ค้นหาตามชื่อโปรเจกต์ หรือชื่อลูกค้า...">
                </div>
            </div>
            <div class="col-lg-3">
                <select id="filterStatus" class="form-select">
                    <option value="">ทุกสถานะ (All Status)</option>
                    <option value="Done">สำเร็จแล้ว (Done)</option>
                    <option value="On Progress">กำลังดำเนินการ (Progress)</option>
                    <option value="Pending">รอเริ่ม (Pending)</option>
                </select>
            </div>
            <div class="col-lg-2">
                <input type="date" id="filterDate" class="form-control">
            </div>
            <div class="col-lg-2">
                <button class="btn btn-premium w-100" onclick="refreshQuests()">
                    <i class="bi bi-arrow-repeat"></i> รีเฟรช
                </button>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 p-3 text-center">
                <div class="card-label">ภารกิจทั้งหมด</div>
                <div class="h2 fw-bold mb-0" id="count-all">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 p-3 text-center" style="border-bottom: 4px solid var(--bquest-accent);">
                <div class="card-label text-warning text-uppercase">อยู่ระหว่างดำเนินการ</div>
                <div class="h2 fw-bold mb-0" id="count-progress">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 p-3 text-center" style="border-bottom: 4px solid #28a745;">
                <div class="card-label text-success text-uppercase">ภารกิจที่สำเร็จ</div>
                <div class="h2 fw-bold mb-0" id="count-done">0</div>
            </div>
        </div>
    </div>

    <div id="taskContainer">
        </div>

    <div id="load-more-trigger" style="height: 50px;" class="text-center mt-4">
        <div id="bottom-loader" class="spinner-border text-success d-none" role="status"></div>
    </div>
</div>

<div class="modal fade" id="questModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 rounded-4 shadow-lg">
            <div id="modal-accent-bar" style="height: 8px; border-radius: 4px 4px 0 0;"></div>
            <div class="modal-header border-0 px-4 pt-4">
                <h4 class="fw-bold mb-0" id="m-task-name">Mission Detail</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pb-4" id="modalBody">
                </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let allQuests = []; // Local cache for filtering
    let currentPage = 0;
    const itemsPerPage = 10;
    let isFetching = false;
    let hasMore = true;

    // 1. Initial Page Load
    async function initPage() {
        // ดึงโปรไฟล์ผ่าน BQuest utility ใน system.js
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            const profile = await BQuest.getProfile(session.user.id);
            if (profile) BQuest.setText("user-display", profile.nick_name || profile.full_name || "User");
        }
        
        // เริ่มดึงข้อมูลครั้งแรก
        fetchQuests(true);
    }

    // 2. Fetch from Supabase with Infinite Scroll
    async function fetchQuests(isFirstLoad = false) {
        if (isFetching || (!hasMore && !isFirstLoad)) return;

        isFetching = true;
        if (isFirstLoad) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            currentPage = 0;
            hasMore = true;
            allQuests = [];
            document.getElementById("taskContainer").innerHTML = "";
        } else {
            document.getElementById('bottom-loader').classList.remove('d-none');
        }
        
        const from = currentPage * itemsPerPage;
        const to = from + itemsPerPage - 1;

        try {
            const { data, error } = await supabaseClient
                .from('b-quest-list')
                .select('*')
                .range(from, to)
                .order('id', { ascending: false });

            if (error) throw error;

            if (data.length < itemsPerPage) hasMore = false;
            
            allQuests = [...allQuests, ...data];
            renderCards(data, !isFirstLoad); // append if not first load
            updateStats(allQuests);
            currentPage++;

        } catch (error) {
            console.error('Error:', error.message);
            BQuest.notify('ไม่สามารถดึงข้อมูลได้: ' + error.message, 'error');
        } finally {
            isFetching = false;
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('bottom-loader').classList.add('d-none');
        }
    }

    // 3. Render Cards to UI
    function renderCards(data, append = false) {
        const container = document.getElementById("taskContainer");
        if (!append) container.innerHTML = "";

        data.forEach(task => {
            const isDone = (task.designer_status === 'Done');
            const statusClass = isDone ? 'status-done' : (task.designer_status === 'Pending' ? 'status-pending' : 'status-progress');
            
            const card = document.createElement("div");
            card.className = `quest-card shadow-sm p-4 ${statusClass}`;
            card.onclick = () => showDetail(task.id);
            card.innerHTML = `
                <div class="row align-items-center">
                    <div class="col-lg-6 col-md-12 mb-3 mb-lg-0">
                        <div class="card-label">${task.account_name || 'No Client'}</div>
                        <h5 class="fw-bold mb-1">${task.task_name || 'Untitled Mission'}</h5>
                        <div class="small text-secondary"><i class="bi bi-briefcase me-1"></i> ${task.opportunity_name || '-'}</div>
                    </div>
                    <div class="col-lg-4 col-md-8">
                        <div class="d-flex gap-2">
                            <div class="deadline-box text-center">
                                <div class="card-label">Designer DL</div>
                                <div class="fw-bold small text-dark">${task.designer_deadline || '-'}</div>
                            </div>
                            <div class="deadline-box text-center border-start">
                                <div class="card-label">Creative DL</div>
                                <div class="fw-bold small text-dark">${task.creative_deadline || '-'}</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-2 col-md-4 text-end">
                        <span class="badge ${isDone ? 'bg-success' : 'bg-warning text-dark'} rounded-pill mb-2 px-3">
                            ${task.designer_status || 'Pending'}
                        </span>
                        <br>
                        <div class="btn btn-light btn-sm rounded-circle border shadow-sm">
                            <i class="bi bi-chevron-right text-dark"></i>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 4. Show Detail in Modal
    function showDetail(id) {
        const q = allQuests.find(item => item.id == id);
        if(!q) return;

        const accent = document.getElementById('modal-accent-bar');
        accent.style.background = q.designer_status === 'Done' ? '#28a745' : 'var(--bquest-accent)';
        
        document.getElementById('m-task-name').innerText = q.task_name || "Mission Detail";
        
        document.getElementById('modalBody').innerHTML = `
            <div class="row g-4">
                <div class="col-md-12">
                    <div class="p-3 rounded-3 bg-light border-0">
                        <div class="card-label mb-2">Description / Brief</div>
                        <div style="white-space: pre-line;" class="small">${q.detail || 'ไม่มีข้อมูลรายละเอียด'}</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card-label">Reference Link</div>
                    ${q.link ? `<a href="${q.link}" target="_blank" class="btn btn-sm btn-outline-primary mt-1 rounded-pill">
                        <i class="bi bi-link-45deg"></i> Open Reference
                    </a>` : '<div class="small text-muted mt-1">No Link Provided</div>'}
                </div>
                <div class="col-md-6 text-end">
                    <div class="card-label">Project Owner</div>
                    <div class="fw-bold mt-1">${q.owner || '-'}</div>
                </div>
                <hr class="opacity-10 my-0">
                <div class="col-6">
                    <div class="card-label text-primary">Designer Work</div>
                    <div class="mt-2 h6 mb-1">${q.designer || '-'}</div>
                    <div class="small text-muted">Assign: ${q.designer_assign || '-'}</div>
                </div>
                <div class="col-6 text-end border-start">
                    <div class="card-label text-info">Creative Work</div>
                    <div class="mt-2 h6 mb-1">${q.creative || '-'}</div>
                    <div class="small text-muted">Assign: ${q.creative_assign || '-'}</div>
                </div>
            </div>
        `;
        
        const myModal = new bootstrap.Modal(document.getElementById('questModal'));
        myModal.show();
    }

    // 5. Stats & Refresh
    function updateStats(data) {
        BQuest.setText("count-all", data.length);
        BQuest.setText("count-progress", data.filter(q => q.designer_status !== 'Done').length);
        BQuest.setText("count-done", data.filter(q => q.designer_status === 'Done').length);
    }

    function refreshQuests() {
        fetchQuests(true);
    }

    // 6. Infinite Scroll Observer
    const scrollObserver = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isFetching && hasMore) {
            fetchQuests();
        }
    }, { rootMargin: '200px' });

    scrollObserver.observe(document.getElementById('load-more-trigger'));

    // Start
    initPage();
</script>

</body>
</html>
