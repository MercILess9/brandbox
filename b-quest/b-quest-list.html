<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Mission Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../config.js"></script>
    <script src="../system.js"></script>

    <style>
        :root { --bquest-accent: #bdc432; --bg-body: #f8f9fa; }
        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: var(--bg-body); color: #333; }
        .main-header { background: #fff; padding: 12px 0; border-bottom: 1px solid #eee; }
        .sub-header-line { background: var(--bquest-accent); height: 38px; display: flex; align-items: center; padding: 0 24px; font-weight: 700; font-size: 0.85rem; }

        .quest-card {
            background: white; border: 1px solid #f0f0f0; border-radius: 14px; margin-bottom: 12px;
            transition: all 0.3s ease; overflow: hidden; border-left: 5px solid #e0e0e0;
        }
        .quest-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .status-done { border-left-color: #28a745; }
        .status-progress { border-left-color: var(--bquest-accent); }

        .action-btns { opacity: 0; transition: 0.2s; }
        .quest-card:hover .action-btns { opacity: 1; }
        .card-clickable { cursor: pointer; padding: 18px 24px; }

        .deadline-box { min-width: 140px; text-align: center; }
        .dl-label { font-size: 0.62rem; font-weight: 700; color: #aaa; text-transform: uppercase; margin-bottom: 4px; }
        .dl-value { font-weight: 600; font-size: 0.85rem; color: #444; }

        .expanded-content { background: #fafafa; border-top: 1px solid #f1f1f1; padding: 20px 24px; }
        .meta-strip { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #fff; padding: 10px 18px; border-radius: 10px; border: 1px solid #efefef; margin-bottom: 16px;
        }

        .role-card { background: #fff; border-radius: 12px; padding: 16px; border: 1px solid #eee; min-height: 210px; }
        .detail-box { background: #fff; border-radius: 12px; padding: 16px; border: 1px solid #eee; height: 210px; overflow-y: scroll; }
        .detail-box::-webkit-scrollbar { width: 4px; }
        .detail-box::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 10px; }

        .info-tag { font-size: 0.72rem; font-weight: 700; color: #999; text-transform: uppercase; display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
        .role-item { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.82rem; }
        .role-label { color: #888; width: 60px; }
        .role-value { font-weight: 600; color: #333; text-align: right; flex: 1; }

        .dot { height: 7px; width: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-progress { background-color: var(--bquest-accent); }
        .dot-done { background-color: #28a745; }
        .divider { border-top: 1px dashed #eee; margin: 10px 0; }
    </style>
</head>
<body>

<nav class="main-header sticky-top">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" style="height: 32px;">
        <div class="d-flex align-items-center gap-4">
            <span id="user-display" class="small fw-600 text-secondary">...</span>
            <button class="btn btn-dark btn-sm rounded-pill px-4" onclick="BQuest.logout()">Logout</button>
        </div>
    </div>
</nav>
<div class="sub-header-line shadow-sm">B-QUEST MISSION CONTROL</div>

<div class="container mt-4">
    <div id="taskContainer"></div>
    <div id="load-more-trigger" style="height: 100px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentPage = 0;
    const itemsPerPage = 12;
    let isFetching = false;
    let hasMore = true;
    let allQuests = [];

    async function initPage() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            const profile = await BQuest.getProfile(session.user.id);
            if (profile) BQuest.setText("user-display", profile.nick_name || profile.full_name);
        }
        fetchQuests(true);
    }

    async function fetchQuests(isFirstLoad = false) {
        if (isFetching || (!hasMore && !isFirstLoad)) return;
        isFetching = true;
        const from = currentPage * itemsPerPage;
        const to = from + itemsPerPage - 1;

        try {
            const { data, error } = await supabaseClient
                .from('b-quest-list').select('*').range(from, to).order('id', { ascending: false });
            if (error) throw error;
            if (data.length < itemsPerPage) hasMore = false;
            allQuests = isFirstLoad ? data : [...allQuests, ...data];
            renderCards(data);
            currentPage++;
        } catch (e) { console.error(e); }
        finally { isFetching = false; }
    }

    function renderCards(data) {
        const container = document.getElementById("taskContainer");
        data.forEach(task => {
            const isDone = (task.designer_status === 'Done');
            const collapseId = `collapse-${task.id}`;
            
            const card = document.createElement("div");
            card.className = "col-12";
            card.innerHTML = `
                <div class="quest-card ${isDone ? 'status-done' : 'status-progress'}">
                    <div class="card-clickable d-flex align-items-center">
                        <div class="flex-grow-1" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <h6 class="fw-bold mb-1">${task.task_name || 'Untitled'}</h6>
                            <span class="text-muted small">${task.account_name || '-'} | ${task.opportunity_name || '-'}</span>
                        </div>
                        <div class="d-flex gap-5 px-4" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <div class="deadline-box"><div class="dl-label">Designer DL</div><div class="dl-value">${task.designer_deadline || '-'}</div></div>
                            <div class="deadline-box border-start ps-4"><div class="dl-label">Creative DL</div><div class="dl-value">${task.creative_deadline || '-'}</div></div>
                        </div>
                        <div class="action-btns d-flex align-items-center gap-2">
                            <button class="btn btn-outline-dark btn-sm rounded-pill px-3" style="font-size: 0.72rem;">Edit</button>
                            <div class="dropdown">
                                <button class="btn btn-light btn-sm rounded-circle" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></button>
                                <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg">
                                    <li><a class="dropdown-item small" href="#"><i class="bi bi-share me-2"></i> Share</a></li>
                                    <li><a class="dropdown-item small text-danger" href="#"><i class="bi bi-trash me-2"></i> Delete</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="collapse" id="${collapseId}">
                        <div class="expanded-content">
                            <div class="meta-strip shadow-sm">
                                <div class="d-flex align-items-center gap-4">
                                    <span class="small fw-600 text-muted">PUBLISH: <span class="text-dark">${task.publish_date || '-'}</span></span>
                                    ${task.link ? `<a href="${task.link}" target="_blank" class="text-secondary"><i class="bi bi-box-arrow-up-right"></i></a>` : ''}
                                </div>
                                <div class="d-flex align-items-center gap-3">
                                    <span class="small fw-600 text-muted">OWNER: <span class="text-dark">${task.owner}</span></span>
                                    <span style="font-size: 0.65rem; color: #bbb;">Update: ${task.updated_at ? new Date(task.updated_at).toLocaleDateString() : '-'}</span>
                                </div>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-3">
                                    <div class="role-card shadow-sm">
                                        <div class="info-tag text-success"><i class="bi bi-brush"></i> Designer</div>
                                        <div class="role-item"><span class="role-label">Status</span><span class="role-value"><span class="dot ${isDone?'dot-done':'dot-progress'}"></span>${task.designer_status || '-'}</span></div>
                                        <div class="role-item"><span class="role-label">Type</span><span class="role-value">${task.designer_type || '-'}</span></div>
                                        <div class="role-item"><span class="role-label">Work</span><span class="role-value">${task.designer || '-'}</span></div>
                                        <div class="role-item"><span class="role-label">Assign</span><span class="role-value">${task.designer_assign || '-'}</span></div>
                                        <div class="divider"></div>
                                        <div class="role-item"><span class="role-label">Deadline</span><span class="role-value text-primary fw-bold">${task.designer_deadline || '-'}</span></div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="role-card shadow-sm">
                                        <div class="info-tag text-dark"><i class="bi bi-rocket-takeoff"></i> Creative</div>
                                        <div class="role-item"><span class="role-label">Status</span><span class="role-value"><span class="dot dot-progress"></span>${task.creative_status || '-'}</span></div>
                                        <div class="role-item"><span class="role-label">Type</span><span class="role-value">${task.creative_type || '-'}</span></div>
                                        <div class="role-item"><span class="role-label">Work</span><span class="role-value">${task.creative || '-'}</span></div>
                                        <div class="role-item"><span class="role-label">Assign</span><span class="role-value">${task.creative || '-'}</span></div>
                                        <div class="divider"></div>
                                        <div class="role-item"><span class="role-label">Deadline</span><span class="role-value text-secondary fw-bold">${task.creative_deadline || '-'}</span></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="detail-box shadow-sm">
                                        <div class="info-tag sticky-top bg-white pb-1"><i class="bi bi-text-left"></i> Detail</div>
                                        <div class="small text-secondary" style="white-space: pre-wrap; line-height: 1.6;">${task.detail}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isFetching && hasMore) fetchQuests();
    }, { rootMargin: '600px' });
    observer.observe(document.getElementById('load-more-trigger'));

    initPage();
</script>

</body>
</html>
