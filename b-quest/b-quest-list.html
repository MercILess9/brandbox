<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Mission Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .navbar { background: #212529; color: white; }
        .quest-card { border: none; border-radius: 10px; transition: 0.3s; }
        .quest-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top p-3">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-rocket-takeoff me-2"></i>B-QUEST</a>
            <div class="d-flex align-items-center">
                <span class="me-3 d-none d-md-inline" id="user-name">User</span>
                <button onclick="handleLogout()" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="bg-white shadow-sm p-3 sticky-top" style="top: 70px; z-index: 100;">
        <div class="container">
            <div class="row g-2">
                <div class="col-8">
                    <input type="text" id="search-input" class="form-control" placeholder="ค้นหาภารกิจ...">
                </div>
                <div class="col-4">
                    <button class="btn btn-primary w-100" onclick="alert('Coming Soon!')">+ New</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <div id="quest-container" class="row g-3">
            </div>

        <div id="load-more-trigger" class="text-center py-5">
            <div id="loader" class="spinner-border text-primary" role="status"></div>
            <p id="no-more-msg" class="d-none text-muted">ครบถ้วนทุกรายการแล้ว</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. คอนฟิก Supabase (เช็ค URL และ Key ให้ชัวร์นะพี่!)
        const SB_URL = 'https://your-project.supabase.co'; 
        const SB_KEY = 'your-anon-key';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentPage = 0;
        const perPage = 10;
        let isFetching = false;
        let isOver = false;

        // 2. ฟังก์ชันดึงข้อมูล (ตัด Order ออกก่อนเพื่อกัน Error คอลัมน์ไม่มี)
        async function loadQuests() {
            if (isFetching || isOver) return;
            isFetching = true;
            document.getElementById('loader').classList.remove('d-none');

            const from = currentPage * perPage;
            const to = from + perPage - 1;

            const { data, error } = await supabase
                .from('b-quest-list') // ตรวจสอบชื่อตารางให้ตรงเป๊ะ
                .select('*')
                .range(from, to);

            if (error) {
                console.error("Supabase Error:", error);
                isFetching = false;
                return;
            }

            if (data.length < perPage) isOver = true;
            if (isOver) document.getElementById('no-more-msg').classList.remove('d-none');

            renderItems(data);
            currentPage++;
            isFetching = false;
            document.getElementById('loader').classList.add('d-none');
        }

        // 3. ฟังก์ชันวาดการ์ด (ใช้ชื่อคอลัมน์กลางๆ)
        function renderItems(items) {
            const container = document.getElementById('quest-container');
            items.forEach(item => {
                const html = `
                    <div class="col-md-6 col-lg-4">
                        <div class="card quest-card shadow-sm h-100">
                            <div class="card-body">
                                <h6 class="fw-bold text-primary">${item.id}</h6>
                                <p class="card-text mb-1">${item.task_name || 'ไม่มีชื่อโจทย์'}</p>
                                <div class="d-flex justify-content-between align-items-center mt-3">
                                    <span class="badge bg-light text-dark border">${item.status || 'N/A'}</span>
                                    <small class="text-muted">${item.owner || ''}</small>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // 4. ระบบ Infinite Scroll (ตรวจจับก้นหน้าจอ)
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                loadQuests();
            }
        }, { threshold: 0.1, rootMargin: '100px' });

        observer.observe(document.getElementById('load-more-trigger'));

        // 5. Logout
        async function handleLogout() {
            await supabase.auth.signOut();
            window.location.href = 'auth.html';
        }
    </script>
</body>
</html>
