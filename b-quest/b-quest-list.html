<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>B-QUEST</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/system/config.js"></script>
    <script src="/system/system.js"></script>
    
    <script src="b-quest.js"></script>
    <script src="b-quest-modal.js" defer></script>

    
    <style>
        :root {
            --c-bg: #f8fafc;
            --c-text-main: #1e293b; --c-text-muted: #94a3b8; --c-slate: #626e7f;
            --c-accent: #bdc432; --c-accent-light: #f4f7a1;
            --c-des: #3b82f6; --c-des-bg: #eff6ff; --c-des-border: #dbeafe;
            --c-cre: #8b5cf6; --c-cre-bg: #f5f3ff; --c-cre-border: #ede9fe;
            --c-progress: #bdc432; --c-progress-bg: #f4f7a1; --c-progress-border: #d4dc6a;
            --c-done: #94a3b8; --c-done-bg: #f1f5f9; --c-done-border: #e2e8f0;
            --radius-card: 20px; --c-panel-bg: #fcfcfc;
        }

        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: var(--c-bg); color: var(--c-text-main); padding-bottom: 120px; margin: 0; }

        /* --- Filter Zone --- */
        .flt-wrapper { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .flt-inner { max-width: 1300px; margin: 0 auto; }
        .flt-row { display: flex; align-items: center; gap: 12px; flex-wrap: nowrap; }
        .flt-search { position: relative; flex: 1; min-width: 120px; }
        .flt-search i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--c-text-muted); }
        .flt-search-input { background: var(--c-bg); border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 15px 8px 40px; font-size: 0.85rem; width: 100%; outline: none; }
        .flt-pill-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .flt-date-group { display: flex; align-items: center; background: var(--c-bg); border: 1px solid #e2e8f0; border-radius: 12px; padding: 0 12px; height: 38px; flex-shrink: 0; }
        .flt-date-input { border: none; background: transparent; font-size: 0.82rem; color: var(--c-slate); outline: none; font-family: inherit; }
        
        .flt-pill { border: 1.5px solid var(--c-text-main); background: #fff; border-radius: 20px; padding: 5px 14px; font-size: 0.75rem; font-weight: 700; color: var(--c-text-main); cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        #pill-designer:hover { background: var(--c-des-bg); border-color: var(--c-des-border); color: var(--c-des); }
        #pill-designer.active-role { background: var(--c-des-bg); color: var(--c-des); border-color: var(--c-des-border); }
        #pill-creative:hover { background: var(--c-cre-bg); border-color: var(--c-cre-border); color: var(--c-cre); }
        #pill-creative.active-role { background: var(--c-cre-bg); color: var(--c-cre); border-color: var(--c-cre-border); }
        #pill-progress:hover { background: var(--c-progress-bg); border-color: var(--c-progress); color: #7a8500; }
        #pill-progress.active-progress { background: var(--c-progress-bg); color: #7a8500; border-color: var(--c-progress); }
        #pill-done:hover { background: var(--c-done-bg); border-color: var(--c-done); color: var(--c-slate); }
        #pill-done.active-done { background: var(--c-done-bg); color: var(--c-slate); border-color: var(--c-done); }

        .flt-btn-adv { border: 1px solid #e2e8f0; background: #fff; border-radius: 10px; padding: 0 15px; height: 38px; font-size: 0.78rem; font-weight: 700; color: var(--c-slate); cursor: pointer; margin-left: auto; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .flt-btn-adv:hover { background: var(--c-bg); border-color: #cbd5e1; }
        .flt-btn-adv.active { background: var(--c-accent-light); border-color: var(--c-accent); color: #7a8500; }
        .flt-btn-today { border: 1px solid #e2e8f0; background: #fff; border-radius: 10px; padding: 0 14px; height: 38px; font-size: 0.78rem; font-weight: 700; color: var(--c-slate); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .flt-btn-today:hover { background: var(--c-bg); border-color: #cbd5e1; }
        .flt-btn-today.active { background: var(--c-accent-light); border-color: var(--c-accent); color: #7a8500; }
        .bqc-btn-edit:hover { background: var(--c-accent) !important; border-color: var(--c-accent) !important; color: #1e293b !important; }
        .bqc-btn-more:hover { color: var(--c-text-main); background: #f1f5f9; border-radius: 8px; }

        .flt-advanced-zone { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.4s ease-out, opacity 0.3s ease; 
            opacity: 0;
            border-top: 1px dashed transparent;
        }
        .flt-advanced-zone.show { 
            max-height: 200px; 
            opacity: 1;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #eee;
        }
        .flt-advanced-row { display: flex; align-items: center; gap: 12px; justify-content: center; flex-wrap: nowrap; }
        
        .flt-select-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; overflow: hidden; height: 38px; transition: 0.2s; flex: 0 1 200px; }
        .flt-select-tag { background: #f1f5f9; color: var(--c-text-muted); font-size: 0.6rem; font-weight: 800; padding: 0 10px; height: 100%; display: flex; align-items: center; justify-content: center; text-transform: uppercase; border-right: 1px solid #e2e8f0; min-width: 65px; }
        .flt-select-input { border: none; font-size: 0.8rem; font-weight: 600; color: var(--c-slate); padding: 0 8px; width: 100%; outline: none; background: transparent; cursor: pointer; text-align-last: center; }
        .flt-select-box.active-filter { background: var(--c-accent-light); border-color: var(--c-accent); }
        .flt-select-box.active-filter .flt-select-tag { background: var(--c-accent); color: #000; border-right-color: var(--c-accent); }

        .btn-reset { border: 1px solid #e2e8f0; background: #fff; color: #94a3b8; font-size: 0.7rem; font-weight: 800; border-radius: 8px; padding: 6px 15px; cursor: pointer; transition: 0.2s; }
        .btn-reset:hover { background: #f8fafc; color: var(--c-text-main); border-color: #cbd5e1; }

        /* --- Card Styles --- */
        .bqc-card { background: white; border: 1px solid #f1f5f9; border-radius: var(--radius-card); margin-bottom: 15px; border-left: 6px solid #e2e8f0; transition: 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
        .bqc-status-done { border-left-color: var(--c-done); }
        .bqc-status-progress { border-left-color: var(--c-progress); }
        .bqc-header { cursor: pointer; padding: 20px 28px; display: flex; align-items: center; }
        .bqc-info-zone { width: 50%; flex-shrink: 0; padding-right: 20px; }
        .bqc-title { font-weight: 700; font-size: 1rem; color: var(--c-text-main); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bqc-subtitle { font-size: 0.8rem; color: var(--c-text-muted); }
        .bqc-dl-grid { display: grid; grid-template-columns: 140px 140px; gap: 20px; flex-grow: 1; justify-content: center; }
        .bqc-dl-col { text-align: center; display: flex; flex-direction: column; justify-content: center; height: 42px; }
        .bqc-dl-label { font-size: 0.55rem; font-weight: 800; color: var(--c-text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .bqc-tag { border-radius: 8px; padding: 4px 12px; font-size: 0.78rem; font-weight: 700; display: inline-block; border: 1px solid transparent; }
        .bqc-tag-des { background: var(--c-des-bg); color: var(--c-des); border-color: var(--c-des-border); }
        .bqc-tag-cre { background: var(--c-cre-bg); color: var(--c-cre); border-color: var(--c-cre-border); }
        
        .bqc-actions { width: 140px; display: flex; justify-content: flex-end; align-items: center; gap: 10px; opacity: 0; transition: 0.2s; }
        .bqc-card:hover .bqc-actions { opacity: 1; }
        .bqc-btn-more { color: var(--c-text-muted); padding: 5px; border: none; background: transparent; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; }

        .bqc-body { background: #fdfdfd; border-top: 1px solid #f1f5f9; padding: 25px; }
        .bqc-meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .bqc-meta-pill { background: white; border: 1px solid #e2e8f0; padding: 6px 14px; border-radius: 12px; display: flex; align-items: center; gap: 8px; }
        .bqc-meta-label { font-size: 0.7rem; font-weight: 700; color: var(--c-text-muted); text-transform: uppercase; }
        .bqc-meta-val { font-size: 0.85rem; font-weight: 600; color: var(--c-slate); }
        .bqc-last-update { font-size: 0.72rem; color: var(--c-slate); font-weight: 500; display: flex; align-items: center; gap: 5px; }
        .bqc-btn-link { background: var(--c-text-main); border: none; border-radius: 10px; padding: 6px 15px; font-size: 0.75rem; font-weight: 600; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 6px; }
        
        .bqc-layout-row { display: flex; gap: 20px; }
        .bqc-col-30 { width: 30%; }
        .bqc-col-40 { width: 40%; }
        .bqc-panel-label { font-size: 0.85rem; font-weight: 700; color: var(--c-slate); text-transform: uppercase; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        
        .bqc-panel { background: var(--c-panel-bg); border: 1px solid #f1f5f9; border-radius: 14px; padding: 20px; height: 160px; }
        .bqc-panel-empty { border: 2px dashed #f1f5f9; background: transparent; border-radius: 14px; height: 160px; display: flex; align-items: center; justify-content: center; color: #cbd5e1; font-weight: 600; letter-spacing: 1px; }

        .bqc-item { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 0.82rem; color: var(--c-slate); }
        .bqc-val { font-weight: 600; }
        .bqc-dot { height: 7px; width: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .bqc-dot-progress { background-color: var(--c-progress); }
        .bqc-dot-done { background-color: var(--c-done); }

        .fab-add { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: #1e293b; color: #bdc432; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); cursor: pointer; border: none; z-index: 1000; transition: 0.3s; }
        .fab-add:hover { transform: scale(1.1) rotate(90deg); background: #0f172a; }
    </style>
</head>
<body>

<section id="filter-zone" class="flt-wrapper">
    <div class="flt-inner">
        <div class="flt-row">
            <div class="flt-search">
                <i class="bi bi-search"></i>
                <input type="text" class="flt-search-input" id="globalSearch" placeholder="Search...">
            </div>
            <div class="flt-date-group">
                <input type="date" class="flt-date-input" id="startDate">
                <span style="color:#cbd5e1; padding: 0 5px;">-</span>
                <input type="date" class="flt-date-input" id="endDate">
            </div>
            <button class="flt-btn-today" id="btnToday"><i class="bi bi-calendar-check"></i> Today</button>
            <div style="width: 1px; height: 24px; background: #e2e8f0; margin: 0 5px;"></div>
            <div class="flt-pill-group">
                <button id="pill-designer" class="flt-pill" onclick="togglePill(this, 'designer')"><i class="bi bi-brush"></i> Designer</button>
                <button id="pill-creative" class="flt-pill" onclick="togglePill(this, 'creative')"><i class="bi bi-rocket"></i> Creative</button>
            </div>
            <button class="flt-btn-adv active" id="toggleFilters"><i class="bi bi-sliders"></i> Advance</button>
        </div>

        <div class="flt-advanced-zone show" id="advancedFilterZone">
            <div class="flt-advanced-row">
                <button id="pill-progress" class="flt-pill active-progress" onclick="togglePill(this, 'progress')"><i class="bi bi-hourglass-split"></i> Progress</button>
                <button id="pill-done" class="flt-pill" onclick="togglePill(this, 'done')"><i class="bi bi-check-circle"></i> Done</button>
                <div style="width: 1px; height: 24px; background: #e2e8f0; margin: 0 4px; flex-shrink:0;"></div>
                <div class="flt-select-box"><span class="flt-select-tag">Work</span><select class="flt-select-input" id="filterWork"></select></div>
                <div class="flt-select-box"><span class="flt-select-tag">Type</span><select class="flt-select-input" id="filterType"></select></div>
                <div class="flt-select-box"><span class="flt-select-tag">Assign</span><select class="flt-select-input" id="filterAssign"></select></div>
                <div class="flt-select-box"><span class="flt-select-tag">Owner</span><select class="flt-select-input" id="filterOwner"></select></div>
                <button class="btn-reset" onclick="resetAdvanced()">RESET</button>
            </div>
        </div>
    </div>
</section>

<main id="card-container" class="flt-inner" style="padding: 24px 20px 120px;">
    <div id="taskContainer" class="row"></div>
    <div id="load-more-trigger" style="height: 50px;"></div>
</main>

<button class="fab-add" onclick="openTaskModal(null, dataList)" title="B-QUEST Form">
    <i class="bi bi-plus-lg"></i>
</button>



<script>
    const SEARCH_COLUMNS = ['account_name', 'opportunity_name', 'task_name', 'detail', 'designer_assign', 'creative_assign', 'owner'];
    let dataList = [];     
    let assignList = [];   
    let currentPage = 0;
    let isFetching = false;
    let hasMore = true;

    // --- Helpers ---
    function setupDefaultOptions(el, label) {
        if (!el) return;
        el.innerHTML = `<option value="">All ${label}</option>`;
    }

    function updateHighlight(id) {
        const el = document.getElementById(id);
        const box = el.closest('.flt-select-box');
        if (box) el.value !== "" ? box.classList.add('active-filter') : box.classList.remove('active-filter');
    }

    function appendRoleGroup(selectEl, label, data, filterKey, filterVal, textKey, valueKey) {
        const group = document.createElement('optgroup');
        group.label = `── ${label} ──`;
        data.filter(item => item[filterKey] === filterVal).forEach(item => {
            group.appendChild(new Option(item[textKey], item[valueKey]));
        });
        selectEl.appendChild(group);
    }

    // --- Main Logic ---
    async function loadMasterData() {
        try {
            const [workRes, profileRes] = await Promise.all([
                supabaseClient.from('b-quest-work').select('work, weight, role').order('work'),
                supabaseClient.from('b-quest-profiles').select('codename, role_designer, role_creative').order('codename')
            ]);

            dataList = workRes.data || [];
            assignList = profileRes.data || [];

            renderFilterWork();
            renderFilterAssign();

            const typeEl = document.getElementById('filterType');
            setupDefaultOptions(typeEl, "Type");
            B_QUEST_CONFIG.listTypes.forEach(t => typeEl.add(new Option(t, t)));

            const { data: owners } = await supabaseClient.from('b-quest-list').select('owner');
            const ownerEl = document.getElementById('filterOwner');
            setupDefaultOptions(ownerEl, "Owner");
            if (owners) {
                const unique = [...new Set(owners.map(o => o.owner).filter(o => o && o !== '-'))].sort();
                unique.forEach(name => ownerEl.add(new Option(name, name)));
            }
        } catch (e) { console.error(e); }
    }

    function renderFilterWork() {
        const filterWork = document.getElementById('filterWork');
        if (!filterWork) return;
        const currentSelection = filterWork.value;
        setupDefaultOptions(filterWork, "Work");

        const desActive = document.getElementById('pill-designer').classList.contains('active-role');
        const creActive = document.getElementById('pill-creative').classList.contains('active-role');
        const showAll = !desActive && !creActive;

        if (desActive || showAll) appendRoleGroup(filterWork, "Designer Work", dataList, 'role', 'Designer', 'work', 'work');
        if (creActive || showAll) appendRoleGroup(filterWork, "Creative Work", dataList, 'role', 'Creative', 'work', 'work');

        filterWork.value = currentSelection;
        updateHighlight('filterWork');
    }

    function renderFilterAssign() {
        const filterAssign = document.getElementById('filterAssign');
        if (!filterAssign) return;
        const currentSelection = filterAssign.value;
        setupDefaultOptions(filterAssign, "Assign");

        const desActive = document.getElementById('pill-designer').classList.contains('active-role');
        const creActive = document.getElementById('pill-creative').classList.contains('active-role');
        const showAll = !desActive && !creActive;

        if (desActive || showAll) appendRoleGroup(filterAssign, "Designers", assignList, 'role_designer', true, 'codename', 'codename');
        if (creActive || showAll) appendRoleGroup(filterAssign, "Creatives", assignList, 'role_creative', true, 'codename', 'codename');

        filterAssign.value = currentSelection;
        updateHighlight('filterAssign');
    }

    function togglePill(btn, type) {
        const className = 'active-' + (type === 'designer' || type === 'creative' ? 'role' : type);
        btn.classList.toggle(className);
        if (type === 'designer' || type === 'creative') {
            renderFilterWork();
            renderFilterAssign();
        }
        applyFilters();
    }

    function applyFilters() {
        currentPage = 0; hasMore = true;
        document.getElementById("taskContainer").innerHTML = ''; 
        fetchQuests();
    }

    async function fetchQuests(isFirst = false) {
        if (isFetching || (!hasMore && !isFirst)) return;
        isFetching = true;
        const limit = B_QUEST_CONFIG.itemsPerPage || 20;
        const from = currentPage * limit;
        const to = from + limit - 1;

        let query = supabaseClient.from('b-quest-list').select('*');

        const search = document.getElementById('globalSearch').value.trim();
        if (search) query = query.or(SEARCH_COLUMNS.map(col => `${col}.ilike.%${search}%`).join(','));

        const designerActive = document.getElementById('pill-designer').classList.contains('active-role');
        const creativeActive = document.getElementById('pill-creative').classList.contains('active-role');
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;

        if (designerActive || creativeActive) {
            const build = (r) => `and(${r}.neq.-,${r}.not.is.null${startDate?`,${r}_deadline.gte.${startDate}`:''}${endDate?`,${r}_deadline.lte.${endDate}`:''})`;
            let parts = [];
            if (designerActive) parts.push(build('designer'));
            if (creativeActive) parts.push(build('creative'));
            query = query.or(parts.join(','));
        }

        const progressActive = document.getElementById('pill-progress').classList.contains('active-progress');
        const doneActive = document.getElementById('pill-done').classList.contains('active-done');

        if (progressActive && !doneActive) query = query.or('designer_status.neq.Done,creative_status.neq.Done');
        else if (doneActive && !progressActive) query = query.eq('designer_status','Done').eq('creative_status','Done');

        const val = (id) => document.getElementById(id)?.value || "";
        if (val('filterWork')) query = query.or(`designer.eq."${val('filterWork')}",creative.eq."${val('filterWork')}"`);
        if (val('filterType')) query = query.or(`designer_type.eq."${val('filterType')}",creative_type.eq."${val('filterType')}"`);
        if (val('filterAssign')) query = query.or(`designer_assign.eq."${val('filterAssign')}",creative_assign.eq."${val('filterAssign')}"`);
        if (val('filterOwner')) query = query.eq('owner', val('filterOwner'));

        query = query.range(from, to).order('last_update', { ascending: false });

        try {
            const { data, error } = await query;
            if (error) throw error;
            if (data.length < limit) hasMore = false;
            renderCards(data);
            currentPage++;
        } catch (e) { console.error(e); } finally { isFetching = false; }
    }

    function renderCards(data) {
        const container = document.getElementById("taskContainer");
        // ไม่ต้องล้าง container ตรงนี้ เพราะเราใช้ระบบ Infinite Scroll (append ข้อมูลต่อท้าย)
        const canEdit = canBquest('edit_designer') || canBquest('edit_creative');
        const canDel  = canBquest('delete');

        data.forEach(task => {
            // --- 1. เช็คสถานะการเปิด Card (Designer / Creative) ---
            const hasD = !!task.designer && task.designer !== '-' && task.designer !== '';
            const hasC = !!task.creative && task.creative !== '-' && task.creative !== '';
            
            // --- 2. เช็ค Status รวม (ถ้าเปิด Card ไหน ต้อง Done ทุก Card ที่เปิดถึงจะเป็นสีเทา) ---
            // ถ้าไม่เปิดเลย หรือที่เปิดอยู่ยังไม่ Done จะเป็นสีน้ำเงิน (Progress)
            const isDone = (hasD || hasC) && 
                        (!hasD || task.designer_status === 'Done') && 
                        (!hasC || task.creative_status === 'Done');

            const collapseId = `collapse-${task.id}`;
            const card = document.createElement("div");
            card.className = "col-12";
            
            card.innerHTML = `
                <div class="bqc-card ${isDone ? 'bqc-status-done' : 'bqc-status-progress'}">
                    <div class="bqc-header">
                        <div class="bqc-info-zone" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <div class="bqc-title">${task.task_name || 'Untitled'}</div>
                            <div class="bqc-subtitle">${task.account_name} | ${task.opportunity_name}</div>
                        </div>

                        <div class="bqc-dl-grid" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                            <div class="bqc-dl-col">
                                ${hasD ? `<span class="bqc-dl-label">Designer</span><span class="bqc-tag bqc-tag-des">${formatDate(task.designer_deadline)}</span>` : ''}
                            </div>
                            <div class="bqc-dl-col">
                                ${hasC ? `<span class="bqc-dl-label">Creative</span><span class="bqc-tag bqc-tag-cre">${formatDate(task.creative_deadline)}</span>` : ''}
                            </div>
                        </div>

                        <div class="bqc-actions">
                            ${canEdit ? `<button class="btn btn-outline-dark btn-sm rounded-pill px-3 bqc-btn-edit" onclick="openTaskModal('${task.id}', dataList)">Edit</button>` : ''}
                            <div class="dropdown">
                                <button class="bqc-btn-more" type="button" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                                <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg" style="border-radius: 15px;">
                                    <li> <a class="dropdown-item py-2" href="b-quest-view.html?id=${task.id}"> <i class="bi bi-eye me-2"></i> View </a> </li>
                                    ${canDel ? `<li><hr class="dropdown-divider opacity-50"></li><li> <a class="dropdown-item py-2 text-danger" href="javascript:void(0)" onclick="handleDeleteTask('${task.id}')"> <i class="bi bi-trash3 me-2"></i> Delete </a> </li>` : ''}
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="collapse" id="${collapseId}">
                        <div class="bqc-body">
                            <div class="bqc-meta-row">
                                <div class="d-flex gap-2">
                                    <div class="bqc-meta-pill"><span class="bqc-meta-label">Owner</span><span class="bqc-meta-val ms-2">${task.owner || '-'}</span></div>
                                    <div class="bqc-meta-pill"><span class="bqc-meta-label">Publish</span><span class="bqc-meta-val ms-2">${formatDate(task.publish_date)}</span></div>
                                    ${task.link ? `<a href="${task.link}" target="_blank" class="bqc-btn-link"><i class="bi bi-link-45deg"></i> Link</a>` : ''}
                                </div>
                                <div class="bqc-last-update"><i class="bi bi-clock-history"></i> Last Update : ${formatDate(task.last_update)}</div>
                            </div>

                            <div class="bqc-layout-row">
                                <div class="bqc-col-30">
                                    <div class="bqc-panel-label"><i class="bi bi-brush"></i> DESIGNER</div>
                                    ${hasD ? `
                                        <div class="bqc-panel">
                                            <div class="bqc-item"><span>Status</span><span class="bqc-val"><span class="bqc-dot ${task.designer_status === 'Done' ? 'bqc-dot-done' : 'bqc-dot-progress'}"></span>${task.designer_status}</span></div>
                                            <div class="bqc-item"><span>Type</span><span class="bqc-val">${task.designer_type || '-'}</span></div>
                                            <div class="bqc-item"><span>Work</span><span class="bqc-val">${task.designer || '-'}</span></div>
                                            <div class="bqc-item"><span>Assign</span><span class="bqc-val">${(task.designer_assign && task.designer_assign !== '-') ? task.designer_assign : '-'}</span></div>
                                            <div class="bqc-item mt-2"><span>Deadline</span><span class="bqc-val fw-bold">${formatDate(task.designer_deadline)}</span></div>
                                        </div>
                                    ` : '<div class="bqc-panel-empty">NO DESIGNER</div>'}
                                </div>

                                <div class="bqc-col-30">
                                    <div class="bqc-panel-label"><i class="bi bi-rocket"></i> CREATIVE</div>
                                    ${hasC ? `
                                        <div class="bqc-panel">
                                            <div class="bqc-item"><span>Status</span><span class="bqc-val"><span class="bqc-dot ${task.creative_status === 'Done' ? 'bqc-dot-done' : 'bqc-dot-progress'}"></span>${task.creative_status}</span></div>
                                            <div class="bqc-item"><span>Type</span><span class="bqc-val">${task.creative_type || '-'}</span></div>
                                            <div class="bqc-item"><span>Work</span><span class="bqc-val">${task.creative || '-'}</span></div>
                                            <div class="bqc-item"><span>Assign</span><span class="bqc-val">${(task.creative_assign && task.creative_assign !== '-') ? task.creative_assign : '-'}</span></div>
                                            <div class="bqc-item mt-2"><span>Deadline</span><span class="bqc-val fw-bold">${formatDate(task.creative_deadline)}</span></div>
                                        </div>
                                    ` : '<div class="bqc-panel-empty">NO CREATIVE</div>'}
                                </div>

                                <div class="bqc-col-40">
                                    <div class="bqc-panel-label"><i class="bi bi-justify-left"></i> DETAIL</div>
                                    <div class="bqc-panel" style="overflow-y: auto; color: #64748b; font-size: 0.85rem; line-height: 1.5;">
                                        ${task.detail ? task.detail.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') : 'No details provided.'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
                
            container.appendChild(card);
        });
    }

    function resetAdvanced() {
        ['filterWork', 'filterType', 'filterAssign', 'filterOwner'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.value = "";
            updateHighlight(id);
        });
        applyFilters();
    }

    async function initPage() {
        try {
            await initLayout(B_QUEST_CONFIG);
            await loadBquestPerms();
            applyPermUI();
            await loadMasterData();
            fetchQuests(true);
        } catch (e) { console.error(e); }
    }

    function applyPermUI() {
        if (!canBquest('new')) document.querySelector('.fab-add').style.display = 'none';
    }

    document.getElementById('toggleFilters').addEventListener('click', () => {
        const zone = document.getElementById('advancedFilterZone');
        const btn = document.getElementById('toggleFilters');
        zone.classList.toggle('show');
        btn.classList.toggle('active', zone.classList.contains('show'));
    });

    document.getElementById('btnToday').addEventListener('click', () => {
        const today = new Date().toISOString().split('T')[0];
        const s = document.getElementById('startDate');
        const e = document.getElementById('endDate');
        const btn = document.getElementById('btnToday');
        if (s.value === today && e.value === today) {
            s.value = ''; e.value = '';
            btn.classList.remove('active');
        } else {
            s.value = today; e.value = today;
            btn.classList.add('active');
        }
        applyFilters();
    });

    ['startDate', 'endDate', 'filterWork', 'filterType', 'filterAssign', 'filterOwner'].forEach(id => {
        document.getElementById(id)?.addEventListener('change', () => {
            if (id.startsWith('filter')) updateHighlight(id);
            if (id === 'startDate' || id === 'endDate') {
                const today = new Date().toISOString().split('T')[0];
                const s = document.getElementById('startDate').value;
                const e = document.getElementById('endDate').value;
                if (s !== today || e !== today) document.getElementById('btnToday').classList.remove('active');
            }
            applyFilters();
        });
    });

    document.getElementById('globalSearch').addEventListener('keypress', e => { if(e.key==='Enter') applyFilters() });

    const observer = new IntersectionObserver(entries => { 
        if(entries[0].isIntersecting && !isFetching && hasMore) fetchQuests(); 
    }, { rootMargin: '100px' });
    observer.observe(document.getElementById('load-more-trigger'));

    initPage();
</script>
</body>
</html>
