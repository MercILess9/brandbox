<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-QUEST | Master Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../config.js"></script>
    <script src="../system.js"></script>

    <style>
        :root { 
            --status-progress: #0a4da2; 
            --status-done: #475569;     
            --bg-body: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #94a3b8;
            --section-title: #626e7f;
            --card-radius: 20px;
        }

        body { font-family: 'Inter', 'Sarabun', sans-serif; background-color: var(--bg-body); color: var(--text-dark); padding-bottom: 50px; }

        .collapse { transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .quest-card {
            background: white; border: 1px solid #f1f5f9; border-radius: var(--card-radius); margin-bottom: 15px;
            transition: 0.3s ease; border-left: 6px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        .quest-card:hover { transform: translateY(-3px); box-shadow: 0 12px 20px rgba(0,0,0,0.05); }
        
        .status-done { border-left-color: var(--status-done); }
        .status-progress { border-left-color: var(--status-progress); }

        .card-clickable { cursor: pointer; padding: 20px 28px; }
        .action-btns { opacity: 0; transition: 0.2s ease; }
        .quest-card:hover .action-btns { opacity: 1; }

        /* --- Header Deadline Styles --- */
        .deadline-group { display: flex; gap: 30px; margin: 0 40px; } /* ขยับเข้าหากลางมากขึ้น */
        .header-dl-item { text-align: center; }
        .header-dl-label { font-size: 0.6rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        
        /* กล่อง Deadline ใน Header */
        .dl-pill { 
            background: #f8fafc; border-radius: 8px; padding: 4px 12px; 
            font-size: 0.82rem; font-weight: 700; color: var(--text-dark);
            border: 1px solid #edf2f7; transition: 0.2s;
        }
        .dl-active-des { background: #e0e7ff; color: #4338ca; border-color: #c7d2fe; } /* เมื่อมี Deadline Designer */
        .dl-active-cre { background: #f1f5f9; color: #334155; border-color: #e2e8f0; } /* เมื่อมี Deadline Creative */
        .dl-none { color: #cbd5e1; font-weight: 400; border-color: transparent; background: transparent; }

        .main-header { background: #fff; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .sub-header-line { background: var(--status-progress); height: 38px; display: flex; align-items: center; padding: 0 24px; font-weight: 700; font-size: 0.85rem; color: #fff; }

        .expanded-content { background: #fdfdfd; border-top: 1px solid #f1f5f9; padding: 25px; }
        
        .meta-pill { 
            background: white; border: 1px solid #e2e8f0; padding: 6px 14px; border-radius: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .meta-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .meta-value { font-size: 0.85rem; font-weight: 600; }

        .last-update-text { font-size: 0.72rem; color: #94a3b8; font-weight: 400; display: flex; align-items: center; gap: 5px; }
        .section-title { font-size: 0.82rem; font-weight: 700; color: var(--section-title); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

        .role-card, .detail-box { background: white; border-radius: var(--card-radius); padding: 20px; border: 1px solid #eef2f6; height: 200px; }
        .detail-box { overflow-y: auto; overflow-x: hidden; line-height: 1.7; font-size: 0.92rem; word-break: break-word; }
        .detail-box::-webkit-scrollbar { width: 3px; }
        .detail-box::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .role-item { display: flex; justify-content: space-between; margin-bottom: 7px; font-size: 0.82rem; }
        .role-label { color: var(--text-muted); font-weight: 400; }
        .role-value { font-weight: 600; }

        .dot { height: 7px; width: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-progress { background-color: var(--status-progress); }
        .dot-done { background-color: var(--status-done); }
        .divider-status { border-bottom: 1px dashed #f1f5f9; margin: 6px 0 10px 0; }
        
        .btn-link-premium { background: var(--text-dark); border: none; border-radius: 10px; padding: 6px 15px; font-size: 0.75rem; font-weight: 600; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 6px; }

        .col-30 { width: 30%; }
        .col-40 { width: 40%; }
    </style>
</head>
<body>

<nav class="main-header sticky-top">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
        <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" style="height: 32px;">
        <div class="d-flex align-items-center gap-4">
            <span id="user-display" class="small fw-600 text-muted">...</span>
            <button class="btn btn-dark btn-sm rounded-pill px-4" onclick="BQuest.logout()">Logout</button>
        </div>
    </div>
</nav>

<div id="taskContainer" class="container mt-4"></div>
<div id="load-more-trigger" style="height: 100px;"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentPage = 0;
    const itemsPerPage = 12;
    let isFetching = false;
    let hasMore = true;

    async function initPage() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            const profile = await BQuest.getProfile(session.user.id);
            if (profile) BQuest.setText("user-display", profile.nick_name || profile.full_name);
        }
        fetchQuests(true);
    }

    async function fetchQuests(isFirstLoad = false) {
        if (isFetching || (!hasMore && !isFirstLoad)) return;
        isFetching = true;
        const from = currentPage * itemsPerPage;
        const to = from + itemsPerPage - 1;
        try {
            const { data, error } = await supabaseClient
                .from('b-quest-list').select('*').range(from, to).order('id', { ascending: false });
            if (error) throw error;
            if (data.length < itemsPerPage) hasMore = false;
            renderCards(data);
            currentPage++;
        } catch (e) { console.error(e); }
        finally { isFetching = false; }
    }

    function renderCards(data) {
        const container = document.getElementById("taskContainer");
        data.forEach(task => {
            const isDone = (task.designer_status === 'Done');
            const hasDesigner = !!task.designer;
            const hasCreative = !!task.creative;
            const collapseId = `collapse-${task.id}`;
            
            // Logic เช็ค Deadline เพื่อใส่สี
            const dDL = task.designer_deadline && task.designer_deadline !== '-' ? task.designer_deadline : null;
            const cDL = task.creative_deadline && task.creative_deadline !== '-' ? task.creative_deadline : null;

            const card = document.createElement("div");
            card.className = "col-12";
            card.innerHTML = `
                <div class="quest-card ${isDone ? 'status-done' : 'status-progress'}">
                    <div class="card-clickable d-flex align-items-center" data-bs-toggle="collapse" data-bs-target="#${collapseId}">
                        <div class="flex-grow-1">
                            <h6 class="fw-bold mb-1" style="color: var(--text-dark);">${task.task_name || 'Untitled Project'}</h6>
                            <span class="text-muted small">${task.account_name} | ${task.opportunity_name}</span>
                        </div>
                        
                        <div class="deadline-group">
                            <div class="header-dl-item">
                                <div class="header-dl-label">Designer</div>
                                <div class="dl-pill ${dDL ? 'dl-active-des' : 'dl-none'}">${dDL || '-'}</div>
                            </div>
                            <div class="header-dl-item">
                                <div class="header-dl-label">Creative</div>
                                <div class="dl-pill ${cDL ? 'dl-active-cre' : 'dl-none'}">${cDL || '-'}</div>
                            </div>
                        </div>

                        <div class="action-btns d-flex align-items-center gap-2" onclick="event.stopPropagation()">
                            <button class="btn btn-outline-dark btn-sm rounded-pill px-3" style="font-size: 0.75rem;">Edit</button>
                            <button class="btn btn-light btn-sm rounded-circle border shadow-sm" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                        </div>
                    </div>

                    <div class="collapse" id="${collapseId}">
                        <div class="expanded-content">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="d-flex gap-2">
                                    <div class="meta-pill shadow-sm"><span class="meta-label">Owner</span><span class="meta-value">${task.owner || '-'}</span></div>
                                    <div class="meta-pill shadow-sm"><span class="meta-label">Publish</span><span class="meta-value">${task.publish_date || '-'}</span></div>
                                    ${task.link ? `<a href="${task.link}" target="_blank" class="btn-link-premium shadow-sm"><i class="bi bi-link-45deg"></i> Link</a>` : ''}
                                </div>
                                <div class="last-update-text">
                                    <i class="bi bi-clock"></i> <span>Last Update : ${task.last_update ? new Date(task.last_update).toLocaleDateString() : '-'}</span>
                                </div>
                            </div>

                            <div class="d-flex gap-4">
                                <div class="col-30">
                                    <div class="section-title"><i class="bi bi-brush"></i> Designer</div>
                                    <div class="role-card ${!hasDesigner ? 'is-empty' : ''}">
                                        ${hasDesigner ? `
                                            <div class="role-item"><span class="role-label">Status</span><span class="role-value"><span class="dot ${isDone?'dot-done':'dot-progress'}"></span>${task.designer_status}</span></div>
                                            <div class="divider-status"></div>
                                            <div class="role-item"><span class="role-label">Type</span><span class="role-value">${task.designer_type}</span></div>
                                            <div class="role-item"><span class="role-label">Work</span><span class="role-value">${task.designer}</span></div>
                                            <div class="role-item"><span class="role-label">Assign</span><span class="role-value">${task.designer_assign}</span></div>
                                            <div class="role-item mt-2"><span class="role-label">Deadline</span><span class="role-value fw-bold">${task.designer_deadline}</span></div>
                                        ` : '<div class="text-center mt-5 text-muted small">No Assignment</div>'}
                                    </div>
                                </div>
                                <div class="col-30">
                                    <div class="section-title"><i class="bi bi-rocket"></i> Creative</div>
                                    <div class="role-card ${!hasCreative ? 'is-empty' : ''}">
                                        ${hasCreative ? `
                                            <div class="role-item"><span class="role-label">Status</span><span class="role-value"><span class="dot dot-progress"></span>${task.creative_status}</span></div>
                                            <div class="divider-status"></div>
                                            <div class="role-item"><span class="role-label">Type</span><span class="role-value">${task.creative_type}</span></div>
                                            <div class="role-item"><span class="role-label">Work</span><span class="role-value">${task.creative}</span></div>
                                            <div class="role-item"><span class="role-label">Assign</span><span class="role-value">${task.creative_assign}</span></div>
                                            <div class="role-item mt-2"><span class="role-label">Deadline</span><span class="role-value fw-bold">${task.creative_deadline}</span></div>
                                        ` : '<div class="text-center mt-5 text-muted small">No Assignment</div>'}
                                    </div>
                                </div>
                                <div class="col-40">
                                    <div class="section-title"><i class="bi bi-justify-left"></i> Detail</div>
                                    <div class="detail-box">
                                        <div style="white-space: pre-wrap;">${task.detail || '...'}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isFetching && hasMore) fetchQuests();
    }, { rootMargin: '600px' });
    observer.observe(document.getElementById('load-more-trigger'));
    initPage();
</script>

</body>
</html>
