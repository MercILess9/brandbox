<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>B-QUEST | Master List</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="../config.js"></script>
    <script src="b-quest-config.js"></script>
    <script src="../system.js"></script>

    <style>
        :root { 
            --c-progress: #4e73df; --c-done: #94a3b8; --c-bg: #f8fafc;
            --c-text-main: #1e293b; --c-text-muted: #94a3b8; --c-slate: #626e7f;
            --c-accent: #bdc432; --c-accent-light: #f4f7a1;
            --c-role: #50adba; --radius-card: 20px;
        }

        body { background-color: var(--c-bg); color: var(--c-text-main); padding-bottom: 50px; margin: 0; }

        /* --- Filter Zone --- */
        .flt-wrapper { background: #fff; padding: 15px 30px; border-bottom: 1px solid #e2e8f0; }
        .flt-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .flt-search { position: relative; width: 380px; }
        .flt-search i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--c-text-muted); }
        .flt-search-input { background: var(--c-bg); border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 15px 8px 40px; font-size: 0.85rem; width: 100%; outline: none; }
        
        .flt-date-group { display: flex; align-items: center; background: var(--c-bg); border: 1px solid #e2e8f0; border-radius: 12px; padding: 0 12px; height: 38px; }
        .flt-date-input { border: none; background: transparent; font-size: 0.82rem; color: var(--c-slate); outline: none; text-align: center; width: 105px; }
        
        .flt-pill { border: 1px solid #e2e8f0; background: #fff; border-radius: 20px; padding: 4px 14px; font-size: 0.75rem; font-weight: 600; color: var(--c-slate); cursor: pointer; transition: 0.2s; }
        .flt-pill.active-role { background: var(--c-role); color: #fff; border-color: var(--c-role); }
        .flt-pill.active-prog { background: var(--c-progress); color: #fff; border-color: var(--c-progress); }
        .flt-pill.active-done { background: var(--c-slate); color: #fff; border-color: var(--c-slate); }

        .flt-select-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; display: flex; align-items: center; height: 38px; overflow: hidden; }
        .flt-select-tag { background: #f1f5f9; color: var(--c-text-muted); font-size: 0.6rem; font-weight: 800; padding: 0 10px; height: 100%; display: flex; align-items: center; border-right: 1px solid #e2e8f0; min-width: 65px; text-transform: uppercase; }
        .flt-select-input { border: none; font-size: 0.8rem; font-weight: 600; color: var(--c-slate); padding: 0 5px; outline: none; background: transparent; cursor: pointer; width: 100%; }
        .flt-select-box.active-filter { background: var(--c-accent-light); border-color: var(--c-accent); }
        .flt-select-box.active-filter .flt-select-tag { background: var(--c-accent); color: #000; border-right-color: var(--c-accent); }

        /* --- Card Styles (Fixed & Sharp) --- */
        .bqc-card { background: white; border: 1px solid #f1f5f9; border-radius: var(--radius-card); margin-bottom: 15px; border-left: 6px solid #e2e8f0; transition: 0.3s; overflow: hidden; }
        .bqc-status-done { border-left-color: var(--c-done); }
        .bqc-status-prog { border-left-color: var(--c-progress); }

        .bqc-header { cursor: pointer; padding: 18px 25px; display: flex; align-items: center; gap: 15px; }
        .bqc-info-zone { flex: 1; min-width: 0; }
        .bqc-title { font-weight: 700; font-size: 1rem; color: var(--c-text-main); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .bqc-dl-grid { display: flex; gap: 20px; width: 320px; justify-content: center; flex-shrink: 0; }
        .bqc-dl-col { width: 140px; text-align: center; }
        .bqc-tag { border-radius: 8px; padding: 4px 10px; font-size: 0.75rem; font-weight: 700; display: inline-block; width: 100%; border: 1px solid transparent; }
        .bqc-tag-des { background: #eff6ff; color: #3b82f6; border-color: #dbeafe; }
        .bqc-tag-cre { background: #fef2f2; color: #ef4444; border-color: #fee2e2; }

        .bqc-body { background: #fdfdfd; padding: 25px; border-top: 1px solid #f1f5f9; }
        .bqc-panel { background: white; border-radius: 15px; padding: 18px; border: 1px solid #eef2f6; height: 180px; overflow-y: auto; }
        
        .btn-link-circle { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; text-decoration: none; transition: 0.2s; }
        .btn-link-circle:hover { background: var(--c-accent); color: #000; border-color: var(--c-accent); }
    </style>
</head>
<body>

<section class="flt-wrapper">
    <div class="flt-row">
        <div class="flt-search">
            <i class="bi bi-search"></i>
            <input type="text" class="flt-search-input" id="globalSearch" placeholder="Search task, account, owner...">
        </div>
        <div class="flt-date-group">
            <input type="date" class="flt-date-input" id="startDate">
            <span style="color:#cbd5e1;">-</span>
            <input type="date" class="flt-date-input" id="endDate">
        </div>
        <div class="flt-pill-group">
            <button id="pill-des" class="flt-pill active-role" onclick="togglePill(this, 'designer')">Designer</button>
            <button id="pill-cre" class="flt-pill active-role" onclick="togglePill(this, 'creative')">Creative</button>
        </div>
        <div class="flt-pill-group">
            <button id="pill-prog" class="flt-pill active-prog" onclick="togglePill(this, 'progress')">Progress</button>
            <button id="pill-done" class="flt-pill active-done" onclick="togglePill(this, 'done')">Done</button>
        </div>
        <button class="btn btn-outline-secondary btn-sm ms-auto rounded-pill px-3" onclick="toggleAdv()"><i class="bi bi-sliders"></i> Advance</button>
    </div>

    <div id="advZone" class="pt-3 border-top mt-3" style="display: none;">
        <div class="flt-row">
            <div class="flt-select-box" style="min-width: 160px;"><span class="flt-select-tag">Work</span><select class="flt-select-input" id="filterWork"></select></div>
            <div class="flt-select-box" style="min-width: 140px;"><span class="flt-select-tag">Type</span><select class="flt-select-input" id="filterType"></select></div>
            <div class="flt-select-box" style="min-width: 200px;"><span class="flt-select-tag">Staff</span><select class="flt-select-input" id="filterAssign"></select></div>
            <div class="flt-select-box" style="min-width: 180px;"><span class="flt-select-tag">Owner</span><select class="flt-select-input" id="filterOwner"></select></div>
            <button class="btn btn-sm text-muted fw-bold" onclick="resetAdv()">Reset</button>
        </div>
    </div>
</section>

<main class="container-fluid px-5 mt-4">
    <div id="taskContainer" class="row"></div>
    <div id="load-more-trigger" style="height: 50px;"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let MASTER_WORK_DATA = []; 
    let currentPage = 0;
    let isFetching = false;
    let hasMore = true;

    // --- UI Helpers ---
    function toggleAdv() {
        const z = document.getElementById('advZone');
        z.style.display = z.style.display === 'none' ? 'block' : 'none';
    }

    function updateHl(id) {
        const el = document.getElementById(id);
        const box = el.closest('.flt-select-box');
        el.value !== "" ? box.classList.add('active-filter') : box.classList.remove('active-filter');
    }

    function setupOpt(el, lbl) {
        el.innerHTML = `<option value="">All ${lbl}</option><option disabled>----------</option>`;
    }

    async function loadMasterData() {
        try {
            const { data } = await supabaseClient.from('b_quest_work').select('*').order('work');
            MASTER_WORK_DATA = data || [];
            
            // Populate Work Select
            const wSel = document.getElementById('filterWork');
            setupOpt(wSel, "Work");
            MASTER_WORK_DATA.forEach(w => wSel.add(new Option(w.work, w.work)));

            // Populate Type from Config
            const tSel = document.getElementById('filterType');
            setupOpt(tSel, "Type");
            B_QUEST_CONFIG.listTypes.forEach(t => tSel.add(new Option(t, t)));

            // Staff & Owner
            const { data: list } = await supabaseClient.from('b-quest-list').select('designer_assign, creative_assign, owner');
            if (list) {
                const fill = (id, lbl, keys) => {
                    const set = new Set();
                    list.forEach(i => keys.forEach(k => { if(i[k] && i[k] !== '-') set.add(i[k]) }));
                    const el = document.getElementById(id);
                    setupOpt(el, lbl);
                    [...set].sort().forEach(v => el.add(new Option(v, v)));
                };
                fill('filterAssign', "Staff", ['designer_assign', 'creative_assign']);
                fill('filterOwner', "Owner", ['owner']);
            }
        } catch (e) { console.error(e); }
    }

    // --- Logic ---
    function togglePill(btn, type) {
        const cls = type === 'designer' || type === 'creative' ? 'active-role' : (type === 'progress' ? 'active-prog' : 'active-done');
        btn.classList.toggle(cls);
        applyFlt();
    }

    function applyFlt() {
        currentPage = 0; hasMore = true;
        document.getElementById("taskContainer").innerHTML = '';
        ['filterWork', 'filterType', 'filterAssign', 'filterOwner'].forEach(id => updateHl(id));
        fetchQuests();
    }

    function resetAdv() {
        ['filterWork', 'filterType', 'filterAssign', 'filterOwner'].forEach(id => {
            document.getElementById(id).value = "";
            updateHl(id);
        });
        applyFlt();
    }

    async function fetchQuests(isFirst = false) {
        if (isFetching || (!hasMore && !isFirst)) return;
        isFetching = true;
        
        const limit = B_QUEST_CONFIG.itemsPerPage;
        const from = currentPage * limit;
        const to = from + limit - 1;
        
        let query = supabaseClient.from('b-quest-list').select('*');

        // Search
        const search = document.getElementById('globalSearch').value.trim();
        if (search) query = query.or(['task_name','account_name','opportunity_name','designer','creative','owner'].map(c => `${c}.ilike.%${search}%`).join(','));

        // Pills & Dates
        const pD = document.getElementById('pill-des').classList.contains('active-role');
        const pC = document.getElementById('pill-cre').classList.contains('active-role');
        const sd = document.getElementById('startDate').value;
        const ed = document.getElementById('endDate').value;

        if (!pD && !pC) query = query.eq('id', -1);
        else {
            const build = (r) => `and(${r}.neq.-,${r}.not.is.null${sd?`,${r}_deadline.gte.${sd}`:''}${ed?`,${r}_deadline.lte.${ed}`:''})`;
            let parts = [];
            if(pD) parts.push(build('designer'));
            if(pC) parts.push(build('creative'));
            query = query.or(parts.join(','));
        }

        const pP = document.getElementById('pill-prog').classList.contains('active-prog');
        const pDn = document.getElementById('pill-done').classList.contains('active-done');
        if (pP && !pDn) query = query.or('designer_status.neq.Done, creative_status.neq.Done');
        else if (!pP && pDn) query = query.eq('designer_status', 'Done').eq('creative_status', 'Done');
        else if (!pP && !pDn) query = query.eq('id', -1);

        // Adv Selects
        const v = (id) => document.getElementById(id).value;
        if(v('filterWork')) query = query.or(`designer.eq."${v('filterWork')}",creative.eq."${v('filterWork')}"`);
        if(v('filterType')) query = query.or(`designer_type.eq."${v('filterType')}",creative_type.eq."${v('filterType')}"`);
        if(v('filterAssign')) query = query.or(`designer_assign.eq."${v('filterAssign')}",creative_assign.eq."${v('filterAssign')}"`);
        if(v('filterOwner')) query = query.eq('owner', v('filterOwner'));

        query = query.range(from, to).order('id', { ascending: false });

        try {
            const { data } = await query;
            if (data.length < limit) hasMore = false;
            renderCards(data);
            currentPage++;
        } catch (e) { console.error(e); } finally { isFetching = false; }
    }

    function renderCards(data) {
        const container = document.getElementById("taskContainer");
        data.forEach(task => {
            const hD = !!task.designer && task.designer !== '-';
            const hC = !!task.creative && task.creative !== '-';
            const isDone = (hD || hC) && (!hD || task.designer_status === 'Done') && (!hC || task.creative_status === 'Done');

            const card = document.createElement("div");
            card.className = "col-12";
            card.innerHTML = `
                <div class="bqc-card ${isDone ? 'bqc-status-done' : 'bqc-status-prog'}">
                    <div class="bqc-header" data-bs-toggle="collapse" data-bs-target="#c-${task.id}">
                        <div class="bqc-info-zone">
                            <div class="bqc-title">${task.task_name || 'Untitled Task'}</div>
                            <div class="small text-muted">
                                <b>${task.account_name}</b> | ${task.opportunity_name}
                                <span class="ms-2 badge bg-light text-secondary border">Owner: ${task.owner || '-'}</span>
                            </div>
                        </div>
                        <div class="bqc-dl-grid">
                            <div class="bqc-dl-col">
                                ${hD ? `<div class="small fw-bold text-muted" style="font-size:0.6rem">DESIGNER</div><span class="bqc-tag bqc-tag-des">${task.designer_deadline}</span>` : ''}
                            </div>
                            <div class="bqc-dl-col">
                                ${hC ? `<div class="small fw-bold text-muted" style="font-size:0.6rem">CREATIVE</div><span class="bqc-tag bqc-tag-cre">${task.creative_deadline}</span>` : ''}
                            </div>
                        </div>
                        <div class="ms-auto d-flex align-items-center gap-3">
                            ${task.link ? `<a href="${task.link}" target="_blank" class="btn-link-circle" onclick="event.stopPropagation()"><i class="bi bi-link-45deg"></i></a>` : ''}
                            <button class="btn btn-sm btn-outline-dark rounded-pill px-3 fw-bold">Edit</button>
                        </div>
                    </div>
                    <div class="collapse" id="c-${task.id}">
                        <div class="bqc-body">
                            <div class="row g-4">
                                <div class="col-md-4">
                                    <div class="bqc-panel">
                                        <div class="d-flex justify-content-between align-items-center mb-2">
                                            <h6 class="m-0 fw-bold">Designer</h6>
                                            <span class="badge ${task.designer_status==='Done'?'bg-success':'bg-primary'}">${task.designer_status}</span>
                                        </div>
                                        <div class="small">
                                            <p class="mb-1"><b>Work:</b> ${task.designer}</p>
                                            <p class="mb-1"><b>Type:</b> ${task.designer_type}</p>
                                            <p class="mb-1"><b>Staff:</b> ${task.designer_assign}</p>
                                            <p class="mb-0 text-danger"><b>Deadline:</b> ${task.designer_deadline}</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="bqc-panel">
                                        <div class="d-flex justify-content-between align-items-center mb-2">
                                            <h6 class="m-0 fw-bold">Creative</h6>
                                            <span class="badge ${task.creative_status==='Done'?'bg-success':'bg-primary'}">${task.creative_status}</span>
                                        </div>
                                        <div class="small">
                                            <p class="mb-1"><b>Work:</b> ${task.creative}</p>
                                            <p class="mb-1"><b>Type:</b> ${task.creative_type}</p>
                                            <p class="mb-1"><b>Staff:</b> ${task.creative_assign}</p>
                                            <p class="mb-0 text-danger"><b>Deadline:</b> ${task.creative_deadline}</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="bqc-panel">
                                        <h6 class="fw-bold">Detail / Brief</h6>
                                        <div class="small text-muted" style="white-space: pre-line;">${task.detail || 'No details provided.'}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            container.appendChild(card);
        });
    }

    // --- Init ---
    async function initPage() {
        await BQuest.initLayout(B_QUEST_CONFIG);
        await loadMasterData();
        fetchQuests(true);
    }

    ['startDate', 'endDate', 'filterWork', 'filterType', 'filterAssign', 'filterOwner'].forEach(id => {
        document.getElementById(id).addEventListener('change', applyFlt);
    });
    document.getElementById('globalSearch').addEventListener('keypress', e => { if(e.key==='Enter') applyFlt() });
    
    const obs = new IntersectionObserver(e => { if(e[0].isIntersecting && !isFetching && hasMore) fetchQuests() }, { rootMargin: '400px' });
    obs.observe(document.getElementById('load-more-trigger'));
    
    initPage();
</script>
</body>
</html>
