<style>
    .bq-modal-1000 { max-width: 1000px !important; }
    .bq-form-container { border-radius: 20px; border: none; background: #ffffff; overflow: hidden; }
    
    .bq-form-header { padding: 18px 30px; background: #fff; border-bottom: 1px solid #f1f5f9; }
    .bq-form-body { padding: 20px 30px; background: #f8fafc; }
    .bq-form-footer { padding: 15px 30px; background: #fff; border-top: 1px solid #f1f5f9; }

    /* Identity Card (Left) */
    .bq-section-card { 
        background: #fcfcfc; 
        border-radius: 16px; 
        padding: 20px; 
        border: 1px solid #eef2f6;
        height: 100%;
    }

    /* Field Label Style #626e7f */
    .bq-label { 
        font-size: 0.7rem; 
        font-weight: 800; 
        color: #626e7f; 
        display: flex; 
        align-items: center; 
        gap: 6px;
        margin-bottom: 4px;
        text-transform: uppercase;
    }
    .bq-label i { font-size: 0.85rem; color: #94a3b8; }

    /* Compact Input Field */
    .bq-input { 
        width: 100%;
        border-radius: 10px; 
        border: 1px solid #e2e8f0; 
        padding: 7px 12px; 
        font-size: 0.88rem; 
        background: #ffffff;
        transition: 0.2s;
        margin-bottom: 12px;
    }
    .bq-input:focus { border-color: #bdc432; outline: none; box-shadow: 0 0 0 3px rgba(189, 196, 50, 0.1); }

    /* Footer Buttons */
    .btn-create-task { background: #1e293b; color: #bdc432; border-radius: 10px; padding: 8px 35px; font-weight: 700; border: none; }
    .btn-cancel-task { color: #94a3b8; font-weight: 600; text-decoration: none; font-size: 0.85rem; }

    .edit-mode-only { display: none !important; }
    .is-edit .edit-mode-only { display: block !important; }
</style>

<div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog bq-modal-1000 modal-dialog-centered">
        <div class="modal-content bq-form-container">
            
            <div class="bq-form-header d-flex justify-content-between align-items-center">
                <h4 class="fw-bold m-0">New <span style="color: #bdc432;">Task</span></h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            
            <form id="taskForm">
                <div class="bq-form-body">
                    <input type="hidden" id="task-id" name="id">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-7">
                            <div class="bq-section-card" style="background: white;">
                                <label class="bq-label"><i class="bi bi-building"></i> Account Name</label>
                                <input type="text" class="bq-input" id="account_name" name="account_name" placeholder="Brand Name">

                                <label class="bq-label"><i class="bi bi-gem"></i> Opportunity Name</label>
                                <input type="text" class="bq-input" id="opportunity_name" name="opportunity_name" placeholder="Opportunity">

                                <label class="bq-label"><i class="bi bi-card-text"></i> Task Name</label>
                                <input type="text" class="bq-input" id="task_name" name="task_name" placeholder="What needs to be done?">

                                <label class="bq-label"><i class="bi bi-link-45deg"></i> Project Link</label>
                                <input type="text" class="bq-input m-0" id="task_link" name="link" placeholder="URL">
                            </div>
                        </div>

                        <div class="col-md-5">
                            <div class="bq-section-card">
                                <label class="bq-label"><i class="bi bi-calendar-event"></i> Publish Date</label>
                                <input type="date" class="bq-input" id="publish_date" name="publish_date">
                                
                                <label class="bq-label"><i class="bi bi-justify-left"></i> Detail</label>
                                <textarea class="bq-input m-0" id="detail" name="detail" rows="7" style="resize: none; height: 145px;"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="bq-section-card">
                                <div class="bq-label mb-2" style="color: #1e293b;"><i class="bi bi-brush"></i> Designer Assignment</div>
                                <div class="row g-2">
                                    <div class="col-6"><label class="bq-label">Type</label><select class="bq-input" id="designer_type" name="designer_type"></select></div>
                                    <div class="col-6"><label class="bq-label">Work</label><select class="bq-input" id="designer_work" name="designer_work"></select></div>
                                    <div class="col-12"><label class="bq-label">Deadline</label><input type="date" class="bq-input m-0" id="designer_deadline" name="designer_deadline"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="bq-section-card">
                                <div class="bq-label mb-2" style="color: #1e293b;"><i class="bi bi-rocket"></i> Creative Assignment</div>
                                <div class="row g-2">
                                    <div class="col-6"><label class="bq-label">Type</label><select class="bq-input" id="creative_type" name="creative_type"></select></div>
                                    <div class="col-6"><label class="bq-label">Work</label><select class="bq-input" id="creative_work" name="creative_work"></select></div>
                                    <div class="col-12"><label class="bq-label">Deadline</label><input type="date" class="bq-input m-0" id="creative_deadline" name="creative_deadline"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bq-form-footer d-flex justify-content-between align-items-center">
                    <button type="button" class="btn btn-sm btn-link text-danger text-decoration-none fw-bold edit-mode-only" id="btnDeleteTask">Delete</button>
                    <div class="d-flex align-items-center gap-4">
                        <a href="#" class="btn-cancel-task" data-bs-dismiss="modal">Cancel</a>
                        <button type="submit" class="btn-create-task shadow-sm">Create</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    (function debugModalInit() {
        console.log("--- 🕵️ Start Debugging Modal Init ---");

        // 1. เช็กตัวแปร Config
        if (typeof B_QUEST_CONFIG === 'undefined') {
            console.error("❌ Error: B_QUEST_CONFIG is not defined! (ไฟล์ config.js อาจจะโหลดไม่เข้า)");
        } else {
            console.log("✅ Config Found:", B_QUEST_CONFIG);
            console.log("📋 ListTypes in Config:", B_QUEST_CONFIG.listTypes);
        }

        let attempts = 0;
        const maxAttempts = 20; // ลอง 20 ครั้ง (2 วินาที)

        const checkExist = setInterval(() => {
            attempts++;
            const desType = document.getElementById('designer_type');
            const creType = document.getElementById('creative_type');

            // 2. เช็กว่าเจอ Element ไหม
            if (desType && creType) {
                console.log(`✅ Elements Found at attempt #${attempts}`);
                
                const types = (typeof B_QUEST_CONFIG !== 'undefined') ? B_QUEST_CONFIG.listTypes : [];
                
                if (!types || types.length === 0) {
                    console.warn("⚠️ Warning: types array is empty or undefined!");
                }

                [desType, creType].forEach(el => {
                    console.log(`💉 Injecting into: ${el.id}`);
                    el.innerHTML = '<option value="">- Select Type -</option>';
                    types.forEach(t => {
                        const opt = document.createElement('option');
                        opt.value = t;
                        opt.textContent = t;
                        el.appendChild(opt);
                    });
                });

                console.log("✨ Injection Completed!");
                clearInterval(checkExist);
            } else {
                if (attempts >= maxAttempts) {
                    console.error("❌ Error: Modal Elements NOT FOUND after 2 seconds!");
                    console.log("DOM State:", { 
                        body: document.body.innerHTML.substring(0, 500) + "...",
                        hasTaskModal: !!document.getElementById('taskModal') 
                    });
                    clearInterval(checkExist);
                }
            }
        }, 100);
    })();
</script>
