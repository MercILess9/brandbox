<style>
    /* Modal Structure - Compact 1000px */
    .bq-modal-1000 { max-width: 1000px !important; }
    .bq-form-container { border-radius: 24px; border: none; background: #ffffff; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    
    /* Header & Footer */
    .bq-form-header { padding: 25px 35px; background: #fff; border-bottom: 1px solid #f1f5f9; }
    .bq-form-footer { padding: 20px 35px; background: #fff; border-top: 1px solid #f1f5f9; }
    .bq-form-body { padding: 25px 35px; background: #f8fafc; }

    /* Input Card Style */
    .bq-section-card { 
        background: #fcfcfc; 
        border-radius: 20px; 
        padding: 22px; 
        border: 1px solid #eef2f6;
        height: 100%;
    }

    /* Typography & Label #626e7f */
    .bq-label { 
        font-size: 0.75rem; 
        font-weight: 700; 
        color: #626e7f; 
        display: flex; 
        align-items: center; 
        gap: 8px;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .bq-label i { font-size: 1rem; color: #94a3b8; }

    /* Stylish Input */
    .bq-input { 
        width: 100%;
        border-radius: 12px; 
        border: 1px solid #e2e8f0; 
        padding: 10px 16px; 
        font-size: 0.92rem; 
        background: #ffffff;
        transition: all 0.2s ease;
        margin-bottom: 18px;
    }
    .bq-input:focus { border-color: #bdc432; outline: none; box-shadow: 0 0 0 4px rgba(189, 196, 50, 0.1); }
    .bq-input::placeholder { color: #cbd5e1; }

    /* Action Buttons */
    .btn-create-task { 
        background: #1e293b; 
        color: #bdc432; 
        border-radius: 14px; 
        padding: 12px 45px; 
        font-weight: 700; 
        border: none; 
        transition: 0.2s;
    }
    .btn-create-task:hover { background: #0f172a; transform: translateY(-1px); }
    .btn-cancel-task { color: #94a3b8; font-weight: 600; text-decoration: none; font-size: 0.9rem; }
    .btn-cancel-task:hover { color: #64748b; }

    .edit-mode-only { display: none !important; }
    .is-edit .edit-mode-only { display: flex !important; }
</style>

<div class="modal fade" id="taskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog bq-modal-1000 modal-dialog-centered">
        <div class="modal-content bq-form-container">
            
            <div class="bq-form-header d-flex justify-content-between align-items-center">
                <h3 class="fw-bold m-0" style="letter-spacing: -1px; color: #1e293b;">New <span style="color: #bdc432;">Task</span></h3>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <form id="taskForm">
                <div class="bq-form-body">
                    <input type="hidden" id="task-id" name="id">
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-7">
                            <div class="bq-section-card shadow-sm" style="background: #fff;">
                                <div class="row">
                                    <div class="col-12">
                                        <label class="bq-label"><i class="bi bi-building"></i> Account Name</label>
                                        <input type="text" class="bq-input" id="account_name" name="account_name" placeholder="Which client is this for?">
                                    </div>
                                    <div class="col-12">
                                        <label class="bq-label"><i class="bi bi-gem"></i> Opportunity Name</label>
                                        <input type="text" class="bq-input" id="opportunity_name" name="opportunity_name" placeholder="Name of the opportunity">
                                    </div>
                                    <div class="col-12">
                                        <label class="bq-label"><i class="bi bi-card-text"></i> Task Name</label>
                                        <input type="text" class="bq-input" id="task_name" name="task_name" placeholder="Short summary of work">
                                    </div>
                                    <div class="col-12">
                                        <label class="bq-label"><i class="bi bi-link-45deg"></i> Project Link</label>
                                        <input type="text" class="bq-input m-0" id="task_link" name="link" placeholder="URL to documentation/assets">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-5">
                            <div class="bq-section-card shadow-sm">
                                <label class="bq-label"><i class="bi bi-calendar-event"></i> Publish Date</label>
                                <input type="date" class="bq-input" id="publish_date" name="publish_date">
                                
                                <label class="bq-label"><i class="bi bi-justify-left"></i> Mission Detail</label>
                                <textarea class="bq-input m-0" id="detail" name="detail" rows="8" style="resize: none; height: 195px;" placeholder="Describe the mission requirements in detail..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="bq-section-card">
                                <div class="fw-bold mb-3 small" style="color: #626e7f; letter-spacing: 1px;"><i class="bi bi-brush me-2"></i>DESIGNER ASSIGNMENT</div>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <label class="bq-label">Type</label>
                                        <select class="bq-input" id="designer_type" name="designer_type"></select>
                                    </div>
                                    <div class="col-6">
                                        <label class="bq-label">Work</label>
                                        <select class="bq-input" id="designer_work" name="designer_work"></select>
                                    </div>
                                    <div class="col-12 edit-mode-only">
                                        <div class="row g-2">
                                            <div class="col-6"><label class="bq-label">Assign</label><select class="bq-input" id="designer_assign" name="designer_assign"></select></div>
                                            <div class="col-6"><label class="bq-label">Status</label><select class="bq-input" id="designer_status" name="designer_status"></select></div>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <label class="bq-label">Production Deadline</label>
                                        <input type="date" class="bq-input m-0" id="designer_deadline" name="designer_deadline">
                                        <div id="des-capacity-info" class="mt-2 fw-bold" style="font-size: 11px;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="bq-section-card">
                                <div class="fw-bold mb-3 small" style="color: #626e7f; letter-spacing: 1px;"><i class="bi bi-rocket me-2"></i>CREATIVE ASSIGNMENT</div>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <label class="bq-label">Type</label>
                                        <select class="bq-input" id="creative_type" name="creative_type"></select>
                                    </div>
                                    <div class="col-6">
                                        <label class="bq-label">Work</label>
                                        <select class="bq-input" id="creative_work" name="creative_work"></select>
                                    </div>
                                    <div class="col-12 edit-mode-only">
                                        <div class="row g-2">
                                            <div class="col-6"><label class="bq-label">Assign</label><select class="bq-input" id="creative_assign" name="creative_assign"></select></div>
                                            <div class="col-6"><label class="bq-label">Status</label><select class="bq-input" id="creative_status" name="creative_status"></select></div>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <label class="bq-label">Production Deadline</label>
                                        <input type="date" class="bq-input m-0" id="creative_deadline" name="creative_deadline">
                                        <div id="cre-capacity-info" class="mt-2 fw-bold" style="font-size: 11px;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bq-form-footer d-flex justify-content-between align-items-center">
                    <div>
                        <button type="button" class="btn btn-sm btn-link text-danger text-decoration-none fw-bold edit-mode-only" id="btnDeleteTask">Delete This Task</button>
                    </div>
                    <div class="d-flex align-items-center gap-4">
                        <a href="#" class="btn-cancel-task" data-bs-dismiss="modal">Cancel</a>
                        <button type="submit" class="btn-create-task shadow-sm">Create</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // ส่วนนี้จะทำงานทันทีที่ Modal ถูกโหลดเข้า DOM
    (function initModalUI() {
        console.log("Modal UI Script Initializing...");

        // ดึง List Types จาก Config
        const types = (typeof B_QUEST_CONFIG !== 'undefined') ? B_QUEST_CONFIG.listTypes : [];
        
        const populateDropdown = (id) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.innerHTML = '<option value="">- Select Type -</option>';
            types.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                el.appendChild(opt);
            });
        };

        // รันหยอดข้อมูล
        populateDropdown('designer_type');
        populateDropdown('creative_type');

        // ตรวจเช็คสถานะการแก้ไข (Hint สำหรับอนาคต)
        const formEl = document.getElementById('taskForm');
        formEl.addEventListener('submit', (e) => {
            e.preventDefault();
            console.log("Form Submitted!");
        });
    })();
</script>
