<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B-STROM | Brandstrom X Portal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/system/config.js"></script>
    <script src="/system/system.js"></script>
    
    <style>
        :root {
            --brand-lime: #bdc432;
            --brand-dark: #111111;
            --border-color: #eeeeee;
            --font-main: 'Outfit', sans-serif;
        }

        body { 
            opacity: 0; 
            transition: opacity 0.5s ease-in-out; 
            background-color: #ffffff;
            color: var(--brand-dark);
            margin: 0;
            font-family: var(--font-main);
            display: flex;
            align-items: center;
            min-height: 100vh;
        }
        body.auth-ready { opacity: 1; }

        .container-portal {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
            width: 100%;
        }

        /* --- Header Layout (Logo ใหญ่ขึ้น) --- */
        .portal-header {
            display: flex;
            align-items: center;
            gap: 60px;
            margin-bottom: 80px;
        }

        .logo-box {
            flex: 0 0 400px;
            border-right: 1.5px solid var(--border-color);
            padding-right: 60px;
        }

        .logo-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        .hero-content {
            flex: 1;
        }

        .top-label {
            font-size: 0.9rem;
            letter-spacing: 4px;
            color: var(--brand-lime);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .hero-content h1 {
            font-size: 2.8rem; /* ขยายขนาดหัวข้อตามโลโก้ */
            font-weight: 800;
            line-height: 1;
            margin: 0 0 20px 0;
            letter-spacing: -1.5px;
        }

        .hero-content p {
            font-size: 1.1rem;
            color: #666;
            margin: 0;
            max-width: 600px;
            line-height: 1.6;
        }

        /* --- Project Grid --- */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .app-card {
            position: relative;
            height: 160px;
            border: 2.5px solid var(--brand-lime); 
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none !important;
            color: var(--brand-dark);
            background: transparent;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
            z-index: 1;
        }

        .app-card::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 0;
            background: var(--brand-lime);
            transition: height 0.4s ease;
            z-index: -1;
        }

        .app-card:hover {
            transform: translateY(-10px);
            color: #000;
            box-shadow: 0 20px 40px rgba(189, 196, 50, 0.25);
        }

        .app-card:hover::before {
            height: 100%;
        }

        .app-card i {
            font-size: 2.8rem;
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .app-card span {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* --- 🚩 Disabled State (ตอบสนองเมื่อชี้) --- */
        .app-card.disabled {
            border: 1px dashed #cccccc;
            color: #bbbbbb;
            cursor: not-allowed; /* เปลี่ยนหัวลูกศรเมาส์ */
            background: #fafafa;
        }

        .app-card.disabled:hover {
            transform: translateY(-5px); /* ยกขึ้นนิดหน่อยพอให้รู้ว่าชี้อยู่ */
            border-color: #999999;
            color: #888888;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            animation: shake 0.4s ease-in-out; /* เอฟเฟกต์สั่น */
        }

        .app-card.disabled::before { display: none; }

        @keyframes shake {
            0%, 100% { transform: translateY(-5px) rotate(0deg); }
            25% { transform: translateY(-5px) rotate(-1deg); }
            75% { transform: translateY(-5px) rotate(1deg); }
        }
        
        .status-tag {
            font-size: 0.7rem;
            margin-top: 8px;
            font-weight: 700;
            opacity: 0.6;
            letter-spacing: 1.5px;
        }

        /* Top-right actions */
        .portal-actions {
            position: fixed; top: 20px; right: 24px;
            display: flex; align-items: center; gap: 8px;
            z-index: 100;
        }
        .portal-btn {
            width: 38px; height: 38px;
            border: 1.5px solid #e5e7eb; border-radius: 10px;
            background: #fff; color: #6b7280;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; cursor: pointer; text-decoration: none;
            transition: 0.2s;
        }
        .portal-btn:hover { border-color: #aaa; color: var(--brand-dark); background: #f9fafb; }
        .portal-btn.logout:hover { border-color: #fca5a5; color: #ef4444; background: #fff5f5; }

        /* Responsive */
        @media (max-width: 992px) {
            .app-grid { grid-template-columns: repeat(2, 1fr); }
            .portal-header { flex-direction: column; text-align: center; gap: 30px; }
            .logo-box { border-right: none; padding-right: 0; border-bottom: 1px solid #eee; padding-bottom: 30px; flex: 0 0 auto; width: 220px; }
        }
        @media (max-width: 576px) {
            .app-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Top-right actions -->
    <div class="portal-actions">
        <a id="btn-setting" href="/system/setting.html" class="portal-btn" title="System Settings" style="display:none;">
            <i class="bi bi-gear-fill"></i>
        </a>
        <button class="portal-btn logout" title="Logout" onclick="handleLogout()">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>

    <div class="container-portal">
        <header class="portal-header">
            <div class="logo-box">
                <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" alt="Brandstrom X Logo">
            </div>
            <div class="hero-content">
                <div class="top-label">Brandstrom X Operations</div>
                <h1>YOUR BUSINESS CHALLENGE<br>IS OUR STARTING POINT.</h1>
                <p>We provide flexi solutions and end-to-end digital services to help your business thrive in the 2026 digital era.</p>
            </div>
        </header>

        <div class="app-grid" id="app-grid"></div>

    </div>

    <script>
        const PROJECTS = [
            { key: 'bquest',      label: 'B-QUEST',    icon: 'bi-rocket-takeoff-fill', href: 'b-quest/b-quest-list.html', live: true },
            { key: 'bdashboard',  label: 'DASHBOARD',  icon: 'bi-pie-chart-fill',      href: null, live: false },
            { key: 'baccount',    label: 'B-ACCOUNT',  icon: 'bi-person-vcard-fill',   href: null, live: false },
            { key: 'bcommission', label: 'COMMISSION', icon: 'bi-graph-up-arrow',      href: null, live: false },
            { key: 'bfinance',    label: 'FINANCE',    icon: 'bi-wallet2',             href: null, live: false },
        ];

        function renderGrid(access) {
            const grid = document.getElementById('app-grid');
            const visible = PROJECTS.filter(p => access[p.key]);

            if (!visible.length) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#aaa;padding:60px 0;font-size:0.9rem;font-weight:700;letter-spacing:1px;">No projects assigned yet.</div>`;
                return;
            }

            grid.innerHTML = visible.map(p => {
                if (p.live && p.href) {
                    return `<a href="${p.href}" class="app-card"><i class="bi ${p.icon}"></i><span>${p.label}</span><div class="status-tag">ENTER SYSTEM</div></a>`;
                }
                return `<div class="app-card disabled" title="Currently Locked"><i class="bi ${p.icon}"></i><span>${p.label}</span><div class="status-tag">COMING SOON</div></div>`;
            }).join('');
        }

        async function initIndex() {
            await initLayout({ projectName: "BRANDSTROM X" });
            const user = getBxUser();
            if (!user) return;

            if (user.level === 'god') {
                document.getElementById('btn-setting').style.display = 'flex';
                const allAccess = {};
                PROJECTS.forEach(p => allAccess[p.key] = true);
                renderGrid(allAccess);
                return;
            }

            const { data } = await supabaseClient
                .from('setting_project')
                .select('*')
                .eq('codename', user.codename)
                .single();

            if (data?.system_setting) {
                document.getElementById('btn-setting').style.display = 'flex';
            }

            renderGrid(data || {});
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            sessionStorage.clear();
            window.location.href = '/auth/login.html';
        }

        initIndex();
    </script>
</body>
</html>
