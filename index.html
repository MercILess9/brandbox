<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-Quest System | Deployment Status</title>
    <style>
        :root {
            --primary-color: #0070f3;
            --success-color: #10b981;
            --bg-color: #f4f7fb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            letter-spacing: -0.025em;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background-color: #ecfdf5;
            color: var(--success-color);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: var(--success-color);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 0.5rem 0;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .footer {
            font-size: 0.75rem;
            color: #9ca3af;
            border-top: 1px solid #f3f4f6;
            padding-top: 1.5rem;
        }

        .domain-tag {
            font-family: monospace;
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">B-QUEST</div>
        
        <div class="status-badge">
            <span class="status-dot"></span>
            System Operational
        </div>

        <h1>Deployment Successful</h1>
        <p>
            The web environment is now live on <strong>Vercel</strong>. 
            Finalizing connection to the corporate subdomain.
        </p>

        <div class="footer">
            Project: <strong>Database Migration</strong><br>
            Environment: <span class="domain-tag">Production</span>
        </div>
    </div>

</body>
</html>
