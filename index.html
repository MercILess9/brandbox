<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B-STROM | Brandstrom X Portal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="system/config.js"></script>
    <script src="system/system.js"></script>
    
    <style>
        :root {
            --brand-lime: #bdc432;
            --brand-dark: #111111;
            --border-color: #995656;
            --font-main: 'Outfit', sans-serif;
        }

        /* กันหน้าจอแวบ (Flash of Unauthenticated Content) */
        body { 
            opacity: 0; 
            transition: opacity 0.4s ease-in-out; 
            background-color: #ffffff;
            color: var(--brand-dark);
            margin: 0;
            font-family: var(--font-main);
            display: flex;
            align-items: center;
            min-height: 100vh;
        }
        body.auth-ready { opacity: 1; }

        .container-portal {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
            width: 100%;
        }

        /* --- Header Layout (Logo Left, Text Right) --- */
        .portal-header {
            display: flex;
            align-items: center;
            gap: 50px;
            margin-bottom: 60px;
        }

        .logo-box {
            flex: 0 0 180px; /* ขนาดโลโก้ */
            border-right: 1.5px solid var(--border-color);
            padding-right: 50px;
        }

        .logo-box img {
            width: 100%;
            height: auto;
            transition: 0.3s;
        }

        .hero-content {
            flex: 1;
        }

        .top-label {
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: var(--brand-lime);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .hero-content h1 {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        .hero-content p {
            font-size: 0.95rem;
            color: #888;
            margin: 0;
            max-width: 550px;
            line-height: 1.5;
        }

        /* --- Project Grid (4 Columns) --- */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .app-card {
            position: relative;
            height: 145px; /* กล่องเล็กตามบรีฟ */
            border: 2px solid var(--brand-lime); /* กรอบเขียว Brand */
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none !important;
            color: var(--brand-dark);
            background: transparent;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
            z-index: 1;
        }

        /* Hover Effect: เติมพื้นหลังสีเขียวเต็มใบ */
        .app-card::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 0;
            background: var(--brand-lime);
            transition: height 0.3s ease;
            z-index: -1;
        }

        .app-card:hover {
            transform: translateY(-8px);
            color: #000;
            box-shadow: 0 15px 30px rgba(189, 196, 50, 0.25);
        }

        .app-card:hover::before {
            height: 100%; /* เติมสีเขียวขึ้นมาเต็ม */
        }

        .app-card i {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        .app-card span {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        /* --- Disabled State (Coming Soon) --- */
        .app-card.disabled {
            border: 1px dashed #ddd; /* เปลี่ยนกรอบเป็นเส้นประ */
            color: #ccc;
            cursor: default;
        }
        .app-card.disabled::before { display: none; }
        .app-card.disabled:hover { transform: none; box-shadow: none; }
        
        .status-tag {
            font-size: 0.65rem;
            margin-top: 4px;
            font-weight: 700;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .app-grid { grid-template-columns: repeat(2, 1fr); }
            .portal-header { flex-direction: column; text-align: center; gap: 30px; }
            .logo-box { border-right: none; padding-right: 0; border-bottom: 1px solid #eee; padding-bottom: 30px; }
        }
        @media (max-width: 576px) {
            .app-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container-portal">
        <header class="portal-header">
            <div class="logo-box">
                <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" alt="Brandstrom X">
            </div>
            <div class="hero-content">
                <div class="top-label">At Brandstrom X,</div>
                <h1>YOUR BUSINESS CHALLENGE<br>IS OUR STARTING POINT.</h1>
                <p>We are a flexi solution partnership. We provide end-to-end digital marketing agency services to help your business grow.</p>
            </div>
        </header>

        <div class="app-grid">
            
            <a href="/b-quest/b-quest-list.html" class="app-card">
                <i class="bi bi-rocket-takeoff-fill"></i>
                <span>B-QUEST</span>
                <div class="status-tag">ENTER SYSTEM</div>
            </a>

            <div class="app-card disabled">
                <i class="bi bi-pie-chart-fill"></i>
                <span>DASHBOARD</span>
                <div class="status-tag">COMING SOON</div>
            </div>

            <div class="app-card disabled">
                <i class="bi bi-person-vcard-fill"></i>
                <span>B-ACCOUNT</span>
                <div class="status-tag">COMING SOON</div>
            </div>

            <div class="app-card disabled">
                <i class="bi bi-wallet2"></i>
                <span>FINANCE</span>
                <div class="status-tag">COMING SOON</div>
            </div>

        </div>
    </div>

    <script>
        // เรียกใช้งานระบบ Layout และการเช็ค Auth
        // เนื่องจากไม่มี defer เราเรียกต่อท้ายตรงนี้ได้เลย
        initLayout({
            projectName: "BRANDSTROM X"
        });
    </script>
</body>
</html>
