<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B-STROM BOX</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/system/config.js" defer></script>
    <script src="/system/system.js" defer></script>
    
    <style>
        :root {
            --brand-white: #ffffff;
            --brand-dark: #1a1a1a;
            --brand-lime: #bdc432;
            --brand-gray: #f4f4f4;
            --font-main: 'Outfit', 'Inter', sans-serif;
        }

        body {
            background-color: var(--brand-white);
            color: var(--brand-dark);
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            min-height: 100vh;
        }

        .portal-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        /* --- Logo Section --- */
        .logo-section {
            margin-bottom: 40px;
        }
        .main-logo {
            height: 40px;
            width: auto;
        }

        /* --- Hero Text Section (ปรับเล็กลง) --- */
        .hero-section {
            text-align: left;
            margin-bottom: 50px;
            border-left: 4px solid var(--brand-lime);
            padding-left: 25px;
        }
        .text-top {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: #888;
            margin-bottom: 4px;
        }
        .text-main {
            font-size: 2.2rem; /* ปรับเล็กลงจากเดิม */
            font-weight: 800;
            line-height: 1.2;
            color: var(--brand-dark);
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .text-highlight {
            font-size: 1.1rem; /* ปรับเล็กลง */
            font-weight: 600;
            color: var(--brand-lime);
            margin-bottom: 6px;
        }
        .text-footer {
            font-size: 0.85rem; /* ปรับเล็กลง */
            font-weight: 600;
            letter-spacing: 3px;
            color: #bbb;
            text-transform: uppercase;
        }

        /* --- Project Grid (เน้นชื่อโปรเจกต์) --- */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: var(--brand-gray);
            border: 1px solid transparent;
            border-radius: 12px;
            height: 160px; /* กำหนดความสูงให้เท่ากัน */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none !important;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* การ์ดที่ใช้งานได้ */
        .active-card {
            background: var(--brand-dark);
            color: white;
        }
        .active-card:hover {
            transform: translateY(-5px);
            border-color: var(--brand-lime);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* การ์ดที่ยังไม่เปิด */
        .coming-soon-card {
            background: #fff;
            border: 1px dashed #ddd;
            color: #ccc;
            cursor: default;
        }

        .card-title {
            font-size: 1.8rem; /* ชื่อโปรเจกต์เด่นๆ */
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        .card-status {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .active-card .card-status {
            color: var(--brand-lime);
        }

        @media (max-width: 768px) {
            .text-main { font-size: 1.8rem; }
            .card-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="logo-section">
            <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" class="main-logo" alt="BRANDSTROM X">
        </div>

        <div class="hero-section">
            <div class="text-top">AT BRANDSTROM X,</div>
            <div class="text-main">YOUR BUSINESS CHALLENGE <br> IS OUR STARTING POINT.</div>
            <div class="text-highlight">WE ARE A FLEXI SOLUTION PARTNERSHIP.</div>
            <div class="text-footer">DIGITAL MARKETING AGENCY</div>
        </div>

        <div class="project-grid">
            
            <a href="/b-quest/b-quest-list" class="project-card active-card">
                <div class="card-title">B-QUEST</div>
                <div class="card-status">ENTER SYSTEM</div>
            </a>

            <div class="project-card coming-soon-card">
                <div class="card-title">DASHBOARD</div>
                <div class="card-status">COMING SOON</div>
            </div>

            <div class="project-card coming-soon-card">
                <div class="card-title">B-ACCOUNT</div>
                <div class="card-status">COMING SOON</div>
            </div>

            <div class="project-card coming-soon-card">
                <div class="card-title">FINANCE</div>
                <div class="card-status">COMING SOON</div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // เรียกใช้ระบบ Layout
            await initLayout({
                projectName: "BRANDSTROM X",
                menus: []
            });
        });
    </script>
</body>
</html>
