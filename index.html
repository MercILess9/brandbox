<head>
    <meta charset="UTF-8">
    <title>B-STROM | Portal Hub</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/system/config.js" defer></script>
    <script src="/system/system.js" defer></script>
    
    <style>
        :root {
            --brand-white: #ffffff;
            --brand-dark: #1a1a1a;
            --brand-lime: #bdc432; /* สีเขียว Brand */
            --card-default: transparent; /* สีพื้นหลังปกติ */
            --card-border: var(--brand-lime); /* สีขอบ */
            --font-main: 'Outfit', 'Inter', sans-serif;
        }

        body {
            background-color: var(--brand-white);
            color: var(--brand-dark);
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            min-height: 100vh;
        }

        .portal-container {
            max-width: 1200px; /* ขยายให้กว้างขึ้น */
            margin: 0 auto;
            padding: 50px 20px;
        }

        /* --- New Hero Layout --- */
        .hero-layout {
            display: flex;
            align-items: center; /* จัดให้อยู่กึ่งกลางแนวดิ่ง */
            gap: 40px; /* ระยะห่างระหว่างโลโก้กับข้อความ */
            margin-bottom: 50px;
        }

        .logo-section {
            flex: 0 0 200px; /* กำหนดขนาดโลโก้คงที่ */
        }

        .main-logo {
            width: 100%;
            height: auto;
        }

        .hero-section {
            flex: 1; /* ข้อความใช้พื้นที่ที่เหลือ */
            text-align: left;
            border-left: 4px solid var(--brand-lime);
            padding-left: 20px;
        }

        .text-top { font-size: 0.9rem; font-weight: 500; color: #888; margin-bottom: 4px; letter-spacing: 1px; }
        .text-main { font-size: 1.8rem; font-weight: 800; line-height: 1.2; margin-bottom: 10px; text-transform: uppercase; }
        .text-highlight { font-size: 1rem; font-weight: 600; color: var(--brand-lime); margin-bottom: 4px; }
        .text-footer { font-size: 0.75rem; font-weight: 600; letter-spacing: 2px; color: #ccc; text-transform: uppercase; }

        /* --- Project Grid (4 Columns) --- */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 คอลัมน์บนจอคอม */
            gap: 15px;
        }

        .project-card {
            background: var(--card-default);
            border: 2px solid var(--card-border); /* มีกรอบสีเขียว */
            border-radius: 12px;
            height: 140px; /* ขนาดกล่องเล็กตามที่ต้องการ */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none !important;
            color: var(--brand-dark);
            transition: all 0.2s ease; /* ปรับให้ไวขึ้น */
            position: relative;
        }

        /* Hover Effect (เติมสีพื้นหลังเต็ม) */
        .project-card:hover {
            background: var(--brand-lime); /* เติม BG เต็ม */
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(189, 196, 50, 0.2);
            color: #000; /* สีตัวอักษรเข้มบนสีเขียว */
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }

        .card-status {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* การ์ดที่ยังไม่เปิด (Coming Soon) - ไม่มีขอบ */
        .coming-soon-card {
            background: #fff;
            border: 1px dashed #eee; /* ใช้ขอบเส้นประแทน */
            color: #ddd;
            cursor: default;
        }
        .coming-soon-card .card-icon, 
        .coming-soon-card .card-title { opacity: 0.4; }
        .coming-soon-card:hover { transform: none; background: #fff; box-shadow: none; border-color: #eee; color: #ddd; }

        /* Responsive */
        @media (max-width: 992px) { .project-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .hero-layout { flex-direction: column; text-align: center; gap: 20px; } .hero-section { border-left: none; border-top: 4px solid var(--brand-lime); padding: 10px 0 0; } }
        @media (max-width: 576px) { .project-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="hero-layout">
            <div class="logo-section">
                <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" class="main-logo" alt="BRANDSTROM X">
            </div>
            
            <div class="hero-section">
                <div class="text-top">AT BRANDSTROM X,</div>
                <div class="text-main">YOUR BUSINESS CHALLENGE <br> IS OUR STARTING POINT.</div>
                <div class="text-highlight">WE ARE A FLEXI SOLUTION PARTNERSHIP.</div>
                <div class="text-footer">DIGITAL MARKETING AGENCY</div>
            </div>
        </div>

        <div class="project-grid">
            
            <a href="/b-quest/b-quest-list" class="project-card">
                <div class="card-icon"><i class="bi bi-rocket-takeoff-fill"></i></div>
                <div class="card-title">B-QUEST</div>
                <div class="card-status">ENTER</div>
            </a>

            <div class="project-card coming-soon-card">
                <div class="card-icon"><i class="bi bi-graph-up-arrow"></i></div>
                <div class="card-title">DASHBOARD</div>
                <div class="card-status">SOON</div>
            </div>

            <div class="project-card coming-soon-card">
                <div class="card-icon"><i class="bi bi-person-badge"></i></div>
                <div class="card-title">B-ACCOUNT</div>
                <div class="card-status">SOON</div>
            </div>

            <div class="project-card coming-soon-card">
                <div class="card-icon"><i class="bi bi-wallet2"></i></div>
                <div class="card-title">FINANCE</div>
                <div class="card-status">SOON</div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await initLayout({
                projectName: "BRANDSTROM X",
                menus: []
            });
        });
    </script>
</body>
