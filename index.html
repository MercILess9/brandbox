<head>
    <meta charset="UTF-8">
    <title>B-STROM | Global Portal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/system/config.js" defer></script>
    <script src="/system/system.js" defer></script>
    
    <style>
        :root {
            --brand-lime: #bdc432;
            --brand-dark: #111111;
            --brand-gray: #fcfcfc;
            --text-muted: #888888;
            --border-color: #eeeeee;
            --font-main: 'Outfit', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: var(--brand-dark);
            margin: 0;
            font-family: var(--font-main);
            display: flex;
            align-items: center;
            min-height: 100vh; /* จัดกึ่งกลางหน้าจอแนวตั้ง */
        }

        .container-fluid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
        }

        /* --- Header Section (Logo Left, Text Right) --- */
        .portal-header {
            display: flex;
            align-items: center;
            gap: 60px;
            margin-bottom: 80px; /* เว้นระยะห่างจาก Grid */
        }

        .logo-box {
            flex: 0 0 180px; /* ล็อกขนาดโลโก้ */
            border-right: 1px solid var(--border-color);
            padding-right: 60px;
        }

        .logo-box img {
            width: 100%;
            height: auto;
            filter: grayscale(1); /* ทำโลโก้เป็นขาวดำให้ดูหรู พอ Hover แล้วค่อยมีสีก็ได้ */
            transition: 0.3s;
        }
        .portal-header:hover .logo-box img { filter: grayscale(0); }

        .hero-content {
            flex: 1;
        }

        .hero-content .top-label {
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--brand-lime);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .hero-content h1 {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.1;
            margin: 0 0 15px 0;
            letter-spacing: -1px;
        }

        .hero-content p {
            font-size: 1rem;
            color: var(--text-muted);
            margin: 0;
            max-width: 500px;
            line-height: 1.6;
        }

        /* --- Project Grid (4 Columns) --- */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .app-card {
            position: relative;
            height: 150px; /* ปรับเล็กลงตามบรีฟ */
            border: 2px solid var(--brand-lime); /* กรอบเขียวตั้งต้น */
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none !important;
            color: var(--brand-dark);
            background: transparent;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
        }

        /* Hover Effect: เติมสีเขียวเต็มใบ */
        .app-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--brand-lime);
            transform: translateY(100%); /* ซ่อนไว้ข้างล่าง */
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: -1;
        }

        .app-card:hover {
            transform: translateY(-8px);
            color: #000;
            box-shadow: 0 20px 40px rgba(189, 196, 50, 0.2);
        }

        .app-card:hover::before {
            transform: translateY(0); /* ดันสีเขียวขึ้นมาเต็มใบ */
        }

        .app-card i {
            font-size: 2.2rem;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .app-card span {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* --- Disabled State (Coming Soon) --- */
        .app-card.disabled {
            border: 1px solid #eee;
            background: #fafafa;
            color: #ccc;
            cursor: default;
        }
        .app-card.disabled::before { display: none; }
        .app-card.disabled:hover { transform: none; box-shadow: none; }
        .app-card.disabled .status-tag {
            font-size: 0.6rem;
            margin-top: 5px;
            font-weight: 600;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .portal-header { flex-direction: column; text-align: center; gap: 30px; }
            .logo-box { border-right: none; padding-right: 0; border-bottom: 1px solid #eee; padding-bottom: 30px; }
            .app-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="container-fluid">
        <header class="portal-header">
            <div class="logo-box">
                <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" alt="Brandstrom X">
            </div>
            <div class="hero-content">
                <div class="top-label">Brandstrom X Operations</div>
                <h1>YOUR BUSINESS CHALLENGE<br>IS OUR STARTING POINT.</h1>
                <p>We are a flexi solution partnership providing end-to-end digital marketing agency services.</p>
            </div>
        </header>

        <div class="app-grid">
            
            <a href="/b-quest/b-quest-list" class="app-card">
                <i class="bi bi-rocket-takeoff-fill"></i>
                <span>B-QUEST</span>
            </a>

            <div class="app-card disabled">
                <i class="bi bi-pie-chart-fill"></i>
                <span>DASHBOARD</span>
                <div class="status-tag">COMING SOON</div>
            </div>

            <div class="app-card disabled">
                <i class="bi bi-person-vcard-fill"></i>
                <span>B-ACCOUNT</span>
                <div class="status-tag">COMING SOON</div>
            </div>

            <div class="app-card disabled">
                <i class="bi bi-wallet2"></i>
                <span>FINANCE</span>
                <div class="status-tag">COMING SOON</div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await initLayout({
                projectName: "BRANDSTROM X",
                menus: []
            });
        });
    </script>
</body>
