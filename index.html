<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B-STROM | Brandstrom X Portal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="system/config.js"></script>
    <script src="system/system.js"></script>
    
    <style>
        :root {
            --brand-lime: #bdc432;
            --brand-dark: #111111;
            --border-color: #eeeeee;
            --font-main: 'Outfit', sans-serif;
        }

        /* เอฟเฟกต์กันหน้าขาว: จะ Fade In เมื่อระบบเช็ค Auth เสร็จ (class auth-ready) */
        body { 
            opacity: 0; 
            transition: opacity 0.5s ease-in-out; 
            background-color: #ffffff;
            color: var(--brand-dark);
            margin: 0;
            font-family: var(--font-main);
            display: flex;
            align-items: center;
            min-height: 100vh;
        }
        body.auth-ready { opacity: 1; }

        .container-portal {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
            width: 100%;
        }

        /* --- Header Layout (Logo Left, Text Right) --- */
        .portal-header {
            display: flex;
            align-items: center;
            gap: 50px;
            margin-bottom: 60px;
        }

        .logo-box {
            flex: 0 0 180px; 
            border-right: 1.5px solid var(--border-color);
            padding-right: 50px;
        }

        .logo-box img {
            width: 100%;
            height: auto;
        }

        .hero-content {
            flex: 1;
        }

        .top-label {
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: var(--brand-lime);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .hero-content h1 {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.1;
            margin: 0 0 15px 0;
            letter-spacing: -1px;
        }

        .hero-content p {
            font-size: 1rem;
            color: #888;
            margin: 0;
            max-width: 550px;
            line-height: 1.6;
        }

        /* --- Project Grid (4 Columns) --- */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .app-card {
            position: relative;
            height: 150px; /* ขนาดกะทัดรัด */
            border: 2px solid var(--brand-lime); 
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none !important;
            color: var(--brand-dark);
            background: transparent;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
            z-index: 1;
        }

        /* Hover Effect: สีเขียววิ่งขึ้นมาเติมเต็มจากด้านล่าง */
        .app-card::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 0;
            background: var(--brand-lime);
            transition: height 0.4s ease;
            z-index: -1;
        }

        .app-card:hover {
            transform: translateY(-10px);
            color: #000;
            box-shadow: 0 20px 40px rgba(189, 196, 50, 0.2);
        }

        .app-card:hover::before {
            height: 100%;
        }

        .app-card i {
            font-size: 2.5rem;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .app-card span {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* --- Disabled State --- */
        .app-card.disabled {
            border: 1px dashed #ddd;
            color: #ccc;
            cursor: default;
        }
        .app-card.disabled::before { display: none; }
        .app-card.disabled:hover { transform: none; box-shadow: none; }
        
        .status-tag {
            font-size: 0.65rem;
            margin-top: 5px;
            font-weight: 700;
            opacity: 0.6;
            letter-spacing: 1.5px;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .app-grid { grid-template-columns: repeat(2, 1fr); }
            .portal-header { flex-direction: column; text-align: center; gap: 30px; }
            .logo-box { border-right: none; padding-right: 0; border-bottom: 1px solid #eee; padding-bottom: 30px; }
        }
        @media (max-width: 576px) {
            .app-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container-portal">
        <header class="portal-header">
            <div class="logo-box">
                <img src="https://www.brandboxplatform.com/images/brandbox-logo.png" alt="Brandstrom X Logo">
            </div>
            <div class="hero-content">
                <div class="top-label">Brandstrom X Operations</div>
                <h1>YOUR BUSINESS CHALLENGE<br>IS OUR STARTING POINT.</h1>
                <p>We are a flexi solution partnership providing end-to-end digital marketing agency services to help your business thrive in the digital era.</p>
            </div>
        </header>

        <div class="app-grid">
            
            <a href="b-quest/b-quest-list.html" class="app-card">
                <i class="bi bi-rocket-takeoff-fill"></i>
                <span>B-QUEST</span>
                <div class="status-tag">ENTER SYSTEM</div>
            </a>

            <div class="app-card disabled">
                <i class="bi bi-pie-chart-fill"></i>
                <span>DASHBOARD</span>
                <div class="status-tag">COMING SOON</div>
            </div>

            <div class="app-card disabled">
                <i class="bi bi-person-vcard-fill"></i>
                <span>B-ACCOUNT</span>
                <div class="status-tag">COMING SOON</div>
            </div>

            <div class="app-card disabled">
                <i class="bi bi-wallet2"></i>
                <span>FINANCE</span>
                <div class="status-tag">COMING SOON</div>
            </div>

        </div>
    </div>

    <script>
        initLayout({
            projectName: "BRANDSTROM X"
        });
    </script>
</body>
</html>
